    queueNote+
    '<div class="ex-form-group"><label>Title<span class="ex-req">*</span></label><input type="text" id="m-title" value="'+esc(F.title||'')+'" placeholder="e.g. Used / instead of // for integer division" autofocus></div>'+
    '<div class="ex-form-group"><label>Category <span class="ex-hint">short tag, e.g. float-poisoning, scope-confusion</span></label><input type="text" id="m-cat" value="'+esc(F.category||'')+'" placeholder="off-by-one"></div>'+
    '<div class="ex-form-group"><label>From which attempt?</label><select id="m-att">'+attOptions+'</select></div>'+
    '<div class="ex-form-group"><label>Description <span class="ex-hint">what you assumed, what is actually true, why it felt right</span></label><textarea id="m-desc" rows="4">'+esc(F.description||'')+'</textarea></div>'+
    '<div class="ex-form-group"><label>What I wrote <span class="ex-hint">the buggy lines</span></label><textarea id="m-snip" class="ex-code-input" rows="5" spellcheck="false">'+esc(F.code_snippet||'')+'</textarea></div>'+
    '<div class="ex-form-group"><label>What it should be <span class="ex-hint">the corrected version</span></label><textarea id="m-fix" class="ex-code-input" rows="5" spellcheck="false">'+esc(F.correct_form||'')+'</textarea></div>'+
    '<div class="ex-form-actions"><button class="ex-btn-s" onclick="exCancelMistake()">Cancel</button><button class="ex-btn-p" onclick="exSaveMistake()" id="save-m-btn">Save mistake</button></div>';
}

function exCancelMistake(){
  S.exMistakeForm=null;
  S.exImportQueue=null;
  S.exView='detail';
  exRender();
}

async function exSaveMistake(){
  const ex=S.exList.find(function(e){return e.id===S.exDetailId;});
  if(!ex){alert('No exercise.');return;}
  const title=document.getElementById('m-title').value.trim();
  const cat=document.getElementById('m-cat').value.trim();
  const attRaw=document.getElementById('m-att').value;
  const desc=document.getElementById('m-desc').value.trim();
  const snip=document.getElementById('m-snip').value;
  const fix=document.getElementById('m-fix').value;
  if(!title){alert('Title is required.');return;}
  const btn=document.getElementById('save-m-btn');btn.disabled=true;btn.textContent='Saving…';
  const payload={
    exercise_id:ex.id,
    attempt_id:attRaw?parseInt(attRaw,10):null,
    language:ex.category||'other',
    category:cat||null,
    title:title,
    description:desc||null,
    code_snippet:snip||null,
    correct_form:fix||null
  };
  const result=await sbPost('code_sensei_mistakes',payload);
  if(!result||!Array.isArray(result)||!result[0]){
    btn.disabled=false;btn.textContent='Save mistake';
    alert('Save failed. Check the console (and that you ran code_sensei_mistakes_schema.sql).');
    console.error('Insert returned:',result);return;
  }
  if(!S.exMistakes[ex.id])S.exMistakes[ex.id]=[];
  S.exMistakes[ex.id].unshift(result[0]);
  S.exMistakeForm=null;
  // If there's a queue, show the next one. Otherwise return to detail.
  if(S.exImportQueue&&S.exImportQueue.length){
    exShowNextImported();
  } else {
    S.exView='detail';
    exRender();
    exToast('✓ Mistake saved');
  }
}

// ─── Nav ───
function exSetFilter(f){S.exFilter=f;exRender();}
function exGoList(){S.view='exercises';setNav('nav-ex');S.exView='list';S.exDetailId=null;S.exForm={};S.exReturn=null;exRender();}
function exOpenDetail(id){S.view='exercises';setNav('nav-ex');S.exView='detail';S.exDetailId=id;S.exForm={};window.scrollTo({top:0,behavior:'smooth'});exRender();}
function exOpenNewExercise(){S.exView='new_exercise';S.exForm={category:'python',status:'not_started'};window.scrollTo({top:0,behavior:'smooth'});exRender();}
function exOpenNewAttempt(){S.exView='new_attempt';S.exForm={};window.scrollTo({top:0,behavior:'smooth'});exRender();}

// ─── Called from a Python day card (comes in with dayNum) ───
async function exOpenFromDay(dayNum,dayTitle){
  // Ensure data loaded
  if(!S.exLoaded){await exLoad();if(S.exError){alert(S.exError);return;}}
  const cdId=await exEnsurePythonDay(dayNum,dayTitle);
  S.view='exercises';setNav('nav-ex');
  S.exView='new_exercise';
  S.exForm={category:'python',status:'not_started',source:'Udemy Day '+dayNum,course_day_id:cdId,autoPrefilledCdId:String(cdId)};
  S.exReturn='python';
  window.scrollTo({top:0,behavior:'smooth'});
  exRender();
}
async function exOpenDetailFromDay(id){
  if(!S.exLoaded){await exLoad();if(S.exError){alert(S.exError);return;}}
  S.exReturn='python';
  exOpenDetail(id);
}

// ─── Embed inside a Python day card ───
function exRenderDayEmbed(dayNum,dayTitle){
  if(!S.exLoaded){
    // Not yet loaded — kick off a background load, the user can re-expand to see it
    exLoad().then(function(){if(py100Expanded===dayNum)goPython();});
    return '<div class="ex-embed"><div class="ex-embed-label">Your exercises on this day</div><div class="ex-embed-empty">Loading…</div></div>';
  }
  // Find course_day row for this day (if it exists)
  const cd=S.exCourseDays.find(function(c){return c.course_name==='100 Days of Python'&&c.day_number===dayNum;});
  const linked=cd?S.exList.filter(function(ex){return ex.course_day_id===cd.id;}):[];
  let rows='';
  if(!linked.length){
    rows='<div class="ex-embed-empty">No exercises logged on this day yet.</div>';
  } else {
    rows=linked.map(function(ex){
      const aCount=(S.exAttempts[ex.id]||[]).length;
      return '<div class="ex-embed-row" onclick="event.stopPropagation();exOpenDetailFromDay('+ex.id+')">'+
        '<div class="ex-embed-title">'+esc(ex.title)+'</div>'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          (aCount?'<span style="font-size:10.5px;color:var(--td)">'+aCount+' att</span>':'')+
          exStatusChip(ex.status)+
        '</div>'+
        '</div>';
    }).join('');
  }
  return '<div class="ex-embed"><div class="ex-embed-label">Your exercises on this day</div>'+rows+
    '<button class="ex-embed-add" onclick="event.stopPropagation();exOpenFromDay('+dayNum+',\''+esc(dayTitle).replace(/'/g,"\\'")+'\')">+ Log exercise on Day '+dayNum+'</button>'+
    '</div>';
}
