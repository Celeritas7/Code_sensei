<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeSensei</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root{--bg:#0d0d16;--s:#131322;--c:#181830;--ch:#1e1e38;--bd:#1f1f3a;--a:#F59E0B;--as:#2a2210;--tx:#cccce0;--td:#555570;--tm:#8888a0;--g:#34D399;--r:#F87171;--p:#A78BFA;--b:#38bdf8}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#222240;border-radius:3px}
button{font-family:inherit;cursor:pointer}input::placeholder{color:var(--td)}select{font-family:inherit;background:var(--c);color:var(--tx);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;font-size:12.5px}
.sb{width:190px;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--bd);cursor:pointer}
.sb-logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#F59E0B,#f97316);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--bg);font-family:monospace;flex-shrink:0}
.sb-nav{flex:1;padding:5px}.sb-ft{padding:10px 11px;border-top:1px solid var(--bd);font-size:10.5px;color:var(--td)}
.nv{padding:8px 10px;border-radius:6px;margin-bottom:1px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;color:var(--tm);transition:background .12s}
.nv:hover{background:var(--ch)}.nv.on{background:var(--as);color:var(--a)}
#main{flex:1;overflow:auto}
.pg{padding:28px 30px;max-width:760px;margin:0 auto;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:24px;font-weight:700;margin-bottom:3px}h2{font-size:20px;font-weight:700;margin-bottom:3px}
.sub{color:var(--td);margin-bottom:24px;font-size:13.5px}
.cd{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:13px;cursor:pointer;transition:border-color .15s}.cd:hover{border-color:#2a2a50}
.mod{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s}
.mod:hover{border-color:rgba(245,158,11,.2);transform:translateY(-1px)}
.mod-n{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.back{background:none;border:none;color:var(--tm);font-size:13px;padding:0;margin-bottom:14px;display:block}.back:hover{color:var(--tx)}
.stg{display:flex;gap:0;margin-bottom:18px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.stg-b{flex:1;padding:10px;text-align:center;font-size:12.5px;font-weight:600;border:none;background:var(--c);color:var(--td);transition:all .15s;cursor:pointer}
.stg-b.on{background:var(--a);color:var(--bg)}
.tabs{display:flex;gap:5px;margin-bottom:16px}
.tb{padding:8px 13px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--tm);font-size:12px;font-weight:500;transition:all .12s}
.tb.on{border-color:rgba(245,158,11,.26);background:var(--as);color:var(--a)}
.tb.on-p{border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.06);color:var(--p)}
.tb.on-g{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.06);color:var(--g)}
.lbox{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:20px;line-height:1.8;font-size:13.5px}
.sf-h{padding:8px 12px;background:#111125;border:1px solid var(--bd);border-radius:8px 8px 0 0;font-size:12px;font-weight:600;color:var(--tm);font-family:monospace}
.sf-b{border:1px solid var(--bd);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
.sl{display:flex;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.02)}
.sl:hover{background:rgba(255,255,255,.02)}.sl.on{background:rgba(245,158,11,.06)}
.sl-n{width:28px;text-align:center;color:var(--td);font-size:10.5px;padding:5px 0;font-family:monospace;flex-shrink:0}
.sl-c{font-family:monospace;font-size:12px;padding:5px 8px;flex:1;white-space:pre-wrap;color:var(--tx)}
.sl-h{padding:5px 8px;color:var(--td);font-size:11px;flex-shrink:0}
.sl-e{padding:10px 14px 10px 36px;background:rgba(245,158,11,.04);border-left:3px solid rgba(245,158,11,.2);font-size:12.5px;line-height:1.7;border-bottom:1px solid rgba(255,255,255,.02)}
.qc{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:18px;margin-bottom:10px}
.ql{font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.qt{font-size:14px;font-weight:500;margin-bottom:12px;line-height:1.6}
.qcd{background:rgba(0,0,0,.35);padding:12px;border-radius:7px;font-family:monospace;font-size:12px;line-height:1.6;color:#e2d9a2;margin-bottom:12px;white-space:pre-wrap;border:1px solid #222240}
.qo{padding:10px 14px;border:1px solid var(--bd);border-radius:7px;margin-bottom:5px;cursor:pointer;font-size:13px;transition:all .12s}
.qo:hover{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04)}
.qo.ok{border-color:var(--g);background:rgba(52,211,153,.08);color:var(--g)}
.qo.no{border-color:var(--r);background:rgba(248,113,113,.08);color:var(--r)}
.qx{margin-top:10px;padding:12px;background:rgba(245,158,11,.04);border-radius:7px;border-left:3px solid var(--a);font-size:13px;line-height:1.7}
.ch-b{background:var(--c);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.ch-h{padding:9px 13px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--td)}
.ch-m{height:280px;overflow:auto;padding:13px}
.ch-e{color:var(--td);font-size:12.5px;text-align:center;margin-top:28px}
.bub{max-width:88%;padding:9px 12px;font-size:13px;line-height:1.7}
.bub.ai{border-radius:3px 10px 10px 10px;background:var(--ch);border:1px solid var(--bd)}
.bub.us{border-radius:10px 3px 10px 10px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.12)}
.ch-i{display:flex;gap:6px;padding:9px 11px;border-top:1px solid var(--bd)}
.ch-i input{flex:1;padding:8px 10px;background:var(--s);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:12.5px;outline:none}
.ch-i button{padding:8px 13px;background:var(--a);border:none;border-radius:6px;color:var(--bg);font-weight:600;font-size:12px}
.sc{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:20px;text-align:center;margin-top:16px}
.md-code{background:rgba(0,0,0,.4);padding:14px;border-radius:8px;font-size:12px;line-height:1.7;font-family:monospace;overflow-x:auto;margin:10px 0;color:#e2d9a2;border:1px solid #222240;white-space:pre-wrap;display:block}
.md-b{color:var(--a);font-weight:600}
.md-ic{background:rgba(255,183,77,.1);padding:1px 4px;border-radius:3px;font-size:12px;color:#e2d9a2;font-family:monospace}
.ld{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--td);font-size:14px}
.spin{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--a);border-radius:50%;animation:sp .6s linear infinite;margin-right:10px}
@keyframes sp{to{transform:rotate(360deg)}}
/* Commit timeline */
.commit{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;transition:all .12s}
.commit:hover{border-color:#2a2a50}
.commit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.commit-msg{font-size:13.5px;font-weight:500;margin-bottom:3px}
.commit-date{font-size:11px;color:var(--td)}
.commit-sha{font-size:10px;color:var(--td);font-family:monospace}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.badge-new{background:rgba(56,189,248,.08);color:var(--b);border:1px solid rgba(56,189,248,.15)}
.badge-ok{background:rgba(52,211,153,.08);color:var(--g);border:1px solid rgba(52,211,153,.15)}
.badge-review{background:rgba(248,113,113,.08);color:var(--r);border:1px solid rgba(248,113,113,.15)}
/* Diff */
.diff-box{background:var(--c);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:16px}
.diff-sec{padding:8px 13px;background:#111125;border-bottom:1px solid var(--bd);font-size:12px;font-weight:600;color:var(--tm)}
.diff-add{background:rgba(52,211,153,.04);border-left:3px solid rgba(52,211,153,.3);padding:2px 8px 2px 12px;font-family:monospace;font-size:11.5px;line-height:18px;color:var(--g)}
.diff-del{background:rgba(248,113,113,.04);border-left:3px solid rgba(248,113,113,.3);padding:2px 8px 2px 12px;font-family:monospace;font-size:11.5px;line-height:18px;color:var(--r)}
.diff-ctx{padding:2px 8px 2px 15px;font-family:monospace;font-size:11.5px;line-height:18px;color:var(--td)}
.diff-analysis{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:18px;line-height:1.8;font-size:13.5px;margin-bottom:16px}
/* Note input */
.note-box{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-top:12px}
.note-input{width:100%;padding:10px;background:var(--s);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:13px;outline:none;resize:vertical;min-height:60px;font-family:inherit}
/* Prompt buttons */
.prompt-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.prompt-btn{padding:5px 10px;border-radius:5px;border:1px solid var(--bd);background:transparent;font-size:10.5px;color:var(--tm);transition:all .12s;display:flex;align-items:center;gap:4px}
.prompt-btn:hover{border-color:var(--b);color:var(--b);background:rgba(56,189,248,.04)}
.prompt-btn .pb-icon{font-size:12px}
/* Prompt popup */
.prompt-popup{position:fixed;bottom:0;left:0;right:0;z-index:1002;background:var(--s);border-top:1px solid var(--bd);padding:16px;animation:slideUp .25s ease;max-height:70vh;overflow:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.prompt-text{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:14px;font-size:12.5px;line-height:1.7;color:var(--tx);white-space:pre-wrap;margin-bottom:12px;max-height:40vh;overflow:auto}
.prompt-actions{display:flex;gap:8px}
.prompt-copy{flex:1;padding:10px;background:var(--b);border:none;border-radius:8px;color:var(--bg);font-weight:600;font-size:13px}
.prompt-close{padding:10px 16px;background:var(--c);border:1px solid var(--bd);border-radius:8px;color:var(--tm);font-size:13px}
.copied-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:8px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:var(--g);font-size:13px;font-weight:500;z-index:1003;animation:fi .2s ease}
/* Mobile hamburger */
.ham{display:none;position:fixed;top:10px;left:10px;z-index:1001;width:36px;height:36px;border-radius:8px;background:var(--s);border:1px solid var(--bd);align-items:center;justify-content:center;font-size:18px;color:var(--a);cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}
/* Mobile */
@media(max-width:700px){
  .ham{display:flex}
  .sb{position:fixed;left:-200px;top:0;bottom:0;z-index:1000;transition:left .25s ease}
  .sb.open{left:0}
  .overlay.show{display:block}
  #main{margin-left:0}
  .pg{padding:52px 16px 20px}
  h1{font-size:20px}h2{font-size:17px}
  .sub{font-size:12.5px;margin-bottom:16px}
  .cd{padding:11px}
  .mod{padding:12px;gap:10px}
  .mod-n{width:30px;height:30px;font-size:12px}
  .stg-b{padding:8px;font-size:11.5px}
  .tabs{flex-wrap:wrap}
  .tb{padding:6px 10px;font-size:11px}
  .commit{padding:10px 12px;gap:8px}
  .commit-msg{font-size:12.5px}
  .sf-h{font-size:11px}
  .sl-c{font-size:11px}
  .sl-e{padding:8px 10px 8px 28px;font-size:12px}
  .diff-add,.diff-del,.diff-ctx{font-size:10.5px;padding:2px 6px 2px 8px}
  select{font-size:11.5px;padding:7px 8px;min-width:0}
  .ch-m{height:220px}
  .lbox{padding:14px;font-size:13px}
  .md-code{padding:10px;font-size:11px}
}
/* Python Tree Visualizer */
.tree-wrap{display:flex;height:calc(100vh - 0px);overflow:hidden}
.tree-code-panel{width:360px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--s)}
.tree-code-top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--bd)}
.tree-code-top h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--td)}
.tree-input-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--bd);background:var(--bg)}
.tree-input-row label{font-size:10px;color:var(--td);font-family:monospace;flex-shrink:0}
.tree-input-sm{flex:1;padding:3px 7px;background:var(--c);border:1px solid var(--bd);border-radius:4px;font-family:monospace;font-size:11px;outline:none;color:var(--tx)}
.tree-ftabs{display:flex;gap:0;border-bottom:1px solid var(--bd);background:var(--bg);overflow-x:auto;flex-shrink:0}
.tree-ftab{padding:6px 12px;font-family:monospace;font-size:10px;border:none;background:transparent;color:var(--td);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tree-ftab.on{color:var(--a);border-bottom-color:var(--a);background:var(--s)}
.tree-ftab:hover:not(.on){color:var(--tm);background:var(--c)}
.tree-ftab .xtab{font-size:11px;opacity:.4;margin-left:4px}
.tree-ftab .xtab:hover{opacity:1;color:var(--r)}
.tree-add-tab{padding:6px 8px;font-size:13px;border:none;background:transparent;color:var(--td);cursor:pointer}
.tree-textarea{flex:1;width:100%;padding:12px;background:var(--bg);color:var(--tx);border:none;outline:none;font-family:monospace;font-size:12px;line-height:1.7;resize:none;tab-size:4}
.tree-textarea::placeholder{color:var(--td)}
.tree-samples{display:flex;gap:5px;padding:7px 10px;border-top:1px solid var(--bd);flex-wrap:wrap}
.tree-sample-btn{padding:3px 8px;background:var(--c);color:var(--td);border:1px solid var(--bd);border-radius:4px;font-family:monospace;font-size:10px;cursor:pointer}
.tree-sample-btn:hover{color:var(--tx);border-color:var(--tm)}
.tree-panel{flex:1;position:relative;overflow:hidden;background:#fff}
.tree-panel svg{width:100%;height:100%}
.tree-node{cursor:pointer}.tree-node:hover .tshape{filter:brightness(.93) saturate(1.2)}
.tlabel{font-family:monospace;fill:#1a1e2a;pointer-events:none;dominant-baseline:middle;text-anchor:middle;font-weight:600}
.tbadge{font-family:monospace;font-size:8px;fill:#6b7280;pointer-events:none;text-anchor:middle}
.tdetail{font-family:monospace;font-size:8.5px;fill:#6b7280;pointer-events:none;text-anchor:middle}
.tlink{fill:none;stroke:#b0b8c8;stroke-width:1.5}
.tcoll circle{fill:#f0f2f5;stroke:#c0c8d4;stroke-width:1.5}
.tcoll text{font-family:monospace;font-size:10px;fill:#6b7280;text-anchor:middle;dominant-baseline:middle;font-weight:600}
.tcount{font-family:monospace;font-size:8px;fill:#9ca3af;pointer-events:none;text-anchor:start}
.tree-node.dimmed{opacity:.12;transition:opacity .3s}
.tree-node.visited{opacity:1;transition:opacity .3s}
.tree-node.ancestor{opacity:.45;transition:opacity .3s}
.tree-node.active-step{opacity:1;transition:opacity .3s}
.tree-node.active-step .tshape{filter:drop-shadow(0 0 8px rgba(16,185,129,.6)) drop-shadow(0 0 16px rgba(16,185,129,.3))}
.tree-node.parallel-step{opacity:1;transition:opacity .3s}
.tree-node.parallel-step .tshape{filter:drop-shadow(0 0 8px rgba(99,102,241,.6))}
.tlink.dimmed{opacity:.08}
.tree-flow-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 14px;background:rgba(255,255,255,.95);border-bottom:1px solid #e5e7eb;backdrop-filter:blur(8px);z-index:10;flex-wrap:wrap}
.tree-flow-btn{width:32px;height:32px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#1a1e2a;font-size:14px;cursor:pointer;display:grid;place-items:center}
.tree-flow-btn:hover{background:#f3f4f6}.tree-flow-btn.playing{background:#10b981;color:#fff;border-color:#10b981}
.tree-flow-btn:disabled{opacity:.3;cursor:default}
.tree-step-info{font-family:monospace;font-size:11px;color:#6b7280}
.tree-step-info .snum{color:#10b981;font-weight:700;font-size:13px}
.tree-step-name{font-family:monospace;font-size:10px;color:#1a1e2a;background:#f0fdf4;border:1px solid #bbf7d0;padding:3px 9px;border-radius:5px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-speed{display:flex;align-items:center;gap:4px;font-size:10px;color:#9ca3af;font-family:monospace}
.tree-speed input{width:50px;accent-color:#10b981}
.tree-info{position:absolute;bottom:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(255,255,255,.92);border:1px solid #e5e7eb;border-radius:8px;font-size:10px;color:#6b7280;font-family:monospace}
.tree-info .tstats{display:flex;gap:10px}
.tree-info .tval{color:var(--acc);font-weight:600}
.tree-zbtn{width:24px;height:24px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:5px;color:#6b7280;font-size:12px;cursor:pointer;display:grid;place-items:center}
.tree-zbtn:hover{background:#e5e7eb;color:#1a1e2a}
.tree-mode-toggle{display:flex;gap:0;border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin:0 6px}
.tree-mode-btn{padding:4px 10px;font-family:monospace;font-size:10px;border:none;background:transparent;color:var(--td);cursor:pointer}
.tree-mode-btn.on{background:var(--a);color:var(--bg)}
.tree-mode-btn.flow-on{background:#10b981;color:#fff}
.tree-ttip{position:fixed;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;font-family:monospace;font-size:11px;color:#e2e8f0;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;max-width:260px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.tree-ttip.visible{opacity:1}.tree-ttip .ttt{color:#6ee7b7;font-weight:600}.tree-ttip .ttd{color:#94a3b8;margin-top:2px}
@media(max-width:700px){
  .tree-wrap{flex-direction:column}
  .tree-code-panel{width:100%;height:38vh;border-right:none;border-bottom:1px solid var(--bd)}
  .tree-panel{height:62vh}
}
</style>
</head>
<body>
<div class="ham" onclick="toggleMobileNav()">☰</div>
<div class="overlay" id="overlay" onclick="toggleMobileNav()"></div>
<div class="sb" id="sidebar">
  <div class="sb-hd"><div class="sb-logo">&lt;/&gt;</div><span style="font-size:14px;font-weight:700">CodeSensei</span></div>
  <div class="sb-nav">
    <div class="nv on" id="nav-dash" onclick="goDash()"><span style="font-size:15px;width:18px;text-align:center;font-family:monospace">◈</span>Dashboard</div>
    <div class="nv" id="nav-bat" onclick="goModules('bat')"><span style="font-size:15px;width:18px;text-align:center;font-family:monospace">☰</span>Batch</div>
    <div class="nv" id="nav-sql" onclick="goModules('sql')"><span style="font-size:15px;width:18px;text-align:center;font-family:monospace">⊞</span>SQL</div>
    <div class="nv" id="nav-proj" onclick="goProjects()"><span style="font-size:15px;width:18px;text-align:center;font-family:monospace">◧</span>My Projects</div>
    <div class="nv" id="nav-tree" onclick="goTree()"><span style="font-size:15px;width:18px;text-align:center;font-family:monospace">🌳</span>Python Tree</div>
  </div>
  <div class="sb-ft">Learning from your own code</div>
</div>

<script>

  cache.challenges=await sbq('code_sensei_challenges','select=*&topic_id=eq.'+S.topic+'&module_number=eq.'+n+'&order=display_order');

}
function renderModule(){
  const m=document.getElementById('main'),les=cache.lessons[0];

  const pQ=cache.challenges.filter(c=>c.stage==='practice'),tQ=cache.challenges.filter(c=>c.stage==='test');
  const files={};cache.lines.forEach(l=>{if(!files[l.source_filename])files[l.source_filename]=[];files[l.source_filename].push(l);});
  const fileOrder=les.source_files||Object.keys(files);
  const tp=TOPICS[S.topic]||{color:'#F59E0B'};
  m.innerHTML=`<div class="pg">
    <button class="back" onclick="goModules()">← Back to Modules</button>
    <h2 style="margin-bottom:4px;color:${tp.color}">Module ${S.mod}: ${les.module_title}</h2>

      <div class="stg-b ${S.stage==='learn'?'on':''}" onclick="setStage('learn')">📖 Learn</div>
      <div class="stg-b ${S.stage==='practice'?'on':''}" onclick="setStage('practice')">⚡ Practice (${pQ.length})</div>
      <div class="stg-b ${S.stage==='test'?'on':''}" onclick="setStage('test')">🧠 Test (${tQ.length})</div>
    </div><div id="sc"></div></div>`;
  const sc=document.getElementById('sc');
  if(S.stage==='learn') renderLearn(sc,les,files,fileOrder);

function setStage(s){S.stage=s;S.answers={};S.revealed={};renderModule();}
function renderLearn(sc,les,files,fileOrder){

        <span style="color:var(--td);font-size:14px">${S.notesOpen?'▼':'▶'}</span>
      </div>
      ${S.notesOpen?`<div class="tabs"><button class="tb ${S.layer==='main'?'on':''}" onclick="setLayer('main')">📖 Explanation</button><button class="tb ${S.layer==='alt'?'on-p':''}" onclick="setLayer('alt')">🔄 Different Angle</button><button class="tb ${S.layer==='chat'?'on-g':''}" onclick="setLayer('chat')">💬 Ask Freely</button></div><div id="lc"></div>`:'<div style="font-size:12.5px;color:var(--td);padding:8px 0">Click to expand</div>'}
    </div>`;
  renderFiles(files,fileOrder);
  if(S.notesOpen) renderLayer(les);
}
function setLayer(l){S.layer=l;S.notesOpen=true;renderModule();}
function toggleNotes(){S.notesOpen=!S.notesOpen;renderModule();}
function renderLayer(les){
  const lc=document.getElementById('lc');if(!lc)return;
  if(S.layer==='main') lc.innerHTML=`<div class="lbox">${md(les.explanation_main)}</div>`;
  else if(S.layer==='alt') lc.innerHTML=`<div class="lbox" style="border-color:rgba(167,139,250,.1)"><div style="font-size:10px;color:var(--p);font-weight:700;letter-spacing:1px;margin-bottom:10px">ALTERNATIVE EXPLANATION</div>${md(les.explanation_alt)}<div style="margin-top:14px;padding:9px 11px;background:rgba(167,139,250,.05);border-radius:6px;font-size:12px;color:var(--tm)">Try "Ask Freely" for personalized help.</div></div>`;
  else{lc.innerHTML=`<div class="ch-b"><div class="ch-h">Ask anything — powered by Claude API</div><div class="ch-m" id="cms">${S.chatMsgs.length===0?'<div class="ch-e">🤔 Ask any question about this topic</div>':''}${S.chatMsgs.map(m=>'<div style="display:flex;justify-content:'+(m.r==='a'?'flex-start':'flex-end')+';margin-bottom:8px"><div class="bub '+(m.r==='a'?'ai':'us')+'">'+md(m.t)+'</div></div>').join('')}</div><div class="ch-i"><input id="ci" placeholder="Ask..." onkeydown="if(event.key==='Enter')sendMsg()"><button onclick="sendMsg()">Send</button></div></div>`;const cms=document.getElementById('cms');if(cms)cms.scrollTop=cms.scrollHeight;}
}
async function sendMsg(){const i=document.getElementById('ci');const t=i.value.trim();if(!t)return;i.value='';S.chatMsgs.push({r:'u',t});renderLayer(cache.lessons[0]);try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:'You are CodeSensei, a patient coding tutor for a beginner named Aniket in Japan. Under 150 words. Use **bold** and `backticks`. Encouraging.',messages:S.chatMsgs.map(m=>({role:m.r==='u'?'user':'assistant',content:m.t}))})});const d=await r.json();S.chatMsgs.push({r:'a',t:d.content.map(c=>c.text||'').join('')});}catch(e){S.chatMsgs.push({r:'a',t:'Great question! Let me try a different angle.\n\nThink of code like a recipe — each line is one step. The computer follows them top to bottom.\n\nAsk something more specific and I can help!'});}renderLayer(cache.lessons[0]);}
function renderFiles(files,fileOrder){const sf=document.getElementById('sf');if(!sf)return;promptContexts=[];const les=cache.lessons?cache.lessons[0]:null;const topicId=S.topic;const modNum=S.mod;const modTitle=les?les.module_title:'';sf.innerHTML=fileOrder.map(fn=>{const fn2=fn.trim();const exps=files[fn2];if(!exps||!exps.length)return'';return`<div style="margin-bottom:16px"><div class="sf-h">📄 ${fn2}</div><div class="sf-b">${exps.map(e=>{const k=fn2+'-'+e.line_number;const open=S.openLines[k];const code=e.code_text||e.concept_tag||'';const ctx={type:'line',topic:topicId,module:modNum,moduleTitle:modTitle,filename:fn2,lineNum:e.line_number,code:code,explanation:e.explanation||''};return`<div><div class="sl${open?' on':''}" onclick="togLine('${k}')"><span class="sl-n">${e.line_number}</span><span class="sl-c">${esc(code)}</span><span class="sl-h">${open?'▼':'💡'}</span></div>${open?'<div class="sl-e">'+md(e.explanation)+promptBtns(ctx)+'</div>':''}</div>`;}).join('')}</div></div>`;}).join('');}
function togLine(k){S.openLines[k]=!S.openLines[k];const les=cache.lessons[0];const files={};cache.lines.forEach(l=>{if(!files[l.source_filename])files[l.source_filename]=[];files[l.source_filename].push(l);});renderFiles(files,les.source_files||Object.keys(files));}
function renderQs(sc,qs,label){if(!qs.length){sc.innerHTML='<div style="text-align:center;color:var(--td);padding:40px">No questions yet.</div>';return;}const isT=label==='TEST';sc.innerHTML=`<div style="font-size:11px;color:${isT?'var(--p)':'var(--a)'};font-weight:700;letter-spacing:1px;margin-bottom:14px">${label} — ${qs.length} QUESTIONS</div>${qs.map((q,qi)=>{const a=S.answers[qi]!==undefined;const rv=S.revealed[qi];let opts='';if(q.challenge_type==='multiple_choice'&&q.options){const os=typeof q.options==='string'?JSON.parse(q.options):q.options;opts=os.map((o,oi)=>{let c='qo';if(a&&S.answers[qi]===oi)c+=o===q.correct_answer?' ok':' no';if(a&&o===q.correct_answer)c+=' ok';return`<div class="${c}" onclick="ansQ(${qi},${oi})">${esc(o)}</div>`;}).join('');}return`<div class="qc"><div class="ql" style="color:${isT?'var(--p)':'var(--a)'}">Q${qi+1} · ${q.challenge_type.replace(/_/g,' ').toUpperCase()}</div><div class="qt">${md(q.question)}</div>${q.code_snippet?'<pre class="qcd">'+esc(q.code_snippet)+'</pre>':''}${opts}${q.challenge_type!=='multiple_choice'&&!rv?'<button style="padding:8px 16px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--as);color:var(--a)" onclick="revQ('+qi+')">Show Answer</button>':''}${rv||a?'<div style="margin-top:10px"><div style="font-size:11px;color:var(--g);font-weight:600;margin-bottom:6px">ANSWER:</div><pre class="qcd">'+esc(q.correct_answer)+'</pre></div>':''}${(rv||a)&&q.explanation?'<div class="qx">'+md(q.explanation)+'</div>':''}</div>`;}).join('')}${isT?scoreHtml(qs):''}`;
}
function ansQ(qi,oi){if(S.answers[qi]!==undefined)return;S.answers[qi]=oi;renderModule();}
function revQ(qi){S.revealed[qi]=true;renderModule();}
function scoreHtml(qs){const mc=qs.filter(q=>q.challenge_type==='multiple_choice');const tot=Object.keys(S.answers).length;if(tot<mc.length)return'';let ok=0;mc.forEach((q,qi)=>{const os=typeof q.options==='string'?JSON.parse(q.options):q.options;if(os[S.answers[qi]]===q.correct_answer)ok++;});const pass=ok>=Math.ceil(mc.length*0.6);return`<div class="sc" style="border-color:${pass?'rgba(52,211,153,.2)':'rgba(248,113,113,.2)'}"><div style="font-size:36px;font-weight:700;color:${pass?'var(--g)':'var(--r)'};margin-bottom:4px">${ok}/${mc.length}</div><div style="font-size:13px;color:var(--td)">${pass?'🎉 Passed!':'Need '+Math.ceil(mc.length*0.6)+' to pass.'}</div></div>`;}

async function loadDiff(){
  if(!S.diffA||!S.diffB){alert('Select both commits');return;}
  if(S.diffA===S.diffB){alert('Select two different commits');return;}
  const area=document.getElementById('diff-area');
  area.innerHTML='<div class="ld"><div class="spin"></div>Loading diff from GitHub...</div>';

  try{
    const r=await fetch(`${GH_API}/compare/${S.diffA}...${S.diffB}`);
    if(!r.ok)throw new Error('Compare failed: '+r.status);
    const data=await r.json();
    const file=data.files?.find(f=>f.filename==='index.html');
    if(!file){area.innerHTML='<div style="color:var(--td);padding:20px;text-align:center">No changes to index.html between these commits.</div>';return;}
    S.diffResult={stats:data,file,aheadBy:data.ahead_by,totalCommits:data.total_commits};
    renderDiff();
  }catch(e){
    area.innerHTML=`<div style="color:var(--r);padding:16px;background:var(--c);border-radius:10px;font-size:13px">Error: ${esc(e.message)}</div>`;
  }
}

function renderDiff(){
  const area=document.getElementById('diff-area');
  if(!S.diffResult)return;
  const{file,totalCommits}=S.diffResult;
  const patch=file.patch||'';
  const lines=patch.split('\n');

  // Split into CSS / HTML / JS sections
  let currentSection='';
  const sections={};
  lines.forEach(line=>{
    if(line.startsWith('@@')){
      // Detect section from context
      if(line.includes('<style')||line.includes('</style'))currentSection='CSS';
      else if(line.includes('<script')||line.includes('</script')||line.includes('function ')||line.includes('const '))currentSection='JS';
      else currentSection='HTML';
    }
    if(!currentSection)currentSection='HTML';
    if(!sections[currentSection])sections[currentSection]=[];
    sections[currentSection].push(line);
  });

  const changedPct=Math.round(((file.additions+file.deletions)/Math.max(file.changes,1))*100);
  const isRewrite=file.additions>200&&file.deletions>200&&changedPct>80;
  promptContexts=[];
  const patchLines=(file.patch||'').split('\n').filter(l=>l.startsWith('+')||l.startsWith('-')).slice(0,8).join('\n');

  area.innerHTML=`
    <div style="background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="font-size:13px;font-weight:600">index.html</div>
        <span style="color:var(--g);font-size:12px">+${file.additions}</span>
        <span style="color:var(--r);font-size:12px">−${file.deletions}</span>
        <span style="font-size:11px;color:var(--td)">${totalCommits} commit${totalCommits>1?'s':''} between</span>
        ${isRewrite?'<span class="badge badge-review">⚠ Major rewrite</span>':''}
      </div>
    </div>

    <!-- AI Analysis -->
    <div id="ai-analysis">
      ${S.diffAnalysis?'<div class="diff-analysis">'+md(S.diffAnalysis)+'</div>':`
        <button onclick="analyzeDiff()" style="width:100%;padding:12px;background:var(--c);border:1px solid var(--bd);border-radius:10px;color:var(--b);font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px">
          ${S.analyzing?'<div class="spin" style="margin:0"></div> Analyzing...':'🤖 Analyze with AI — What changed and why?'}
        </button>`}
    </div>

    <!-- Ask about this diff -->
    <div style="background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:12px">
      <div style="font-size:10px;color:var(--b);font-weight:700;letter-spacing:1px;margin-bottom:8px">📋 ASK CLAUDE ABOUT THIS DIFF</div>
      ${promptBtns({type:'diff',commitA:S.diffA?.slice(0,7)||'?',commitB:S.diffB?.slice(0,7)||'?',additions:file.additions,deletions:file.deletions,patchSnippet:patchLines})}
    </div>

    <!-- Diff sections -->
    ${Object.entries(sections).map(([sec,slines])=>`
      <div class="diff-box">
        <div class="diff-sec">${sec==='CSS'?'🎨':'JS'===sec?'⚡':'📄'} ${sec} Changes</div>
        <div style="max-height:400px;overflow:auto;padding:4px 0">
          ${slines.slice(0,150).map(l=>{
            if(l.startsWith('@@'))return`<div style="padding:4px 12px;font-size:10px;color:var(--td);background:rgba(56,189,248,.04);font-family:monospace">${esc(l)}</div>`;
            if(l.startsWith('+'))return`<div class="diff-add">+${esc(l.slice(1))}</div>`;
            if(l.startsWith('-'))return`<div class="diff-del">−${esc(l.slice(1))}</div>`;
            return`<div class="diff-ctx"> ${esc(l.slice(1)||l)}</div>`;
          }).join('')}
          ${slines.length>150?`<div style="padding:8px 12px;font-size:11px;color:var(--td);text-align:center">... ${slines.length-150} more lines</div>`:''}
        </div>
      </div>
    `).join('')}
  `;
}

async function analyzeDiff(){
  if(S.analyzing||!S.diffResult)return;
  S.analyzing=true;
  renderDiff();

  const{file}=S.diffResult;
  const patch=(file.patch||'').slice(0,6000); // Limit to 6k chars for API

  try{
    // Check Supabase cache first
    const cached=await sbq('code_sensei_diff_explanations',`select=explanation&revision_from=eq.${S.diffA.slice(0,7)}&revision_to=eq.${S.diffB.slice(0,7)}&project_name=eq.ghost_tracker&limit=1`);
    if(cached.length>0&&cached[0].explanation){
      S.diffAnalysis=cached[0].explanation;
    }else{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:`You are CodeSensei analyzing code changes for Aniket, a beginner developer learning full-stack. Analyze this diff of a single-file HTML app (Ghost Assembly Tracker — used at his company for tracking robot assembly).

Rules:
- Be honest: if this is a complete rewrite, say so — don't pretend line-by-line analysis helps
- Split your analysis into CSS changes, HTML changes, and JS changes
- For each section, explain WHAT changed and WHY in plain language
- Use **bold** for key terms, \`backticks\` for code
- Mention specific concepts being used (flexbox, fetch API, event handling, etc.)
- Connect to learning: "This is a great example of X concept"
- Keep under 300 words total
- If the diff is too large, focus on the 3 most important changes`,
          messages:[{role:'user',content:`Analyze this diff:\n\nAdditions: ${file.additions}, Deletions: ${file.deletions}\n\nPatch:\n${patch}`}]})});
      const d=await r.json();
      S.diffAnalysis=d.content.map(c=>c.text||'').join('');
      // Cache in Supabase
      await sbPost('code_sensei_diff_explanations',{revision_from:S.diffA.slice(0,7),revision_to:S.diffB.slice(0,7),project_name:'ghost_tracker',filename:'index.html',explanation:S.diffAnalysis,change_type:file.additions>200&&file.deletions>200?'rewrite':'incremental'});
    }
  }catch(e){
    S.diffAnalysis='**Could not analyze this diff automatically.** The Claude API may not be available.\n\nHere is what I can tell from the numbers:\n- **'+file.additions+' lines added**, **'+file.deletions+' lines removed**\n- '+(file.additions>200&&file.deletions>200?'This looks like a **major rewrite** rather than a small fix. The entire structure may have changed.':'This looks like a **targeted change** — specific fixes to a few sections.')+'\n\nTry reading through the diff sections below to see what changed.';
  }
  S.analyzing=false;
  renderDiff();
}

// PROMPT GENERATOR (for train study)
// ═══════════════════════════════════════
function buildPrompt(intent, context) {
  const intents = {
    explain: "I don't fully understand this. Can you explain it using a completely different analogy or approach? Keep it simple — I'm a beginner.",
    why: "I understand the basic syntax but I don't see why this is useful. When would I actually need this in a real project? Give me a concrete real-world scenario.",
    example: "Can you show me a practical, real-world example of this concept? Something I could actually type and run to see it working."
  };
  const intentText = intents[intent] || intents.explain;

  if (context.type === 'line') {
    return `I'm studying ${context.topic} Module ${context.module} (${context.moduleTitle}) in CodeSensei.

I'm looking at file: ${context.filename}
Line ${context.lineNum}: \`${context.code}\`

${context.explanation ? 'The current explanation says: "' + context.explanation.slice(0, 200) + (context.explanation.length > 200 ? '..."' : '"') : 'There is no explanation yet for this line.'}

${intentText}`;
  }

  if (context.type === 'diff') {
    return `I'm studying my Ghost Tracker app revisions in CodeSensei.

Comparing: ${context.commitA} → ${context.commitB}
Changes: +${context.additions} lines added, -${context.deletions} lines removed

${context.patchSnippet ? 'Here is the specific change I am confused about:\n```\n' + context.patchSnippet + '\n```\n' : ''}
${intentText}`;
  }

  return intentText;
}

function showPrompt(intent, context) {
  const prompt = buildPrompt(intent, context);
  // Remove any existing popup
  document.getElementById('prompt-popup')?.remove();
  document.getElementById('copied-toast')?.remove();

  const popup = document.createElement('div');
  popup.id = 'prompt-popup';
  popup.className = 'prompt-popup';
  popup.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:11px;color:var(--b);font-weight:700;letter-spacing:1px">READY-MADE PROMPT</div>
      <div style="font-size:11px;color:var(--td)">Copy → paste into Claude chat</div>
    </div>
    <div class="prompt-text" id="prompt-text">${esc(prompt)}</div>
    <div class="prompt-actions">
      <button class="prompt-copy" onclick="copyPrompt()">📋 Copy Prompt</button>
      <button class="prompt-close" onclick="closePrompt()">Close</button>
    </div>
  `;
  document.body.appendChild(popup);
}

function copyPrompt() {
  const text = document.getElementById('prompt-text')?.innerText;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copied-toast')?.remove();
    const toast = document.createElement('div');
    toast.id = 'copied-toast';
    toast.className = 'copied-toast';
    toast.textContent = '✓ Copied! Paste into Claude chat';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  });
}

function closePrompt() {
  document.getElementById('prompt-popup')?.remove();
}

function promptBtns(context) {
  const idx = promptContexts.length;
  promptContexts.push(context);
  return `<div class="prompt-row">
    <button class="prompt-btn" onclick="event.stopPropagation();showPrompt('explain',promptContexts[${idx}])"><span class="pb-icon">🔄</span> Explain differently</button>
    <button class="prompt-btn" onclick="event.stopPropagation();showPrompt('why',promptContexts[${idx}])"><span class="pb-icon">🎯</span> Why does this matter?</button>
    <button class="prompt-btn" onclick="event.stopPropagation();showPrompt('example',promptContexts[${idx}])"><span class="pb-icon">💻</span> Show me an example</button>
  </div>`;
}

while(stk.length>1&&stk[stk.length-1].indent>=ind)stk.pop();const par=stk[stk.length-1].node;let nd=null;
if(/^(from\s+\S+\s+)?import\s+/.test(tr)){hasImp=true;tr.replace(/^from\s+\S+\s+import\s+/,'').replace(/^import\s+/,'').split(',').map(s=>s.trim().split(' as ')[0].split('.').pop()).forEach(n=>impG.children.push({name:n,type:'import',children:[],detail:tr,_line:ln,_id:pfx+'n_'+tNodeIdCtr++}));continue;}
if(/^class\s+/.test(tr)){const m=tr.match(/^class\s+(\w+)(\(([^)]*)\))?/);nd={name:m?.[1]||'class',type:'class',children:[],detail:m?.[3]?'inherits: '+m[3]:'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^(async\s+)?def\s+/.test(tr)){const m=tr.match(/^(?:async\s+)?def\s+(\w+)\(([^)]*)\)/);nd={name:(tr.startsWith('async')?'async ':'')+(m?.[1]||'func'),type:'function',children:[],detail:'('+(m?.[2]||'')+')',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^@\w+/.test(tr)){continue;}
else if(/^(for|while)\s+/.test(tr)){const k=tr.startsWith('for')?'For':'While';const m=tr.match(/^(?:for|while)\s+(.+):/);nd={name:k,type:'loop',children:[],detail:m?.[1]?.substring(0,40)||'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^(if|elif|else)\b/.test(tr)){const m=tr.match(/^(if|elif|else)\s*(.*?):/);nd={name:m?.[1]||'if',type:'conditional',children:[],detail:m?.[2]?.substring(0,40)||'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^(async\s+)?with\s+/.test(tr)){nd={name:'with',type:'loop',children:[],detail:'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^(try|except|finally)\b/.test(tr)){nd={name:tr.match(/^(try|except|finally)/)[1],type:'conditional',children:[],detail:'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^self\.(\w+)\s*=/.test(tr)){const m=tr.match(/^self\.(\w+)/);nd={name:'self.'+m[1],type:'variable',children:[],detail:'instance attr',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^[A-Za-z_]\w*\s*([:+\-*\/]?=)/.test(tr)){const vn=tr.match(/^(\w+)/)?.[1]||'var';if(vn==='self')continue;nd={name:tr.substring(0,30),type:'variable',children:[],detail:'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^[A-Za-z_]\w*(\.\w+)*\s*\(/.test(tr)&&par.type!=='module'){nd={name:tr.substring(0,30),type:'statement',children:[],detail:'',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
else if(/^return\b/.test(tr)&&par.type!=='module'){nd={name:tr.substring(0,30),type:'statement',children:[],detail:'return',_line:ln,_id:pfx+'n_'+tNodeIdCtr++};}
if(nd){par.children.push(nd);stk.push({node:nd,indent:ind});}}
if(hasImp)root.children.unshift(impG);return root;}
function tCountDesc(n){let c=0;if(n.children)for(const ch of n.children){c++;c+=tCountDesc(ch);}return c;}

// Shape config
const TS={project:{color:'#dbeafe',stroke:'#60a5fa',w:180,h:44,r:8},file:{color:'#fef9c3',stroke:'#eab308',w:200,h:36,r:4},module:{color:'#dbeafe',stroke:'#60a5fa',w:140,h:40,r:20},class:{color:'#d1fae5',stroke:'#34d399',w:150,h:42,r:21},function:{color:'#fee2e2',stroke:'#f87171',w:140,h:38,r:0},variable:{color:'#fef3c7',stroke:'#f59e0b',w:150,h:32,r:4},loop:{color:'#f1f5f9',stroke:'#94a3b8',w:150,h:60,r:0},import:{color:'#f3e8ff',stroke:'#a78bfa',w:110,h:30,r:15},conditional:{color:'#ffedd5',stroke:'#fb923c',w:130,h:40,r:0},statement:{color:'#fef9c3',stroke:'#d97706',w:150,h:28,r:3}};
function tDrawShape(g,type,w,h){const c=TS[type]||TS.variable;
if(type==='function'){const hw=w/2,hh=h/2,i=16;g.append('polygon').attr('class','tshape').attr('points',`${-hw+i},${-hh} ${hw-i},${-hh} ${hw},0 ${hw-i},${hh} ${-hw+i},${hh} ${-hw},0`).attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);}
else if(type==='loop'){const hw=w/2,hh=h/2;g.append('polygon').attr('class','tshape').attr('points',`${-hw+10},${-hh} ${hw-10},${-hh} ${hw},${-hh+16} ${hw},${hh} ${-hw},${hh} ${-hw},${-hh+16}`).attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);g.append('line').attr('x1',-hw).attr('x2',hw).attr('y1',-hh+16).attr('y2',-hh+16).attr('stroke',c.stroke).attr('stroke-width',1).attr('opacity',.3);}
else if(type==='conditional'){const hw=w/2,hh=h/2;g.append('polygon').attr('class','tshape').attr('points',`0,${-hh} ${hw},0 0,${hh} ${-hw},0`).attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);}
else if(type==='statement'){g.append('rect').attr('class','tshape').attr('x',-w/2).attr('y',-h/2).attr('width',w).attr('height',h).attr('rx',c.r).attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',1.5).attr('stroke-dasharray','4,3');}
else{g.append('rect').attr('class','tshape').attr('x',-w/2).attr('y',-h/2).attr('width',w).attr('height',h).attr('rx',c.r).attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);}}
const TB={project:'PROJECT',file:'FILE',module:'MODULE',class:'CLASS',function:'ƒ FUNC',variable:'VAR',loop:'',import:'IMPORT',conditional:'COND',statement:''};

// Layout
function tLayoutSub(node,x,y){const cfg=TS[node.type]||TS.variable;const pos=[{node,x,y}];const lks=[];const IND=50,VG=18;let curY=y+cfg.h/2+VG+10;
if(!tCollapsed.has(node._id)&&node.children&&node.children.length>0){for(const ch of node.children){const cc=TS[ch.type]||TS.variable;const cx=x+IND,cy=curY+cc.h/2;const sub=tLayoutSub(ch,cx,cy);pos.push(...sub.pos);lks.push({src:{x,y,type:node.type},tgt:{x:cx,y:cy,type:ch.type}});lks.push(...sub.lks);curY=sub.maxY+VG;}}
let maxY=y+cfg.h/2;for(const p of pos){maxY=Math.max(maxY,p.y+(TS[p.node.type]||TS.variable).h/2);}return{pos,lks,maxY};}

// Draw
function tDraw(allPos,allLks){const panel=document.getElementById('tpanel');if(!panel)return;const svg=d3.select('#tsvg');svg.selectAll('*').remove();
document.getElementById('tinfo').style.display='flex';
const w=panel.clientWidth,h=panel.clientHeight-50;
const defs=svg.append('defs');defs.append('marker').attr('id','tarrow').attr('viewBox','0 -4 8 8').attr('refX',7).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,-3L7,0L0,3Z').attr('fill','#b0b8c8');
tSvgG=svg.append('g');tZoom=d3.zoom().scaleExtent([.05,3]).on('zoom',e=>tSvgG.attr('transform',e.transform));svg.call(tZoom);
tNodePosMap={};tAllNodeMap={};for(const p of allPos){tNodePosMap[p.node._id]={x:p.x,y:p.y};tAllNodeMap[p.node._id]=p.node;}
tSvgG.selectAll('.tlink').data(allLks).enter().append('path').attr('class','tlink').attr('marker-end','url(#tarrow)').attr('d',d=>{const sc=TS[d.src.type]||TS.variable,tc=TS[d.tgt.type]||TS.variable;const sx=d.src.x,sy=d.src.y+sc.h/2,tx=d.tgt.x,ty=d.tgt.y-tc.h/2,my=sy+(ty-sy)*.45;return`M${sx},${sy} L${sx},${my} L${tx},${my} L${tx},${ty}`;});
const nodes=tSvgG.selectAll('.tree-node').data(allPos).enter().append('g').attr('class','tree-node').attr('transform',d=>`translate(${d.x},${d.y})`).attr('data-id',d=>d.node._id);
nodes.each(function(d){tDrawShape(d3.select(this),d.node.type,(TS[d.node.type]||TS.variable).w,(TS[d.node.type]||TS.variable).h);});
nodes.append('text').attr('class','tlabel').attr('y',d=>d.node.type==='loop'?-6:1).attr('font-size',d=>{const n=d.node.name;return n.length>18?'8.5px':n.length>14?'9.5px':n.length>10?'10px':'11px';}).text(d=>{const n=d.node.name;return n.length>24?n.substring(0,22)+'…':n;});
nodes.filter(d=>d.node.type==='loop'&&d.node.detail).append('text').attr('class','tdetail').attr('y',12).attr('font-size','8.5px').text(d=>d.node.detail.length>25?d.node.detail.substring(0,23)+'…':d.node.detail);
nodes.filter(d=>TB[d.node.type]).append('text').attr('class','tbadge').attr('y',d=>-((TS[d.node.type]||TS.variable).h/2)-5).text(d=>TB[d.node.type]||'');
if(!tFlowMode){nodes.filter(d=>d.node.children&&d.node.children.length>0).each(function(d){const g=d3.select(this);const cfg=TS[d.node.type]||TS.variable;const isC=tCollapsed.has(d.node._id);const cnt=tCountDesc(d.node);const by=cfg.h/2+2;const badge=g.append('g').attr('class','tcoll');badge.append('circle').attr('cx',0).attr('cy',by+9).attr('r',9);badge.append('text').attr('x',0).attr('y',by+10).text(isC?'+':'−');if(isC)g.append('text').attr('class','tcount').attr('x',12).attr('y',by+10).text(cnt+' hidden');});
nodes.on('click',function(e,d){e.stopPropagation();if(!d.node.children||!d.node.children.length)return;if(tCollapsed.has(d.node._id))tCollapsed.delete(d.node._id);else tCollapsed.add(d.node._id);tReRender();});}
const tip=document.getElementById('ttooltip');
nodes.on('mouseenter',(e,d)=>{tip.innerHTML=`<div class="ttt">${(d.node.type||'').toUpperCase()}: ${d.node.name}</div>`+(d.node.detail?`<div class="ttd">${d.node.detail}</div>`:'')+(d.node._line?`<div class="ttd">Line ${d.node._line}</div>`:'');tip.classList.add('visible');});
nodes.on('mousemove',e=>{tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';});
nodes.on('mouseleave',()=>tip.classList.remove('visible'));
// Stats
let nc=0,fc=0,cc=0,fn=0;for(const p of allPos){nc++;if(p.node.type==='file')fc++;if(p.node.type==='class')cc++;if(p.node.type==='function')fn++;}
document.getElementById('tsN').textContent=nc;document.getElementById('tsF').textContent=fc||1;document.getElementById('tsC').textContent=cc;document.getElementById('tsFn').textContent=fn;
// Auto-fit
requestAnimationFrame(()=>{const b=tSvgG.node().getBBox();const pad=60;const topP=tFlowMode?65:10;const sc=Math.min(w/(b.width+pad*2),(h-topP)/(b.height+pad*2),1);const tx=w/2-(b.x+b.width/2)*sc;const ty=topP+pad+(-b.y)*sc;svg.call(tZoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));});
if(tFlowMode&&tFlowSteps.length>0)tApplyFlow();}

// Render modes
function tRenderSingle(){tSave();const f=tFiles[tActiveIdx];if(!f.code.trim())return;
const parsed=tParse(f.code,'f0_');const fn=f.name.replace(/\.py$/,'');const pn=document.getElementById('tpname')?.value||'Project';
const proj={name:pn,type:'project',children:[],_line:0,_id:'proj'};const fNode={name:fn,type:'file',children:parsed.children,_line:0,_id:'file_0',detail:f.name};
tLastParsed=[fNode];const PY=0,FY=80;
const ap=[{node:proj,x:0,y:PY},{node:fNode,x:0,y:FY}];const al=[{src:{x:0,y:PY,type:'project'},tgt:{x:0,y:FY,type:'file'}}];
const sub=tLayoutSub(fNode,0,FY);for(let i=1;i<sub.pos.length;i++)ap.push(sub.pos[i]);al.push(...sub.lks);
tDraw(ap,al);if(tFlowMode)tBuildFlowSteps(ap);}

function tRenderClass(){tSave();const pn=document.getElementById('tpname')?.value||'Project';
const fts=tFiles.map((f,i)=>{if(!f.code.trim())return null;const p=tParse(f.code,'f'+i+'_');return{name:f.name.replace(/\.py$/,''),type:'file',children:p.children,detail:f.name,_line:0,_id:'file_'+i};}).filter(Boolean);
if(!fts.length)return;tLastParsed=fts;
const PY=0,FY=80,FG=80;
const fls=fts.map(ft=>{const sub=tLayoutSub(ft,0,FY);let mn=Infinity,mx=-Infinity;for(const p of sub.pos){const c=TS[p.node.type]||TS.variable;mn=Math.min(mn,p.x-c.w/2);mx=Math.max(mx,p.x+c.w/2);}return{...sub,cw:mx-mn,mn,mx};});
const tw=fls.reduce((s,l)=>s+l.cw,0)+FG*(fls.length-1);let cx=-tw/2;
const proj={name:pn,type:'project',children:[],_line:0,_id:'proj',detail:fts.length+' files'};
const ap=[{node:proj,x:0,y:PY}];const al=[];
for(let fi=0;fi<fls.length;fi++){const fl=fls[fi];const ox=cx-fl.mn;for(const p of fl.pos)ap.push({node:p.node,x:p.x+ox,y:p.y});for(const lk of fl.lks)al.push({src:{x:lk.src.x+ox,y:lk.src.y,type:lk.src.type},tgt:{x:lk.tgt.x+ox,y:lk.tgt.y,type:lk.tgt.type}});al.push({src:{x:0,y:PY,type:'project'},tgt:{x:fl.pos[0].x+ox,y:FY,type:'file'}});cx+=fl.cw+FG;}
tDraw(ap,al);if(tFlowMode)tBuildFlowSteps(ap);}

function tReRender(){if(tMode==='single')tRenderSingle();else tRenderClass();}

// Flow engine
function tBuildFlowSteps(allPos){const exec=new Set(['variable','function','loop','conditional','statement']);const fdefs={};
for(const p of allPos)if(p.node.type==='function')fdefs[p.node.name]=p.node._id;
tFlowSteps=allPos.filter(p=>exec.has(p.node.type)&&p.node._line>0).sort((a,b)=>a.node._line-b.node._line).map(en=>{const step={primary:en.node._id,name:en.node.name,type:en.node.type,line:en.node._line,parallel:null};if(en.node.type==='variable'){const cm=en.node.name.match(/=\s*(\w+)\s*\(/);if(cm&&fdefs[cm[1]])step.parallel=fdefs[cm[1]];}return step;});
tFlowIdx=-1;const te=document.getElementById('tfTotal');if(te)te.textContent=tFlowSteps.length;const se=document.getElementById('tfStep');if(se)se.textContent='0';const sn=document.getElementById('tfName');if(sn)sn.textContent='Ready';tUpdateFlowBtns();}

function tApplyFlow(){if(!tSvgG)return;const nEls=tSvgG.selectAll('.tree-node');const lEls=tSvgG.selectAll('.tlink');
if(tFlowIdx<0||tFlowIdx>=tFlowSteps.length){nEls.attr('class','tree-node dimmed');lEls.attr('class','tlink dimmed');return;}
const step=tFlowSteps[tFlowIdx];tVisited.add(step.primary);if(step.parallel)tVisited.add(step.parallel);
const anc=new Set();function findAnc(tid){const pm={};function walk(n,pid){if(n._id===tid){let p=pid;while(p){anc.add(p);p=pm[p];}return true;}if(n.children)for(const ch of n.children){pm[ch._id]=n._id;if(walk(ch,n._id))return true;}return false;}if(tLastParsed)for(const ft of tLastParsed){pm[ft._id]='proj';walk(ft,ft._id);}anc.add('proj');}
for(const vid of tVisited)findAnc(vid);
nEls.attr('class',d=>{const id=d.node._id;if(id===step.primary)return'tree-node active-step';if(step.parallel&&id===step.parallel)return'tree-node parallel-step';if(tVisited.has(id))return'tree-node visited';if(anc.has(id))return'tree-node ancestor';return'tree-node dimmed';});
lEls.attr('class','tlink dimmed');
const se=document.getElementById('tfStep');if(se)se.textContent=tFlowIdx+1;
const sn=document.getElementById('tfName');if(sn)sn.textContent=(step.parallel?step.name+' → calls '+((tAllNodeMap[step.parallel]||{}).name||'func'):step.name);
tUpdateFlowBtns();
const pos=tNodePosMap[step.primary];if(pos){const panel=document.getElementById('tpanel');const w=panel.clientWidth,h=panel.clientHeight;const ct=d3.zoomTransform(d3.select('#tsvg').node());d3.select('#tsvg').transition().duration(400).call(tZoom.transform,d3.zoomIdentity.translate(w/2-pos.x*ct.k,h/2-pos.y*ct.k).scale(ct.k));}}

function tUpdateFlowBtns(){const p=document.getElementById('tfPrev');const n=document.getElementById('tfNext');if(p)p.disabled=tFlowIdx<=0;if(n)n.disabled=tFlowIdx>=tFlowSteps.length-1;}
function tfNext(){if(tFlowIdx<tFlowSteps.length-1){tFlowIdx++;tApplyFlow();}}
function tfPrev(){if(tFlowIdx>0){tFlowIdx--;tVisited.clear();for(let i=0;i<=tFlowIdx;i++){tVisited.add(tFlowSteps[i].primary);if(tFlowSteps[i].parallel)tVisited.add(tFlowSteps[i].parallel);}tApplyFlow();}else if(tFlowIdx===0){tFlowIdx=-1;tVisited.clear();tApplyFlow();}}
function tfReset(){tFlowIdx=-1;tVisited.clear();tFlowPlaying=false;clearInterval(tFlowTimer);const pb=document.getElementById('tfPlay');if(pb){pb.textContent='▶';pb.classList.remove('playing');}tApplyFlow();const se=document.getElementById('tfStep');if(se)se.textContent='0';const sn=document.getElementById('tfName');if(sn)sn.textContent='Ready';tUpdateFlowBtns();}
function tfTogglePlay(){if(tFlowPlaying){tFlowPlaying=false;clearInterval(tFlowTimer);const pb=document.getElementById('tfPlay');if(pb){pb.textContent='▶';pb.classList.remove('playing');}return;}tFlowPlaying=true;const pb=document.getElementById('tfPlay');if(pb){pb.textContent='⏸';pb.classList.add('playing');}const spd=parseInt(document.getElementById('tfSpeed')?.value)||800;tFlowTimer=setInterval(()=>{if(tFlowIdx>=tFlowSteps.length-1){tFlowPlaying=false;clearInterval(tFlowTimer);const pb=document.getElementById('tfPlay');if(pb){pb.textContent='▶';pb.classList.remove('playing');}return;}tfNext();},spd);}
function tToggleFlow(){tFlowMode=!tFlowMode;document.getElementById('tFlowBtn')?.classList.toggle('flow-on',tFlowMode);document.getElementById('tflowbar').style.display=tFlowMode?'flex':'none';if(tFlowMode){tCollapsed.clear();tVisited.clear();tfReset();}else{tFlowPlaying=false;clearInterval(tFlowTimer);}tReRender();}
function tSetMode(m){tMode=m;document.getElementById('tmSingle')?.classList.toggle('on',m==='single');document.getElementById('tmClass')?.classList.toggle('on',m==='class');tCollapsed.clear();if(tFlowMode)tfReset();tParseAndRender();}
function tParseAndRender(){tSave();tCollapsed.clear();tReRender();}
function tLoadSample(k){const s=T_SAMPLES[k];tFiles=s.files.map(f=>({...f}));tActiveIdx=0;const ce=document.getElementById('tcode');const fe=document.getElementById('tfname');const pe=document.getElementById('tpname');if(ce)ce.value=tFiles[0].code;if(fe)fe.value=tFiles[0].name;if(pe)pe.value=s.name;tCollapsed.clear();if(tFlowMode)tfReset();tRenderTabs();if(k==='quiz')tSetMode('class');else tSetMode('single');}
function tZoomIn(){d3.select('#tsvg').transition().duration(300).call(tZoom.scaleBy,1.4);}
function tZoomOut(){d3.select('#tsvg').transition().duration(300).call(tZoom.scaleBy,.7);}
function tZoomReset(){tReRender();}

// Main entry: render the tree section
function goTree(){
  S.view='tree';setNav('nav-tree');
  document.getElementById('main').innerHTML=`<div class="tree-wrap">
    <div class="tree-code-panel">
      <div class="tree-code-top"><h3>Python Source</h3>
        <div style="display:flex;gap:4px;align-items:center">
          <div class="tree-mode-toggle"><button class="tree-mode-btn on" id="tmSingle" onclick="tSetMode('single')">📄</button><button class="tree-mode-btn" id="tmClass" onclick="tSetMode('class')">🏗️</button></div>
          <button class="tree-mode-btn" id="tFlowBtn" onclick="tToggleFlow()" style="border:1px solid var(--bd);border-radius:4px">⚡</button>
          <button style="padding:4px 12px;background:var(--a);color:var(--bg);border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer" onclick="tParseAndRender()">▶ Parse</button>
        </div>
      </div>
      <div class="tree-input-row"><label>project:</label><input class="tree-input-sm" id="tpname" value="My Project" /></div>
      <div class="tree-ftabs" id="tftabs"></div>
      <div class="tree-input-row"><label>file:</label><input class="tree-input-sm" id="tfname" value="main.py" style="color:var(--a)" /></div>
      <textarea class="tree-textarea" id="tcode" spellcheck="false" placeholder="Paste Python code here..."></textarea>
      <div class="tree-samples">
        <button class="tree-sample-btn" onclick="tLoadSample('single')">Single File</button>
        <button class="tree-sample-btn" onclick="tLoadSample('quiz')">Quiz Project</button>
      </div>
    </div>
    <div class="tree-panel" id="tpanel">
      <div class="tree-flow-bar" id="tflowbar" style="display:none">
        <button class="tree-flow-btn" onclick="tfReset()">⏮</button>
        <button class="tree-flow-btn" id="tfPrev" onclick="tfPrev()">◀</button>
        <button class="tree-flow-btn" id="tfPlay" onclick="tfTogglePlay()">▶</button>
        <button class="tree-flow-btn" id="tfNext" onclick="tfNext()">▶▶</button>
        <div class="tree-step-info">Step <span class="snum" id="tfStep">0</span> / <span id="tfTotal">0</span></div>
        <div class="tree-step-name" id="tfName">—</div>
        <div class="tree-speed"><span>Speed:</span><input type="range" min="300" max="2000" value="800" step="100" id="tfSpeed" /></div>
      </div>
      <svg id="tsvg"></svg>
      <div class="tree-info" id="tinfo" style="display:none">
        <div class="tstats"><span>Nodes: <span class="tval" id="tsN">0</span></span><span>Files: <span class="tval" id="tsF">0</span></span><span>Classes: <span class="tval" id="tsC">0</span></span><span>Funcs: <span class="tval" id="tsFn">0</span></span></div>
        <div style="display:flex;gap:3px"><button class="tree-zbtn" onclick="tZoomIn()">+</button><button class="tree-zbtn" onclick="tZoomOut()">−</button><button class="tree-zbtn" onclick="tZoomReset()">⌂</button></div>
      </div>
    </div>
  </div><div class="tree-ttip" id="ttooltip"></div>`;
  tRenderTabs();
  // Load first file content if available
  const ce=document.getElementById('tcode');const fe=document.getElementById('tfname');
  if(ce)ce.value=tFiles[tActiveIdx].code;if(fe)fe.value=tFiles[tActiveIdx].name;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
goDash();
</script>
