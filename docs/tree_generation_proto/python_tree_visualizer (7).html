<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeSensei — Python Structure Tree</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap');
  :root {
    --bg:#0c0e14;--bg2:#13161f;--bg3:#1a1e2a;--bg4:#212636;
    --bd:#2a3042;--bda:#3d4663;
    --tx:#e8eaf0;--tx2:#8b92a8;--txm:#555e78;
    --acc:#6c8cff;
    --c-proj:#7ca4f0;--c-file:#f5d060;--c-mod:#5b8def;--c-cls:#34d399;
    --c-fn:#f87171;--c-var:#fbbf24;--c-lp:#94a3b8;--c-imp:#c084fc;--c-cond:#fb923c;
    --lk:#3a4260;
    /* Tree panel light theme */
    --tree-bg:#ffffff;--tree-bg2:#f8f9fc;--tree-grid:#e8ecf2;
    --tree-lk:#b0b8c8;--tree-tx:#1a1e2a;--tree-tx2:#6b7280;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px;flex-wrap:wrap}
  .header-left{display:flex;align-items:center;gap:10px}
  .logo{width:28px;height:28px;background:linear-gradient(135deg,var(--acc),#a78bfa);border-radius:7px;display:grid;place-items:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
  .header h1{font-size:15px;font-weight:700}
  .header h1 span{color:var(--txm);font-weight:300;margin-left:6px;font-size:13px}
  .toggle-group{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:8px;overflow:hidden;flex-shrink:0}
  .t-btn{padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;border:none;background:transparent;color:var(--txm);cursor:pointer;transition:all .15s;white-space:nowrap}
  .t-btn.active{background:var(--acc);color:#fff}
  .t-btn:hover:not(.active){color:var(--tx);background:var(--bg3)}
  .t-btn.flow-active{background:#10b981;color:#fff}
  .legend{display:flex;gap:6px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--tx2);font-family:'JetBrains Mono',monospace}
  .legend-dot{width:8px;height:8px;flex-shrink:0;border-radius:2px}
  .lg-circ{border-radius:50%}.lg-hex{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}.lg-dia{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}

  .main-container{display:flex;flex:1;min-height:0}

  /* Code panel */
  .code-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--bg2)}
  .code-panel-top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--bd)}
  .code-panel-top h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx2)}
  .btn-parse{padding:5px 14px;background:var(--acc);color:#fff;border:none;border-radius:6px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
  .btn-parse:hover{filter:brightness(1.15)}
  .file-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);background:var(--bg);overflow-x:auto;flex-shrink:0}
  .file-tab{padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;border:none;background:transparent;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:6px}
  .file-tab.active{color:var(--c-file);border-bottom-color:var(--c-file);background:var(--bg2)}
  .file-tab:hover:not(.active){color:var(--tx2);background:var(--bg3)}
  .file-tab .close-tab{font-size:12px;opacity:.4;margin-left:2px}
  .file-tab .close-tab:hover{opacity:1;color:var(--c-fn)}
  .btn-add-tab{padding:7px 10px;font-size:14px;border:none;background:transparent;color:var(--txm);cursor:pointer}
  .btn-add-tab:hover{color:var(--acc)}
  .input-row{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid var(--bd);background:var(--bg)}
  .input-row label{font-size:10px;color:var(--txm);font-family:'JetBrains Mono',monospace;flex-shrink:0}
  .input-sm{flex:1;padding:4px 8px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;color:var(--tx)}
  .input-sm:focus{border-color:var(--acc)}
  .input-sm.file-color{color:var(--c-file)}.input-sm.proj-color{color:var(--c-proj)}
  .code-textarea{flex:1;width:100%;padding:14px;background:var(--bg);color:var(--tx);border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;resize:none;tab-size:4}
  .code-textarea::placeholder{color:var(--txm)}
  .sample-buttons{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd);flex-wrap:wrap}
  .btn-sample{padding:4px 9px;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer}
  .btn-sample:hover{background:var(--bg4);color:var(--tx);border-color:var(--bda)}

  /* Tree panel — WHITE background */
  .tree-panel{flex:1;position:relative;overflow:hidden;background:var(--tree-bg)}
  .tree-panel svg{width:100%;height:100%}
  .node-group{cursor:pointer}
  .node-group:hover .node-shape{filter:brightness(.95) saturate(1.2)}
  .node-label{font-family:'JetBrains Mono',monospace;fill:var(--tree-tx);pointer-events:none;dominant-baseline:middle;text-anchor:middle;font-weight:600}
  .node-badge{font-family:'JetBrains Mono',monospace;font-size:8px;fill:var(--tree-tx2);pointer-events:none;text-anchor:middle}
  .node-detail{font-family:'JetBrains Mono',monospace;font-size:8.5px;fill:var(--tree-tx2);pointer-events:none;text-anchor:middle}
  .link-path{fill:none;stroke:var(--tree-lk);stroke-width:1.5}
  .collapse-badge circle{fill:#f0f2f5;stroke:#c0c8d4;stroke-width:1.5}
  .collapse-badge text{font-family:'JetBrains Mono',monospace;font-size:10px;fill:var(--tree-tx2);text-anchor:middle;dominant-baseline:middle;font-weight:600}
  .collapse-count{font-family:'JetBrains Mono',monospace;font-size:8px;fill:var(--tree-tx2);pointer-events:none;text-anchor:start}

  /* Flow mode styles */
  .node-group.dimmed{opacity:.12;transition:opacity .3s}
  .node-group.visited{opacity:1;transition:opacity .3s}
  .node-group.ancestor{opacity:.45;transition:opacity .3s}
  .node-group.active-step{opacity:1;transition:opacity .3s}
  .node-group.active-step .node-shape{filter:drop-shadow(0 0 8px rgba(16,185,129,.6)) drop-shadow(0 0 16px rgba(16,185,129,.3))}
  .node-group.parallel-step{opacity:1;transition:opacity .3s}
  .node-group.parallel-step .node-shape{filter:drop-shadow(0 0 8px rgba(99,102,241,.6)) drop-shadow(0 0 16px rgba(99,102,241,.3))}
  .link-path.dimmed{opacity:.08;transition:opacity .3s}
  .link-path.active-link{opacity:1;stroke:#10b981;stroke-width:2.5;transition:opacity .3s}
  .step-pointer{pointer-events:none}

  /* Flow controls bar */
  .flow-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;background:linear-gradient(180deg,rgba(255,255,255,.97) 0%,rgba(255,255,255,.85) 100%);border-bottom:1px solid var(--tree-grid);backdrop-filter:blur(8px);z-index:10}
  .flow-btn{width:34px;height:34px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:var(--tree-tx);font-size:15px;cursor:pointer;display:grid;place-items:center;transition:all .12s}
  .flow-btn:hover{background:#f3f4f6;border-color:#9ca3af}
  .flow-btn.playing{background:#10b981;color:#fff;border-color:#10b981}
  .flow-btn:disabled{opacity:.3;cursor:default}
  .step-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tree-tx2);min-width:120px;text-align:center}
  .step-info .step-num{color:#10b981;font-weight:700;font-size:13px}
  .step-name{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tree-tx);background:#f0fdf4;border:1px solid #bbf7d0;padding:4px 10px;border-radius:6px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .speed-control{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tree-tx2);font-family:'JetBrains Mono',monospace}
  .speed-control input{width:50px;accent-color:#10b981}

  .info-bar{position:absolute;bottom:14px;left:14px;right:14px;display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--tree-grid);border-radius:10px;font-size:11px;color:var(--tree-tx2);font-family:'JetBrains Mono',monospace}
  .info-bar .stats{display:flex;gap:12px}
  .info-bar .stat-val{color:var(--acc);font-weight:600}
  .zoom-controls{display:flex;gap:4px}
  .btn-zoom{width:26px;height:26px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px;color:var(--tree-tx2);font-size:13px;cursor:pointer;display:grid;place-items:center}
  .btn-zoom:hover{background:#e5e7eb;color:var(--tree-tx)}
  .empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#9ca3af;pointer-events:none}
  .empty-state .icon{width:52px;height:52px;background:#f3f4f6;border-radius:12px;display:grid;place-items:center;font-size:22px;border:1px solid #e5e7eb}
  .mode-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tree-tx2);position:absolute;top:10px;right:14px;background:#f8f9fc;padding:4px 10px;border-radius:6px;border:1px solid var(--tree-grid);z-index:5}
  .tooltip{position:fixed;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#e2e8f0;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;max-width:280px;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,.3)}
  .tooltip.visible{opacity:1}
  .tooltip .tt-type{color:#6ee7b7;font-weight:600}
  .tooltip .tt-detail{color:#94a3b8;margin-top:2px}

  @media(max-width:768px){
    .main-container{flex-direction:column}
    .code-panel{width:100%;height:40vh;border-right:none;border-bottom:1px solid var(--bd)}
    .tree-panel{height:60vh}
    .legend{display:none}
    .header h1 span{display:none}
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">CS</div>
    <h1>Python Structure Tree<span>CodeSensei</span></h1>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <div class="toggle-group">
      <button class="t-btn active" id="modeSingle" onclick="setMode('single')">📄 Single</button>
      <button class="t-btn" id="modeClass" onclick="setMode('class')">🏗️ Class</button>
    </div>
    <div class="toggle-group">
      <button class="t-btn" id="modeFlow" onclick="toggleFlow()">⚡ Logic Flow</button>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot lg-circ" style="background:var(--c-mod)"></div>Module</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-file)"></div>File</div>
    <div class="legend-item"><div class="legend-dot lg-circ" style="background:var(--c-cls)"></div>Class</div>
    <div class="legend-item"><div class="legend-dot lg-hex" style="background:var(--c-fn)"></div>Func</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-var)"></div>Var</div>
    <div class="legend-item"><div class="legend-dot lg-dia" style="background:var(--c-lp)"></div>Loop</div>
    <div class="legend-item"><div class="legend-dot lg-circ" style="background:var(--c-imp)"></div>Import</div>
    <div class="legend-item"><div class="legend-dot lg-dia" style="background:var(--c-cond)"></div>If/Else</div>
  </div>
</div>

<div class="main-container">
  <div class="code-panel">
    <div class="code-panel-top">
      <h2>Python Source</h2>
      <button class="btn-parse" onclick="parseAndRender()">▶ Parse</button>
    </div>
    <div class="input-row">
      <label>project:</label>
      <input class="input-sm proj-color" id="projectNameInput" placeholder="My Project" value="My Project" />
    </div>
    <div class="file-tabs" id="fileTabs"></div>
    <div class="input-row">
      <label>filename:</label>
      <input class="input-sm file-color" id="filenameInput" placeholder="main.py" />
    </div>
    <textarea class="code-textarea" id="codeInput" spellcheck="false" placeholder="Paste Python code here..."></textarea>
    <div class="sample-buttons">
      <button class="btn-sample" onclick="loadSample('single')">Single File</button>
      <button class="btn-sample" onclick="loadSample('quiz')">Quiz Project (4 files)</button>
    </div>
  </div>

  <div class="tree-panel" id="treePanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">🌳</div>
      <p style="font-size:13px">Paste Python code and hit Parse</p>
      <div style="font-size:11px;font-family:'JetBrains Mono',monospace">or try a sample ↙</div>
    </div>
    <div class="mode-label" id="modeLabel" style="display:none"></div>
    <!-- Flow controls -->
    <div class="flow-bar" id="flowBar" style="display:none">
      <button class="flow-btn" id="flowReset" onclick="flowReset()" title="Reset">⏮</button>
      <button class="flow-btn" id="flowPrev" onclick="flowPrev()" title="Previous">◀</button>
      <button class="flow-btn" id="flowPlay" onclick="flowTogglePlay()" title="Play/Pause">▶</button>
      <button class="flow-btn" id="flowNext" onclick="flowNext()" title="Next">▶▶</button>
      <div class="step-info">Step <span class="step-num" id="flowStepNum">0</span> / <span id="flowStepTotal">0</span></div>
      <div class="step-name" id="flowStepName">—</div>
      <div class="speed-control">
        <span>Speed:</span>
        <input type="range" min="300" max="2000" value="800" step="100" id="flowSpeed" />
      </div>
    </div>
    <svg id="treeSvg"></svg>
    <div class="info-bar" id="infoBar" style="display:none">
      <div class="stats">
        <span>Nodes: <span class="stat-val" id="statNodes">0</span></span>
        <span>Files: <span class="stat-val" id="statFiles">0</span></span>
        <span>Classes: <span class="stat-val" id="statClasses">0</span></span>
        <span>Funcs: <span class="stat-val" id="statFuncs">0</span></span>
      </div>
      <div class="zoom-controls">
        <button class="btn-zoom" onclick="zoomIn()">+</button>
        <button class="btn-zoom" onclick="zoomOut()">−</button>
        <button class="btn-zoom" onclick="zoomReset()">⌂</button>
      </div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
// ══════════════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════════════
let files=[{name:'main.py',code:''}], activeFileIdx=0, currentMode='single';
let currentZoom=null, svgGroup=null;
let collapsedSet=new Set(), nodeIdCounter=0;
let flowMode=false, flowSteps=[], flowIdx=-1, flowPlaying=false, flowTimer=null;
let visitedSet=new Set();
// Map _id -> position {x,y} for panning to nodes
let nodePositionMap = {};
// Map _id -> node data for lookups
let allNodeMap = {};

// ══════════════════════════════════════════════
//  FILE TABS
// ══════════════════════════════════════════════
function renderTabs(){const c=document.getElementById('fileTabs');c.innerHTML='';files.forEach((f,i)=>{const t=document.createElement('button');t.className='file-tab'+(i===activeFileIdx?' active':'');t.innerHTML=`<span>${f.name||'untitled.py'}</span>`+(files.length>1?`<span class="close-tab" onclick="event.stopPropagation();removeFile(${i})">×</span>`:'');t.onclick=()=>switchFile(i);c.appendChild(t);});const a=document.createElement('button');a.className='btn-add-tab';a.textContent='+';a.onclick=addFile;c.appendChild(a);}
function saveCurrentFile(){files[activeFileIdx].code=document.getElementById('codeInput').value;files[activeFileIdx].name=document.getElementById('filenameInput').value||'untitled.py';}
function switchFile(i){saveCurrentFile();activeFileIdx=i;document.getElementById('codeInput').value=files[i].code;document.getElementById('filenameInput').value=files[i].name;renderTabs();}
function addFile(){saveCurrentFile();files.push({name:`file${files.length+1}.py`,code:''});activeFileIdx=files.length-1;document.getElementById('codeInput').value='';document.getElementById('filenameInput').value=files[activeFileIdx].name;renderTabs();}
function removeFile(i){if(files.length<=1)return;files.splice(i,1);if(activeFileIdx>=files.length)activeFileIdx=files.length-1;document.getElementById('codeInput').value=files[activeFileIdx].code;document.getElementById('filenameInput').value=files[activeFileIdx].name;renderTabs();}

// ══════════════════════════════════════════════
//  SAMPLES
// ══════════════════════════════════════════════
const SAMPLES={
  single:{name:'Star Triangle',files:[{name:'1_right_angle_triangle.py',code:`def user_input():\n    height= int(input("Enter height of the star triangle:\\n"))\n\n    return height\n\nheight = user_input()\n\nblanks = height - 1\nstars = 1\n\nfor loops in height:\n\n    blanks -= 1\n    stars += 1\n\n    print(" ")\n    print("*")`}]},
  quiz:{name:'Quiz Project',files:[
    {name:'data.py',code:`question_data = [\n{"text": "A slug's blood is green.", "answer": "True"},\n{"text": "The loudest animal is the African Elephant.", "answer": "False"},\n]`},
    {name:'question_model.py',code:`class Question:\n\n    def __init__(self, q_text, q_answer):\n        self.text = q_text\n        self.answer = q_answer`},
    {name:'quiz_brain.py',code:`from question_model import Question\nfrom data import question_data\n\nclass QuizBrain:\n\n    def __init__(self, q_list):\n        self.question_number = 0\n        self.question_list = q_list\n        self.score = 0\n\n    def still_has_questions(self):\n        return self.question_number < len(self.question_list)\n\n    def new_question(self):\n        current_question = self.question_list[self.question_number]\n        self.question_number += 1\n        user_answer = input(f"Q. {self.question_number}")\n        self.check_answer(user_answer, current_question.answer)\n\n    def check_answer(self, user_answer, correct_answer):\n        if user_answer.lower() == correct_answer.lower():\n            self.score += 1\n            print("You got it right!")\n        else:\n            print("That's wrong.")`},
    {name:'main.py',code:`from question_model import Question\nfrom data import question_data\nfrom quiz_brain import QuizBrain\n\nquestion_bank = []\n\nfor question in question_data:\n    question_text = question["text"]\n    question_answer = question["answer"]\n    new_question = Question(question_text,question_answer)\n    question_bank.append(new_question)\n\nquiz = QuizBrain(question_bank)\n\nwhile quiz.still_has_questions():\n    quiz.new_question()\n\nprint("You've completed the quiz")`}
  ]}
};

// ══════════════════════════════════════════════
//  PARSER
// ══════════════════════════════════════════════
function parsePython(code, filePrefix=''){
  nodeIdCounter=0;
  const lines=code.split('\n');
  const root={name:'module',type:'module',children:[],detail:'',_line:0,_id:filePrefix+'m_'+nodeIdCounter++};
  const stack=[{node:root,indent:-1}];
  const importGroup={name:'imports',type:'import',children:[],detail:'',_line:0,_id:filePrefix+'imp_'+nodeIdCounter++};
  let hasImports=false;

  for(let i=0;i<lines.length;i++){
    const raw=lines[i],trimmed=raw.trimStart();
    if(!trimmed||trimmed.startsWith('#'))continue;
    const indent=raw.length-trimmed.length,lineNum=i+1;
    while(stack.length>1&&stack[stack.length-1].indent>=indent)stack.pop();
    const parent=stack[stack.length-1].node;
    let node=null;

    if(/^(from\s+\S+\s+)?import\s+/.test(trimmed)){
      hasImports=true;
      const names=trimmed.replace(/^from\s+\S+\s+import\s+/,'').replace(/^import\s+/,'')
        .split(',').map(s=>s.trim().split(' as ')[0].split('.').pop());
      for(const n of names)importGroup.children.push({name:n,type:'import',children:[],detail:trimmed,_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++});
      continue;
    }
    if(/^class\s+/.test(trimmed)){const m=trimmed.match(/^class\s+(\w+)(\(([^)]*)\))?/);node={name:m?.[1]||'class',type:'class',children:[],detail:m?.[3]?`inherits: ${m[3]}`:'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^(async\s+)?def\s+/.test(trimmed)){const m=trimmed.match(/^(?:async\s+)?def\s+(\w+)\(([^)]*)\)/);node={name:(trimmed.startsWith('async')?'async ':'')+(m?.[1]||'func'),type:'function',children:[],detail:`(${m?.[2]||''})`,_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^@\w+/.test(trimmed)){continue;}
    else if(/^(for|while)\s+/.test(trimmed)){const kind=trimmed.startsWith('for')?'for':'while';const m=trimmed.match(/^(?:for|while)\s+(.+):/);node={name:kind.charAt(0).toUpperCase()+kind.slice(1),type:'loop',children:[],detail:m?.[1]?.substring(0,40)||'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^(if|elif|else)\b/.test(trimmed)){const m=trimmed.match(/^(if|elif|else)\s*(.*?):/);node={name:m?.[1]||'if',type:'conditional',children:[],detail:m?.[2]?.substring(0,40)||'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^(async\s+)?with\s+/.test(trimmed)){const m=trimmed.match(/^(?:async\s+)?with\s+(.+?)(?:\s+as\s+\w+)?:/);node={name:'with',type:'loop',children:[],detail:m?.[1]?.substring(0,40)||'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^(try|except|finally)\b/.test(trimmed)){node={name:trimmed.match(/^(try|except|finally)/)[1],type:'conditional',children:[],detail:'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^self\.(\w+)\s*=/.test(trimmed)){const m=trimmed.match(/^self\.(\w+)/);node={name:`self.${m[1]}`,type:'variable',children:[],detail:'instance attr',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^[A-Za-z_]\w*\s*([:+\-*\/]?=)/.test(trimmed)){const vn=trimmed.match(/^(\w+)/)?.[1]||'var';if(vn==='self')continue;node={name:trimmed.substring(0,30),type:'variable',children:[],detail:'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^[A-Za-z_]\w*(\.\w+)*\s*\(/.test(trimmed)&&parent.type!=='module'){node={name:trimmed.substring(0,30),type:'statement',children:[],detail:'',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    else if(/^return\b/.test(trimmed)&&parent.type!=='module'){node={name:trimmed.substring(0,30),type:'statement',children:[],detail:'return',_line:lineNum,_id:filePrefix+'n_'+nodeIdCounter++};}
    if(node){parent.children.push(node);stack.push({node,indent});}
  }
  if(hasImports)root.children.unshift(importGroup);
  return root;
}

function countDescendants(n){let c=0;if(n.children)for(const ch of n.children){c++;c+=countDescendants(ch);}return c;}

// ══════════════════════════════════════════════
//  SHAPES (light theme colors — solid fills)
// ══════════════════════════════════════════════
const SC={
  project:  {color:'#dbeafe',stroke:'#60a5fa',w:180,h:44,r:8},
  file:     {color:'#fef9c3',stroke:'#eab308',w:200,h:36,r:4},
  module:   {color:'#dbeafe',stroke:'#60a5fa',w:140,h:40,r:20},
  class:    {color:'#d1fae5',stroke:'#34d399',w:150,h:42,r:21},
  function: {color:'#fee2e2',stroke:'#f87171',w:140,h:38,r:0},
  variable: {color:'#fef3c7',stroke:'#f59e0b',w:150,h:32,r:4},
  loop:     {color:'#f1f5f9',stroke:'#94a3b8',w:150,h:60,r:0},
  import:   {color:'#f3e8ff',stroke:'#a78bfa',w:110,h:30,r:15},
  conditional:{color:'#ffedd5',stroke:'#fb923c',w:130,h:40,r:0},
  statement:{color:'#fef9c3',stroke:'#d97706',w:150,h:28,r:3},
};

function drawShape(g,type,w,h){
  const c=SC[type]||SC.variable;
  if(type==='function'){
    const hw=w/2,hh=h/2,i=16;
    g.append('polygon').attr('class','node-shape')
      .attr('points',`${-hw+i},${-hh} ${hw-i},${-hh} ${hw},0 ${hw-i},${hh} ${-hw+i},${hh} ${-hw},0`)
      .attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);
  }else if(type==='loop'){
    const hw=w/2,hh=h/2;
    g.append('polygon').attr('class','node-shape')
      .attr('points',`${-hw+10},${-hh} ${hw-10},${-hh} ${hw},${-hh+16} ${hw},${hh} ${-hw},${hh} ${-hw},${-hh+16}`)
      .attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);
    g.append('line').attr('x1',-hw).attr('x2',hw).attr('y1',-hh+16).attr('y2',-hh+16).attr('stroke',c.stroke).attr('stroke-width',1).attr('opacity',.3);
  }else if(type==='conditional'){
    const hw=w/2,hh=h/2;
    g.append('polygon').attr('class','node-shape')
      .attr('points',`0,${-hh} ${hw},0 0,${hh} ${-hw},0`)
      .attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);
  }else if(type==='statement'){
    g.append('rect').attr('class','node-shape')
      .attr('x',-w/2).attr('y',-h/2).attr('width',w).attr('height',h)
      .attr('rx',c.r).attr('ry',c.r)
      .attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',1.5).attr('stroke-dasharray','4,3');
  }else{
    g.append('rect').attr('class','node-shape')
      .attr('x',-w/2).attr('y',-h/2).attr('width',w).attr('height',h)
      .attr('rx',c.r).attr('ry',c.r)
      .attr('fill',c.color).attr('stroke',c.stroke).attr('stroke-width',2);
  }
}
const BADGES={project:'PROJECT',file:'FILE',module:'MODULE',class:'CLASS',function:'ƒ FUNC',variable:'VAR',loop:'',import:'IMPORT',conditional:'COND',statement:''};

// ══════════════════════════════════════════════
//  LAYOUT
// ══════════════════════════════════════════════
function layoutSubtree(node,x,y){
  const cfg=SC[node.type]||SC.variable;
  const positions=[{node,x,y}];
  const links=[];
  const INDENT=50,VGAP=18;
  let curY=y+cfg.h/2+VGAP+10;
  const isCollapsed=collapsedSet.has(node._id);
  if(!isCollapsed&&node.children&&node.children.length>0){
    for(const child of node.children){
      const cc=SC[child.type]||SC.variable;
      const childX=x+INDENT, childY=curY+cc.h/2;
      const sub=layoutSubtree(child,childX,childY);
      positions.push(...sub.positions);
      links.push({src:{x,y,type:node.type},tgt:{x:childX,y:childY,type:child.type}});
      links.push(...sub.links);
      curY=sub.maxY+VGAP;
    }
  }
  let maxY=y+cfg.h/2;
  for(const p of positions){const pc=SC[p.node.type]||SC.variable;maxY=Math.max(maxY,p.y+pc.h/2);}
  return{positions,links,maxY};
}

// ══════════════════════════════════════════════
//  DRAW TREE
// ══════════════════════════════════════════════
function drawTree(allPositions,allLinks){
  const container=document.getElementById('treePanel');
  const svg=d3.select('#treeSvg');svg.selectAll('*').remove();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('infoBar').style.display='flex';
  const width=container.clientWidth,height=container.clientHeight-60;

  const defs=svg.append('defs');
  defs.append('marker').attr('id','arrow').attr('viewBox','0 -4 8 8')
    .attr('refX',7).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-3L7,0L0,3Z').attr('fill',flowMode?'#d1d5db':'var(--tree-lk)');

  svgGroup=svg.append('g');
  currentZoom=d3.zoom().scaleExtent([.05,3]).on('zoom',e=>svgGroup.attr('transform',e.transform));
  svg.call(currentZoom);

  // Store positions for flow mode
  nodePositionMap={};allNodeMap={};
  for(const p of allPositions){nodePositionMap[p.node._id]={x:p.x,y:p.y};allNodeMap[p.node._id]=p.node;}

  // Links
  const linkEls=svgGroup.selectAll('.link-path').data(allLinks).enter().append('path')
    .attr('class','link-path').attr('marker-end','url(#arrow)')
    .attr('d',d=>{
      const sc=SC[d.src.type]||SC.variable,tc=SC[d.tgt.type]||SC.variable;
      const sx=d.src.x,sy=d.src.y+sc.h/2,tx=d.tgt.x,ty=d.tgt.y-tc.h/2;
      const midY=sy+(ty-sy)*.45;
      return`M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
    });

  // Nodes
  const nodes=svgGroup.selectAll('.node-group').data(allPositions).enter().append('g')
    .attr('class','node-group').attr('transform',d=>`translate(${d.x},${d.y})`)
    .attr('data-id',d=>d.node._id);

  nodes.each(function(d){const c=SC[d.node.type]||SC.variable;drawShape(d3.select(this),d.node.type,c.w,c.h);});

  nodes.append('text').attr('class','node-label')
    .attr('y',d=>d.node.type==='loop'?-6:1)
    .attr('font-size',d=>{const n=d.node.name;return n.length>18?'8.5px':n.length>14?'9.5px':n.length>10?'10px':'11px';})
    .text(d=>{const n=d.node.name;return n.length>24?n.substring(0,22)+'…':n;});

  nodes.filter(d=>d.node.type==='loop'&&d.node.detail)
    .append('text').attr('class','node-detail').attr('y',12).attr('font-size','8.5px')
    .text(d=>d.node.detail.length>25?d.node.detail.substring(0,23)+'…':d.node.detail);

  nodes.filter(d=>BADGES[d.node.type]).append('text').attr('class','node-badge')
    .attr('y',d=>-((SC[d.node.type]||SC.variable).h/2)-5)
    .text(d=>BADGES[d.node.type]||'');

  // Collapse badges (only when not in flow mode)
  if(!flowMode){
    nodes.filter(d=>d.node.children&&d.node.children.length>0).each(function(d){
      const g=d3.select(this);const cfg=SC[d.node.type]||SC.variable;
      const isC=collapsedSet.has(d.node._id);const cnt=countDescendants(d.node);
      const by=cfg.h/2+2;
      const badge=g.append('g').attr('class','collapse-badge');
      badge.append('circle').attr('cx',0).attr('cy',by+9).attr('r',9);
      badge.append('text').attr('x',0).attr('y',by+10).text(isC?'+':'−');
      if(isC)g.append('text').attr('class','collapse-count').attr('x',12).attr('y',by+10).text(`${cnt} hidden`);
    });
    nodes.on('click',function(event,d){
      event.stopPropagation();
      if(!d.node.children||d.node.children.length===0)return;
      if(collapsedSet.has(d.node._id))collapsedSet.delete(d.node._id);else collapsedSet.add(d.node._id);
      reRender();
    });
  }

  // Tooltip
  const tip=document.getElementById('tooltip');
  nodes.on('mouseenter',(e,d)=>{
    const kids=d.node.children?.length||0;const isC=collapsedSet.has(d.node._id);
    tip.innerHTML=`<div class="tt-type">${(d.node.type||'').toUpperCase()}: ${d.node.name}</div>`+
      (d.node.detail?`<div class="tt-detail">${d.node.detail}</div>`:'')+
      (d.node._line?`<div class="tt-detail">Line ${d.node._line}</div>`:'')+
      (kids>0&&!flowMode?`<div class="tt-detail">${kids} children${isC?' (collapsed)':''}</div>`:'');
    tip.classList.add('visible');
  });
  nodes.on('mousemove',e=>{tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';});
  nodes.on('mouseleave',()=>tip.classList.remove('visible'));

  // Auto-fit
  requestAnimationFrame(()=>{
    const b=svgGroup.node().getBBox();const pad=60;
    const topPad=flowMode?70:10;
    const scale=Math.min(width/(b.width+pad*2),(height-topPad)/(b.height+pad*2),1.0);
    const tx=width/2-(b.x+b.width/2)*scale;
    const ty=topPad+pad+(-b.y)*scale;
    svg.call(currentZoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
  });

  // Apply flow state if active
  if(flowMode&&flowSteps.length>0)applyFlowStep();
}

let lastParsedFiles=null;

function renderSingleFile(){
  saveCurrentFile();const f=files[activeFileIdx];if(!f.code.trim())return;
  const parsed=parsePython(f.code,'f0_');
  const fileName=f.name.replace(/\.py$/,'');
  const projName=document.getElementById('projectNameInput').value||'Project';
  document.getElementById('modeLabel').style.display='block';
  document.getElementById('modeLabel').textContent='📄 Single File';
  const projectNode={name:projName,type:'project',children:[],_line:0,_id:'proj',detail:''};
  const fileNode={name:fileName,type:'file',children:parsed.children,_line:0,_id:'file_0',detail:f.name};
  lastParsedFiles=[fileNode];
  const PY=0,FY=80;
  const allPos=[{node:projectNode,x:0,y:PY},{node:fileNode,x:0,y:FY}];
  const allLinks=[{src:{x:0,y:PY,type:'project'},tgt:{x:0,y:FY,type:'file'}}];
  const sub=layoutSubtree(fileNode,0,FY);
  for(let i=1;i<sub.positions.length;i++)allPos.push(sub.positions[i]);
  allLinks.push(...sub.links);
  computeStats(allPos);drawTree(allPos,allLinks);
  if(flowMode)buildFlowSteps(allPos);
}

function renderClassView(){
  saveCurrentFile();const projName=document.getElementById('projectNameInput').value||'Project';
  const fileTrees=files.map((f,idx)=>{if(!f.code.trim())return null;const parsed=parsePython(f.code,'f'+idx+'_');return{name:f.name.replace(/\.py$/,''),type:'file',children:parsed.children,detail:f.name,_line:0,_id:'file_'+idx};}).filter(Boolean);
  if(!fileTrees.length)return;
  lastParsedFiles=fileTrees;
  document.getElementById('modeLabel').style.display='block';
  document.getElementById('modeLabel').textContent='🏗️ Class View';
  const PY=0,FY=80,FILE_GAP=80;
  const fileLayouts=fileTrees.map(ft=>{const sub=layoutSubtree(ft,0,FY);let minX=Infinity,maxX=-Infinity;for(const p of sub.positions){const c=SC[p.node.type]||SC.variable;minX=Math.min(minX,p.x-c.w/2);maxX=Math.max(maxX,p.x+c.w/2);}return{...sub,colWidth:maxX-minX,minX,maxX};});
  const totalW=fileLayouts.reduce((s,l)=>s+l.colWidth,0)+FILE_GAP*(fileLayouts.length-1);let curX=-totalW/2;
  const projectNode={name:projName,type:'project',children:[],_line:0,_id:'proj',detail:`${fileTrees.length} files`};
  const allPos=[{node:projectNode,x:0,y:PY}];const allLinks=[];
  for(let fi=0;fi<fileLayouts.length;fi++){
    const fl=fileLayouts[fi];const offsetX=curX-fl.minX;
    for(const p of fl.positions)allPos.push({node:p.node,x:p.x+offsetX,y:p.y});
    for(const lk of fl.links)allLinks.push({src:{x:lk.src.x+offsetX,y:lk.src.y,type:lk.src.type},tgt:{x:lk.tgt.x+offsetX,y:lk.tgt.y,type:lk.tgt.type}});
    const fileX=fl.positions[0].x+offsetX;
    allLinks.push({src:{x:0,y:PY,type:'project'},tgt:{x:fileX,y:FY,type:'file'}});
    curX+=fl.colWidth+FILE_GAP;
  }
  computeStats(allPos);drawTree(allPos,allLinks);
  if(flowMode)buildFlowSteps(allPos);
}

function reRender(){if(currentMode==='single')renderSingleFile();else renderClassView();}

// ══════════════════════════════════════════════
//  LOGIC FLOW ENGINE
// ══════════════════════════════════════════════

function buildFlowSteps(allPos){
  // Build execution order: skip project/file/module/class/import nodes
  // Walk tree depth-first, collecting executable nodes by line number
  flowSteps=[];
  const execTypes=new Set(['variable','function','loop','conditional','statement']);
  // Collect all function definitions for parallel highlighting
  const funcDefs={};// name -> _id
  const allNodes=allPos.map(p=>p.node);
  for(const n of allNodes){if(n.type==='function')funcDefs[n.name]=n._id;}

  // Get execution-order nodes (by _line, skip defs until called)
  const execNodes=allPos.filter(p=>execTypes.has(p.node.type)&&p.node._line>0)
    .sort((a,b)=>a.node._line-b.node._line);

  for(const en of execNodes){
    const step={primary:en.node._id, name:en.node.name, type:en.node.type, line:en.node._line, parallel:null};
    // Check if this node calls a function (variable assignment with function call)
    const nm=en.node.name;
    if(en.node.type==='variable'){
      // Look for "= funcname(" pattern
      const callMatch=nm.match(/=\s*(\w+)\s*\(/);
      if(callMatch&&funcDefs[callMatch[1]]){
        step.parallel=funcDefs[callMatch[1]];
      }
    }
    flowSteps.push(step);
  }

  flowIdx=-1;
  document.getElementById('flowStepTotal').textContent=flowSteps.length;
  document.getElementById('flowStepNum').textContent='0';
  document.getElementById('flowStepName').textContent='Ready — press ▶';
  updateFlowBtnState();
}

function applyFlowStep(){
  if(!svgGroup)return;
  const svg=d3.select('#treeSvg');
  const nodeEls=svgGroup.selectAll('.node-group');
  const linkEls=svgGroup.selectAll('.link-path');

  if(flowIdx<0||flowIdx>=flowSteps.length){
    // All dimmed — starting state
    nodeEls.attr('class','node-group dimmed');
    linkEls.attr('class','link-path dimmed');
    return;
  }

  const step=flowSteps[flowIdx];
  const activeIds=new Set([step.primary]);
  if(step.parallel)activeIds.add(step.parallel);

  // Mark current nodes as visited
  visitedSet.add(step.primary);
  if(step.parallel)visitedSet.add(step.parallel);

  // Find ancestor chain for each active node
  const ancestorIds=new Set();
  for(const id of activeIds){
    findAncestors(id,ancestorIds);
  }
  // Ancestors of visited nodes should also stay visible
  for(const vid of visitedSet) findAncestors(vid,ancestorIds);

  // Apply classes
  nodeEls.attr('class',d=>{
    const id=d.node._id;
    if(id===step.primary)return'node-group active-step';
    if(step.parallel&&id===step.parallel)return'node-group parallel-step';
    if(visitedSet.has(id))return'node-group visited';
    if(ancestorIds.has(id))return'node-group ancestor';
    return'node-group dimmed';
  });

  linkEls.attr('class','link-path dimmed');

  // Update UI
  document.getElementById('flowStepNum').textContent=flowIdx+1;
  const label=step.type==='function'?'ƒ ':step.type==='loop'?'↻ ':step.type==='conditional'?'? ':'';
  let stepText=label+step.name;
  if(step.parallel){
    const parNode=allNodeMap[step.parallel];
    stepText+=` → calls ${parNode?.name||'func'}`;
  }
  document.getElementById('flowStepName').textContent=stepText;
  updateFlowBtnState();

  // Pan to active node
  const pos=nodePositionMap[step.primary];
  if(pos){
    const container=document.getElementById('treePanel');
    const w=container.clientWidth,h=container.clientHeight;
    const currentTransform=d3.zoomTransform(d3.select('#treeSvg').node());
    const scale=currentTransform.k;
    const tx=w/2-pos.x*scale;
    const ty=h/2-pos.y*scale;
    d3.select('#treeSvg').transition().duration(400)
      .call(currentZoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
  }
}

function findAncestors(targetId,ancestorIds){
  // Simple approach: search all positions' parent-child links
  // Build parent map from the parsed tree
  function walkTree(node,parentId){
    if(node._id===targetId){
      // Walk back up collecting parent chain
      let pid=parentId;
      while(pid){
        ancestorIds.add(pid);
        pid=parentMap[pid];
      }
      return true;
    }
    if(node.children){
      for(const ch of node.children){
        parentMap[ch._id]=node._id;
        if(walkTree(ch,node._id))return true;
      }
    }
    return false;
  }
  const parentMap={};
  // Walk all file trees
  if(lastParsedFiles){
    for(const ft of lastParsedFiles){
      parentMap[ft._id]=ft._id==='file_0'?'proj':'proj';
      walkTree(ft,ft._id);
    }
  }
  ancestorIds.add('proj');
}

function updateFlowBtnState(){
  document.getElementById('flowPrev').disabled=flowIdx<=0;
  document.getElementById('flowNext').disabled=flowIdx>=flowSteps.length-1;
}

// Flow controls
function flowNext(){if(flowIdx<flowSteps.length-1){flowIdx++;applyFlowStep();}}
function flowPrev(){if(flowIdx>0){flowIdx--;visitedSet.clear();for(let i=0;i<=flowIdx;i++){visitedSet.add(flowSteps[i].primary);if(flowSteps[i].parallel)visitedSet.add(flowSteps[i].parallel);}applyFlowStep();}else if(flowIdx===0){flowIdx=-1;visitedSet.clear();applyFlowStep();document.getElementById('flowStepNum').textContent='0';document.getElementById('flowStepName').textContent='Ready — press ▶';}}
function flowReset(){flowIdx=-1;visitedSet.clear();flowPlaying=false;clearInterval(flowTimer);document.getElementById('flowPlay').textContent='▶';document.getElementById('flowPlay').classList.remove('playing');applyFlowStep();document.getElementById('flowStepNum').textContent='0';document.getElementById('flowStepName').textContent='Ready — press ▶';updateFlowBtnState();}
function flowTogglePlay(){
  if(flowPlaying){flowPlaying=false;clearInterval(flowTimer);document.getElementById('flowPlay').textContent='▶';document.getElementById('flowPlay').classList.remove('playing');return;}
  flowPlaying=true;document.getElementById('flowPlay').textContent='⏸';document.getElementById('flowPlay').classList.add('playing');
  const speed=parseInt(document.getElementById('flowSpeed').value)||800;
  flowTimer=setInterval(()=>{
    if(flowIdx>=flowSteps.length-1){flowPlaying=false;clearInterval(flowTimer);document.getElementById('flowPlay').textContent='▶';document.getElementById('flowPlay').classList.remove('playing');return;}
    flowNext();
  },speed);
}

function toggleFlow(){
  flowMode=!flowMode;
  document.getElementById('modeFlow').classList.toggle('flow-active',flowMode);
  document.getElementById('flowBar').style.display=flowMode?'flex':'none';
  if(flowMode){collapsedSet.clear();visitedSet.clear();flowReset();}
  else{flowPlaying=false;clearInterval(flowTimer);}
  reRender();
}

function computeStats(pos){let n=0,fc=0,cls=0,fn=0;for(const p of pos){n++;if(p.node.type==='file')fc++;if(p.node.type==='class')cls++;if(p.node.type==='function')fn++;}document.getElementById('statNodes').textContent=n;document.getElementById('statFiles').textContent=fc||1;document.getElementById('statClasses').textContent=cls;document.getElementById('statFuncs').textContent=fn;}

function setMode(m){currentMode=m;document.getElementById('modeSingle').classList.toggle('active',m==='single');document.getElementById('modeClass').classList.toggle('active',m==='class');collapsedSet.clear();if(flowMode)flowReset();parseAndRender();}

function parseAndRender(){saveCurrentFile();collapsedSet.clear();if(currentMode==='single')renderSingleFile();else renderClassView();}

function loadSample(key){const s=SAMPLES[key];files=s.files.map(f=>({...f}));activeFileIdx=0;document.getElementById('codeInput').value=files[0].code;document.getElementById('filenameInput').value=files[0].name;document.getElementById('projectNameInput').value=s.name||'My Project';collapsedSet.clear();if(flowMode)flowReset();renderTabs();if(key==='quiz')setMode('class');else setMode('single');}

function zoomIn(){d3.select('#treeSvg').transition().duration(300).call(currentZoom.scaleBy,1.4);}
function zoomOut(){d3.select('#treeSvg').transition().duration(300).call(currentZoom.scaleBy,.7);}
function zoomReset(){reRender();}
window.addEventListener('resize',()=>{if(lastParsedFiles)reRender();});

renderTabs();
</script>
</body>
</html>
