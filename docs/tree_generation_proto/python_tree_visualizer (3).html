<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeSensei — Python Structure Tree</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap');
  :root {
    --bg: #0c0e14; --bg2: #13161f; --bg3: #1a1e2a; --bg4: #212636;
    --bd: #2a3042; --bda: #3d4663;
    --tx: #e8eaf0; --tx2: #8b92a8; --txm: #555e78;
    --acc: #6c8cff;
    --c-mod: #5b8def; --c-file: #f5d060; --c-cls: #34d399; --c-fn: #f87171;
    --c-var: #fbbf24; --c-lp: #94a3b8; --c-imp: #c084fc; --c-cond: #fb923c;
    --c-data: #a0aec0;
    --lk: #3a4260;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--tx); min-height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:var(--bg2); border-bottom:1px solid var(--bd); flex-shrink:0; gap:10px; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo { width:28px; height:28px; background:linear-gradient(135deg,var(--acc),#a78bfa); border-radius:7px; display:grid; place-items:center; font-size:14px; font-weight:700; color:#fff; flex-shrink:0; }
  .header h1 { font-size:15px; font-weight:700; }
  .header h1 span { color:var(--txm); font-weight:300; margin-left:6px; font-size:13px; }
  .mode-toggle { display:flex; background:var(--bg); border:1px solid var(--bd); border-radius:8px; overflow:hidden; flex-shrink:0; }
  .mode-btn { padding:6px 14px; font-family:'JetBrains Mono',monospace; font-size:10.5px; border:none; background:transparent; color:var(--txm); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .mode-btn.active { background:var(--acc); color:#fff; }
  .mode-btn:hover:not(.active) { color:var(--tx); background:var(--bg3); }
  .legend { display:flex; gap:8px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--tx2); font-family:'JetBrains Mono',monospace; }
  .legend-dot { width:10px; height:10px; flex-shrink:0; border-radius:2px; }
  .lg-circ { border-radius:50%; } .lg-hex { clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); } .lg-dia { clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }

  /* Main */
  .main-container { display:flex; flex:1; min-height:0; }

  /* Code panel */
  .code-panel { width:400px; flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--bd); background:var(--bg2); }
  .code-panel-top { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--bd); }
  .code-panel-top h2 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--tx2); }
  .btn-parse { padding:5px 14px; background:var(--acc); color:#fff; border:none; border-radius:6px; font-family:'Outfit',sans-serif; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-parse:hover { filter:brightness(1.15); }

  /* File tabs */
  .file-tabs { display:flex; gap:0; border-bottom:1px solid var(--bd); background:var(--bg); overflow-x:auto; flex-shrink:0; }
  .file-tab { padding:7px 14px; font-family:'JetBrains Mono',monospace; font-size:10.5px; border:none; background:transparent; color:var(--txm); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .12s; display:flex; align-items:center; gap:6px; }
  .file-tab.active { color:var(--c-file); border-bottom-color:var(--c-file); background:var(--bg2); }
  .file-tab:hover:not(.active) { color:var(--tx2); background:var(--bg3); }
  .file-tab .close-tab { font-size:12px; opacity:.4; margin-left:2px; }
  .file-tab .close-tab:hover { opacity:1; color:var(--c-fn); }
  .btn-add-tab { padding:7px 10px; font-size:14px; border:none; background:transparent; color:var(--txm); cursor:pointer; }
  .btn-add-tab:hover { color:var(--acc); }

  /* Filename input */
  .filename-row { display:flex; align-items:center; gap:6px; padding:6px 12px; border-bottom:1px solid var(--bd); background:var(--bg); }
  .filename-row label { font-size:10px; color:var(--txm); font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .filename-input { flex:1; padding:4px 8px; background:var(--bg3); border:1px solid var(--bd); border-radius:4px; color:var(--c-file); font-family:'JetBrains Mono',monospace; font-size:11px; outline:none; }
  .filename-input:focus { border-color:var(--c-file); }

  .code-textarea { flex:1; width:100%; padding:14px; background:var(--bg); color:var(--tx); border:none; outline:none; font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.7; resize:none; tab-size:4; }
  .code-textarea::placeholder { color:var(--txm); }
  .sample-buttons { display:flex; gap:6px; padding:8px 12px; border-top:1px solid var(--bd); flex-wrap:wrap; }
  .btn-sample { padding:4px 9px; background:var(--bg3); color:var(--tx2); border:1px solid var(--bd); border-radius:5px; font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; transition:all .15s; }
  .btn-sample:hover { background:var(--bg4); color:var(--tx); border-color:var(--bda); }

  /* Tree panel */
  .tree-panel { flex:1; position:relative; overflow:hidden; background:radial-gradient(circle at 50% 30%,rgba(108,140,255,.03) 0%,transparent 60%),var(--bg); }
  .tree-panel svg { width:100%; height:100%; }
  .node-group { cursor:pointer; }
  .node-group:hover .node-shape { filter:brightness(1.3); }
  .node-label { font-family:'JetBrains Mono',monospace; fill:#fff; pointer-events:none; dominant-baseline:middle; text-anchor:middle; }
  .node-badge { font-family:'JetBrains Mono',monospace; font-size:8px; fill:rgba(255,255,255,.4); pointer-events:none; text-anchor:middle; }
  .link-path { fill:none; stroke:var(--lk); stroke-width:1.5; }

  .info-bar { position:absolute; bottom:14px; left:14px; right:14px; display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:rgba(19,22,31,.92); backdrop-filter:blur(12px); border:1px solid var(--bd); border-radius:10px; font-size:11px; color:var(--tx2); font-family:'JetBrains Mono',monospace; }
  .info-bar .stats { display:flex; gap:12px; }
  .info-bar .stat-val { color:var(--acc); font-weight:600; }
  .zoom-controls { display:flex; gap:4px; }
  .btn-zoom { width:26px; height:26px; background:var(--bg3); border:1px solid var(--bd); border-radius:6px; color:var(--tx2); font-size:13px; cursor:pointer; display:grid; place-items:center; }
  .btn-zoom:hover { background:var(--bg4); color:var(--tx); }

  .empty-state { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--txm); pointer-events:none; }
  .empty-state .icon { width:52px; height:52px; background:var(--bg3); border-radius:12px; display:grid; place-items:center; font-size:22px; border:1px solid var(--bd); }
  .mode-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--txm); position:absolute; top:10px; right:14px; background:var(--bg2); padding:4px 10px; border-radius:6px; border:1px solid var(--bd); }

  .tooltip { position:fixed; padding:8px 12px; background:var(--bg4); border:1px solid var(--bda); border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--tx); pointer-events:none; opacity:0; transition:opacity .15s; z-index:100; max-width:280px; line-height:1.5; box-shadow:0 8px 32px rgba(0,0,0,.5); }
  .tooltip.visible { opacity:1; }
  .tooltip .tt-type { color:var(--acc); font-weight:600; }
  .tooltip .tt-detail { color:var(--tx2); margin-top:2px; }

  @media(max-width:768px) {
    .main-container { flex-direction:column; }
    .code-panel { width:100%; height:40vh; border-right:none; border-bottom:1px solid var(--bd); }
    .tree-panel { height:60vh; }
    .legend { display:none; }
    .header h1 span { display:none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">CS</div>
    <h1>Python Structure Tree<span>CodeSensei</span></h1>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeSingle" onclick="setMode('single')">📄 Single File</button>
    <button class="mode-btn" id="modeClass" onclick="setMode('class')">🏗️ Class View</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot lg-circ" style="background:var(--c-mod)"></div>Module</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-file)"></div>File</div>
    <div class="legend-item"><div class="legend-dot lg-circ" style="background:var(--c-cls)"></div>Class</div>
    <div class="legend-item"><div class="legend-dot lg-hex" style="background:var(--c-fn)"></div>Func</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-var)"></div>Var</div>
    <div class="legend-item"><div class="legend-dot lg-dia" style="background:var(--c-lp)"></div>Loop</div>
    <div class="legend-item"><div class="legend-dot lg-circ" style="background:var(--c-imp)"></div>Import</div>
    <div class="legend-item"><div class="legend-dot lg-dia" style="background:var(--c-cond)"></div>If/Else</div>
  </div>
</div>

<div class="main-container">
  <div class="code-panel">
    <div class="code-panel-top">
      <h2>Python Source</h2>
      <button class="btn-parse" onclick="parseAndRender()">▶ Parse</button>
    </div>
    <div class="file-tabs" id="fileTabs"></div>
    <div class="filename-row">
      <label>filename:</label>
      <input class="filename-input" id="filenameInput" placeholder="main.py" />
    </div>
    <textarea class="code-textarea" id="codeInput" spellcheck="false" placeholder="Paste Python code here..."></textarea>
    <div class="sample-buttons">
      <button class="btn-sample" onclick="loadSample('single')">Single File</button>
      <button class="btn-sample" onclick="loadSample('quiz')">Quiz Project (4 files)</button>
    </div>
  </div>

  <div class="tree-panel" id="treePanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">🌳</div>
      <p style="font-size:13px">Paste Python code and hit Parse</p>
      <div style="font-size:11px;font-family:'JetBrains Mono',monospace">or try a sample ↙</div>
    </div>
    <div class="mode-label" id="modeLabel" style="display:none"></div>
    <svg id="treeSvg"></svg>
    <div class="info-bar" id="infoBar" style="display:none">
      <div class="stats">
        <span>Nodes: <span class="stat-val" id="statNodes">0</span></span>
        <span>Files: <span class="stat-val" id="statFiles">0</span></span>
        <span>Classes: <span class="stat-val" id="statClasses">0</span></span>
        <span>Funcs: <span class="stat-val" id="statFuncs">0</span></span>
      </div>
      <div class="zoom-controls">
        <button class="btn-zoom" onclick="zoomIn()">+</button>
        <button class="btn-zoom" onclick="zoomOut()">−</button>
        <button class="btn-zoom" onclick="zoomReset()">⌂</button>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ══════════════════════════════════════════════
//  FILE TAB SYSTEM
// ══════════════════════════════════════════════
let files = [{ name: 'main.py', code: '' }];
let activeFileIdx = 0;
let currentMode = 'single';
let currentZoom = null, svgGroup = null, lastRenderData = null;

function renderTabs() {
  const container = document.getElementById('fileTabs');
  container.innerHTML = '';
  files.forEach((f, i) => {
    const tab = document.createElement('button');
    tab.className = 'file-tab' + (i === activeFileIdx ? ' active' : '');
    tab.innerHTML = `<span>${f.name || 'untitled.py'}</span>` +
      (files.length > 1 ? `<span class="close-tab" onclick="event.stopPropagation();removeFile(${i})">×</span>` : '');
    tab.onclick = () => switchFile(i);
    container.appendChild(tab);
  });
  // Add button
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-tab';
  addBtn.textContent = '+';
  addBtn.onclick = addFile;
  container.appendChild(addBtn);
}

function switchFile(idx) {
  // Save current
  files[activeFileIdx].code = document.getElementById('codeInput').value;
  files[activeFileIdx].name = document.getElementById('filenameInput').value || 'untitled.py';
  // Switch
  activeFileIdx = idx;
  document.getElementById('codeInput').value = files[idx].code;
  document.getElementById('filenameInput').value = files[idx].name;
  renderTabs();
}

function addFile() {
  files[activeFileIdx].code = document.getElementById('codeInput').value;
  files[activeFileIdx].name = document.getElementById('filenameInput').value || 'untitled.py';
  files.push({ name: `file${files.length + 1}.py`, code: '' });
  activeFileIdx = files.length - 1;
  document.getElementById('codeInput').value = '';
  document.getElementById('filenameInput').value = files[activeFileIdx].name;
  renderTabs();
}

function removeFile(idx) {
  if (files.length <= 1) return;
  files.splice(idx, 1);
  if (activeFileIdx >= files.length) activeFileIdx = files.length - 1;
  document.getElementById('codeInput').value = files[activeFileIdx].code;
  document.getElementById('filenameInput').value = files[activeFileIdx].name;
  renderTabs();
}


// ══════════════════════════════════════════════
//  SAMPLES
// ══════════════════════════════════════════════
const SAMPLES = {
  single: {
    files: [{ name: 'main.py', code: `import sys\nimport csv\nfrom pathlib import Path\n\nINPUT_DIR = Path("./data")\nOUTPUT_FILE = "results.csv"\nTHRESHOLD = 0.75\n\ndef load_data(filepath):\n    results = []\n    with open(filepath) as f:\n        reader = csv.DictReader(f)\n        for row in reader:\n            score = float(row["score"])\n            if score >= THRESHOLD:\n                results.append(row)\n    return results\n\ndef process_batch(directory):\n    all_results = []\n    for file in directory.glob("*.csv"):\n        data = load_data(file)\n        all_results.extend(data)\n    return all_results\n\ndef write_output(data, filename):\n    if not data:\n        print("No data to write")\n        return\n    with open(filename, "w") as f:\n        writer = csv.DictWriter(f, fieldnames=data[0].keys())\n        writer.writeheader()\n        for row in data:\n            writer.writerow(row)\n\nif __name__ == "__main__":\n    results = process_batch(INPUT_DIR)\n    write_output(results, OUTPUT_FILE)\n    print(f"Wrote {len(results)} rows")` }]
  },
  quiz: {
    files: [
      { name: 'data.py', code: `question_data = [\n{"text": "A slug's blood is green.", "answer": "True"},\n{"text": "The loudest animal is the African Elephant.", "answer": "False"},\n{"text": "Approximately one quarter of human bones are in the feet.", "answer": "True"},\n]` },
      { name: 'question_model.py', code: `class Question:\n\n    def __init__(self, q_text, q_answer):\n        self.text = q_text\n        self.answer = q_answer` },
      { name: 'quiz_brain.py', code: `from question_model import Question\nfrom data import question_data\n\nclass QuizBrain:\n\n    def __init__(self, q_list):\n        self.question_number = 0\n        self.question_list = q_list\n        self.score = 0\n\n    def still_has_questions(self):\n        return self.question_number < len(self.question_list)\n\n    def new_question(self):\n        current_question = self.question_list[self.question_number]\n        self.question_number += 1\n        user_answer = input(f"Q. {self.question_number} {current_question.text} (True/False): ")\n        self.check_answer(user_answer, current_question.answer)\n\n    def check_answer(self, user_answer, correct_answer):\n        if user_answer.lower() == correct_answer.lower():\n            self.score += 1\n            print("You got it right!")\n        else:\n            print("That's wrong.")` },
      { name: 'main.py', code: `from question_model import Question\nfrom data import question_data\nfrom quiz_brain import QuizBrain\n\nquestion_bank = []\n\nfor question in question_data:\n    question_text = question["text"]\n    question_answer = question["answer"]\n    new_question = Question(question_text,question_answer)\n    question_bank.append(new_question)\n\nquiz = QuizBrain(question_bank)\n\nwhile quiz.still_has_questions():\n    quiz.new_question()\n\nprint("You've completed the quiz")\nprint(f"Your final score was: {quiz.score}/{quiz.question_number}")` }
    ]
  }
};


// ══════════════════════════════════════════════
//  PYTHON PARSER
// ══════════════════════════════════════════════
function parsePython(code) {
  const lines = code.split('\n');
  const root = { name: 'module', type: 'module', children: [], detail: '', _line: 0 };
  const stack = [{ node: root, indent: -1 }];
  const importGroup = { name: 'imports', type: 'import', children: [], detail: '', _line: 0 };
  let hasImports = false;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i], trimmed = raw.trimStart();
    if (!trimmed || trimmed.startsWith('#')) continue;
    const indent = raw.length - trimmed.length, lineNum = i + 1;
    while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
    const parent = stack[stack.length - 1].node;
    let node = null;

    if (/^(from\s+\S+\s+)?import\s+/.test(trimmed)) {
      hasImports = true;
      const names = trimmed.replace(/^from\s+\S+\s+import\s+/,'').replace(/^import\s+/,'')
        .split(',').map(s => s.trim().split(' as ')[0].split('.').pop());
      for (const n of names) importGroup.children.push({ name:n, type:'import', children:[], detail:trimmed, _line:lineNum });
      continue;
    }
    if (/^class\s+/.test(trimmed)) {
      const m = trimmed.match(/^class\s+(\w+)(\(([^)]*)\))?/);
      node = { name:m?.[1]||'class', type:'class', children:[], detail:m?.[3]?`inherits: ${m[3]}`:'', _line:lineNum };
    } else if (/^(async\s+)?def\s+/.test(trimmed)) {
      const m = trimmed.match(/^(?:async\s+)?def\s+(\w+)\(([^)]*)\)/);
      node = { name:(trimmed.startsWith('async')?'async ':'')+(m?.[1]||'func'), type:'function', children:[], detail:`(${m?.[2]||''})`, _line:lineNum };
    } else if (/^@\w+/.test(trimmed)) { continue; }
    else if (/^(for|while)\s+/.test(trimmed)) {
      const kind = trimmed.startsWith('for')?'for':'while';
      const m = trimmed.match(/^(?:for|while)\s+(.+):/);
      node = { name:`${kind} loop`, type:'loop', children:[], detail:m?.[1]?.substring(0,40)||'', _line:lineNum };
    } else if (/^(if|elif|else)\b/.test(trimmed)) {
      const m = trimmed.match(/^(if|elif|else)\s*(.*?):/);
      node = { name:m?.[1]||'if', type:'conditional', children:[], detail:m?.[2]?.substring(0,40)||'', _line:lineNum };
    } else if (/^(async\s+)?with\s+/.test(trimmed)) {
      const m = trimmed.match(/^(?:async\s+)?with\s+(.+?)(?:\s+as\s+\w+)?:/);
      node = { name:'with', type:'loop', children:[], detail:m?.[1]?.substring(0,40)||'', _line:lineNum };
    } else if (/^(try|except|finally)\b/.test(trimmed)) {
      node = { name:trimmed.match(/^(try|except|finally)/)[1], type:'conditional', children:[], detail:'', _line:lineNum };
    } else if (/^[A-Za-z_]\w*\s*(:\s*\w[\w\[\], ]*\s*)?=/.test(trimmed) && indent <= 4) {
      const vn = trimmed.match(/^(\w+)/)?.[1]||'var';
      if (vn==='self') continue;
      node = { name:vn, type:'variable', children:[], detail:trimmed.substring(0,50), _line:lineNum };
    } else if (/^self\.(\w+)\s*=/.test(trimmed)) {
      const m = trimmed.match(/^self\.(\w+)/);
      node = { name:`self.${m[1]}`, type:'variable', children:[], detail:'instance attr', _line:lineNum };
    }
    if (node) { parent.children.push(node); stack.push({ node, indent }); }
  }
  if (hasImports) root.children.unshift(importGroup);
  return root;
}


// ══════════════════════════════════════════════
//  SHAPE CONFIG & DRAWING
// ══════════════════════════════════════════════
const S = {
  project:     { color:'#7ca4f0', w:160, h:44, r:8  },
  file:        { color:'#f5d060', w:140, h:38, r:4  },
  module:      { color:'#5b8def', w:120, h:40, r:20 },
  class:       { color:'#34d399', w:130, h:40, r:20 },
  function:    { color:'#f87171', w:120, h:36, r:0  },
  variable:    { color:'#fbbf24', w:110, h:32, r:4  },
  loop:        { color:'#94a3b8', w:100, h:36, r:0  },
  import:      { color:'#c084fc', w:100, h:30, r:15 },
  conditional: { color:'#fb923c', w:100, h:36, r:0  },
};

function drawShape(g, type, w, h) {
  const c = S[type] || S.variable;
  if (type === 'function') {
    const hw=w/2, hh=h/2, i=14;
    g.append('polygon').attr('class','node-shape')
      .attr('points',`${-hw+i},${-hh} ${hw-i},${-hh} ${hw},0 ${hw-i},${hh} ${-hw+i},${hh} ${-hw},0`)
      .attr('fill',c.color+'20').attr('stroke',c.color).attr('stroke-width',2);
  } else if (type === 'loop' || type === 'conditional') {
    const hw=w/2, hh=h/2;
    g.append('polygon').attr('class','node-shape')
      .attr('points',`0,${-hh} ${hw},0 0,${hh} ${-hw},0`)
      .attr('fill',c.color+'20').attr('stroke',c.color).attr('stroke-width',2);
  } else {
    g.append('rect').attr('class','node-shape')
      .attr('x',-w/2).attr('y',-h/2).attr('width',w).attr('height',h)
      .attr('rx',c.r).attr('ry',c.r)
      .attr('fill',c.color+'20').attr('stroke',c.color).attr('stroke-width',2);
  }
}

const BADGES = { project:'PROJECT', file:'FILE', module:'MODULE', class:'CLASS', function:'ƒ FUNC', variable:'VAR', loop:'LOOP', import:'IMPORT', conditional:'COND' };


// ══════════════════════════════════════════════
//  SINGLE FILE RENDERER (left → right)
// ══════════════════════════════════════════════
function renderSingleFile() {
  // Save current file
  files[activeFileIdx].code = document.getElementById('codeInput').value;
  files[activeFileIdx].name = document.getElementById('filenameInput').value || 'untitled.py';

  const code = files[activeFileIdx].code.trim();
  if (!code) return;
  const data = parsePython(code);
  lastRenderData = { mode: 'single', data };

  const container = document.getElementById('treePanel');
  const svg = d3.select('#treeSvg'); svg.selectAll('*').remove();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('infoBar').style.display = 'flex';
  document.getElementById('modeLabel').style.display = 'block';
  document.getElementById('modeLabel').textContent = '📄 Single File → Left to Right';

  const width = container.clientWidth, height = container.clientHeight - 60;
  const root = d3.hierarchy(data);
  computeStats([data]);

  d3.tree().nodeSize([44, 240]).separation((a,b) => a.parent===b.parent ? 1 : 1.2)(root);

  const defs = svg.append('defs');
  defs.append('marker').attr('id','arrow').attr('viewBox','0 -4 8 8')
    .attr('refX',7).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-3L7,0L0,3Z').attr('fill','var(--lk)');

  svgGroup = svg.append('g');
  currentZoom = d3.zoom().scaleExtent([.08,3]).on('zoom', e => svgGroup.attr('transform', e.transform));
  svg.call(currentZoom);

  // Curved links
  svgGroup.selectAll('.link-path').data(root.links()).enter().append('path')
    .attr('class','link-path').attr('marker-end','url(#arrow)')
    .attr('d', d => {
      const sc=S[d.source.data.type]||S.variable, tc=S[d.target.data.type]||S.variable;
      const sx=d.source.y+sc.w/2, sy=d.source.x, tx=d.target.y-tc.w/2, ty=d.target.x;
      const mx=sx+(tx-sx)*.5;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
    });

  const nodes = svgGroup.selectAll('.node-group').data(root.descendants()).enter().append('g')
    .attr('class','node-group').attr('transform', d => `translate(${d.y},${d.x})`);

  nodes.each(function(d) { const c=S[d.data.type]||S.variable; drawShape(d3.select(this),d.data.type,c.w,c.h); });
  nodes.append('text').attr('class','node-label').attr('y',1)
    .attr('font-size', d => d.data.name.length>14?'9px':d.data.name.length>10?'10px':'11px')
    .text(d => d.data.name.length>18?d.data.name.substring(0,16)+'…':d.data.name);
  nodes.append('text').attr('class','node-badge')
    .attr('y', d => -((S[d.data.type]||S.variable).h/2)-5)
    .text(d => BADGES[d.data.type]||'');

  setupInteractions(nodes, root, 'single');
  autoFit(svg, width, height);
}


// ══════════════════════════════════════════════
//  CLASS VIEW — CUSTOM LAYOUT
//  Level 1 (project): top center
//  Level 2 (files): spread horizontally
//  Level 3+ (internals): flow vertically within file column
// ══════════════════════════════════════════════

function layoutFileSubtree(node, startX, startY, depth) {
  // Lays out a node and its children vertically
  // Children indent to the right, stack downward
  // Returns { positions: [{node, x, y}], links: [{src, tgt}], totalHeight }

  const cfg = S[node.type] || S.variable;
  const positions = [{ node, x: startX, y: startY }];
  const links = [];

  const INDENT_X = 40;     // rightward shift per nesting level
  const GAP_Y = 55;        // vertical gap between siblings
  const CHILD_START_GAP = 55; // gap between parent and first child

  let cursorY = startY + CHILD_START_GAP;

  if (node.children && node.children.length > 0) {
    for (let i = 0; i < node.children.length; i++) {
      const child = node.children[i];
      const childX = startX + INDENT_X;

      // Recursively layout child's subtree
      const sub = layoutFileSubtree(child, childX, cursorY, depth + 1);
      positions.push(...sub.positions);
      links.push({ src: { node, x: startX, y: startY }, tgt: { node: child, x: childX, y: cursorY } });
      links.push(...sub.links);

      cursorY = cursorY + sub.totalHeight + GAP_Y;
    }
  }

  const bottomY = cursorY - GAP_Y; // last child's bottom
  const totalHeight = Math.max(cfg.h, bottomY - startY);

  return { positions, links, totalHeight, bottomY };
}


function renderClassView() {
  // Save current file
  files[activeFileIdx].code = document.getElementById('codeInput').value;
  files[activeFileIdx].name = document.getElementById('filenameInput').value || 'untitled.py';

  // Parse all files
  const fileTrees = files.map(f => {
    if (!f.code.trim()) return null;
    const parsed = parsePython(f.code);
    parsed.name = f.name.replace(/\.py$/, '');
    parsed.type = 'file';
    // Flatten: skip the "module" wrapper, keep its children
    return { name: parsed.name, type: 'file', children: parsed.children, detail: f.name, _line: 0 };
  }).filter(Boolean);

  if (fileTrees.length === 0) return;

  lastRenderData = { mode: 'class', fileTrees };
  computeStats(fileTrees);

  const container = document.getElementById('treePanel');
  const svg = d3.select('#treeSvg'); svg.selectAll('*').remove();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('infoBar').style.display = 'flex';
  document.getElementById('modeLabel').style.display = 'block';
  document.getElementById('modeLabel').textContent = '🏗️ Class View → Top Down';

  const width = container.clientWidth, height = container.clientHeight - 60;

  const defs = svg.append('defs');
  defs.append('marker').attr('id','arrow').attr('viewBox','0 -4 8 8')
    .attr('refX',7).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-3L7,0L0,3Z').attr('fill','var(--lk)');

  svgGroup = svg.append('g');
  currentZoom = d3.zoom().scaleExtent([.05,3]).on('zoom', e => svgGroup.attr('transform', e.transform));
  svg.call(currentZoom);

  // Step 1: Layout each file's subtree to measure width/height
  const FILE_GAP = 60;     // horizontal gap between file columns
  const PROJECT_Y = 0;
  const FILE_Y = 80;       // files are 80px below project

  const fileLayouts = [];
  for (const ft of fileTrees) {
    const layout = layoutFileSubtree(ft, 0, FILE_Y, 0);
    // Compute bounding box of this subtree
    let minX = Infinity, maxX = -Infinity;
    for (const p of layout.positions) {
      const cfg = S[p.node.type] || S.variable;
      minX = Math.min(minX, p.x - cfg.w / 2);
      maxX = Math.max(maxX, p.x + cfg.w / 2);
    }
    const colWidth = maxX - minX;
    fileLayouts.push({ ...layout, colWidth, minX, maxX, fileNode: ft });
  }

  // Step 2: Position file columns horizontally
  const totalWidth = fileLayouts.reduce((sum, l) => sum + l.colWidth, 0) + FILE_GAP * (fileLayouts.length - 1);
  let cursorX = -totalWidth / 2;

  const allPositions = [];
  const allLinks = [];

  // Project root node
  const projectNode = { name: fileTrees.length > 1 ? 'Project' : fileTrees[0].name, type: 'project', children: [], _line: 0, detail: `${fileTrees.length} files` };
  allPositions.push({ node: projectNode, x: 0, y: PROJECT_Y });

  for (const fl of fileLayouts) {
    const offsetX = cursorX - fl.minX + fl.colWidth / 2 - (fl.maxX - fl.minX) / 2;
    // Shift all positions in this layout
    for (const p of fl.positions) {
      allPositions.push({ node: p.node, x: p.x + offsetX, y: p.y });
    }
    for (const lk of fl.links) {
      allLinks.push({
        src: { x: lk.src.x + offsetX, y: lk.src.y, type: lk.src.node.type },
        tgt: { x: lk.tgt.x + offsetX, y: lk.tgt.y, type: lk.tgt.node.type }
      });
    }
    // Link from project to file
    const filePos = fl.positions[0];
    allLinks.push({
      src: { x: 0, y: PROJECT_Y, type: 'project' },
      tgt: { x: filePos.x + offsetX, y: filePos.y, type: 'file' }
    });

    cursorX += fl.colWidth + FILE_GAP;
  }

  // Step 3: Draw orthogonal links
  svgGroup.selectAll('.link-path').data(allLinks).enter().append('path')
    .attr('class', 'link-path')
    .attr('marker-end', 'url(#arrow)')
    .attr('d', d => {
      const sc = S[d.src.type] || S.variable;
      const tc = S[d.tgt.type] || S.variable;
      const sx = d.src.x, sy = d.src.y + sc.h / 2;
      const tx = d.tgt.x, ty = d.tgt.y - tc.h / 2;
      const midY = sy + (ty - sy) * 0.45;
      return `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
    });

  // Step 4: Draw nodes
  const nodes = svgGroup.selectAll('.node-group').data(allPositions).enter().append('g')
    .attr('class', 'node-group')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  nodes.each(function(d) {
    const c = S[d.node.type] || S.variable;
    drawShape(d3.select(this), d.node.type, c.w, c.h);
  });

  // Labels
  nodes.append('text').attr('class', 'node-label').attr('y', 1)
    .attr('font-size', d => {
      const n = d.node.name;
      return n.length > 16 ? '9px' : n.length > 12 ? '10px' : '11px';
    })
    .text(d => {
      const n = d.node.name;
      return n.length > 20 ? n.substring(0, 18) + '…' : n;
    });

  // Badges
  nodes.append('text').attr('class', 'node-badge')
    .attr('y', d => -((S[d.node.type] || S.variable).h / 2) - 5)
    .text(d => BADGES[d.node.type] || '');

  // Tooltip
  const tip = document.getElementById('tooltip');
  nodes.on('mouseenter', (event, d) => {
    tip.innerHTML = `<div class="tt-type">${(d.node.type || '').toUpperCase()}: ${d.node.name}</div>` +
      (d.node.detail ? `<div class="tt-detail">${d.node.detail}</div>` : '') +
      (d.node._line ? `<div class="tt-detail">Line ${d.node._line}</div>` : '');
    tip.classList.add('visible');
  });
  nodes.on('mousemove', e => { tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-10)+'px'; });
  nodes.on('mouseleave', () => tip.classList.remove('visible'));

  autoFit(svg, width, height);
}


// ══════════════════════════════════════════════
//  SHARED HELPERS
// ══════════════════════════════════════════════
function computeStats(trees) {
  let nodes=0, fileCount=0, cls=0, fn=0;
  function walk(n) {
    nodes++;
    if (n.type==='file') fileCount++;
    if (n.type==='class') cls++;
    if (n.type==='function') fn++;
    (n.children||[]).forEach(walk);
  }
  trees.forEach(walk);
  document.getElementById('statNodes').textContent = nodes;
  document.getElementById('statFiles').textContent = fileCount || trees.length;
  document.getElementById('statClasses').textContent = cls;
  document.getElementById('statFuncs').textContent = fn;
}

function setupInteractions(nodes, root, mode) {
  nodes.on('click', function(event, d) {
    event.stopPropagation();
    if (d.children) { d._children=d.children; d.children=null; }
    else if (d._children) { d.children=d._children; d._children=null; }
    else return;
    if (mode==='single') renderSingleFile();
  });
  const tip = document.getElementById('tooltip');
  nodes.on('mouseenter', (event,d) => {
    tip.innerHTML = `<div class="tt-type">${d.data.type.toUpperCase()}: ${d.data.name}</div>`+
      (d.data.detail?`<div class="tt-detail">${d.data.detail}</div>`:'')+
      (d.data._line?`<div class="tt-detail">Line ${d.data._line}</div>`:'')+
      (d._children?`<div class="tt-detail">${d._children.length} collapsed</div>`:'')+
      `<div class="tt-detail" style="color:var(--txm)">Click to ${d.children?'collapse':'expand'}</div>`;
    tip.classList.add('visible');
  });
  nodes.on('mousemove', e => { tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-10)+'px'; });
  nodes.on('mouseleave', () => tip.classList.remove('visible'));
}

function autoFit(svg, width, height) {
  requestAnimationFrame(() => {
    const b = svgGroup.node().getBBox();
    const pad = 60;
    const scale = Math.min(width/(b.width+pad*2), height/(b.height+pad*2), 1.0);
    const tx = width/2 - (b.x+b.width/2)*scale;
    const ty = height/2 - (b.y+b.height/2)*scale;
    svg.call(currentZoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
  });
}


// ══════════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeSingle').classList.toggle('active', mode==='single');
  document.getElementById('modeClass').classList.toggle('active', mode==='class');
  parseAndRender();
}

function parseAndRender() {
  // Save current
  files[activeFileIdx].code = document.getElementById('codeInput').value;
  files[activeFileIdx].name = document.getElementById('filenameInput').value || 'untitled.py';

  if (currentMode === 'single') {
    renderSingleFile();
  } else {
    renderClassView();
  }
}

function loadSample(key) {
  const sample = SAMPLES[key];
  files = sample.files.map(f => ({ ...f }));
  activeFileIdx = 0;
  document.getElementById('codeInput').value = files[0].code;
  document.getElementById('filenameInput').value = files[0].name;
  renderTabs();
  if (key === 'quiz') setMode('class');
  else setMode('single');
}

function zoomIn() { d3.select('#treeSvg').transition().duration(300).call(currentZoom.scaleBy, 1.4); }
function zoomOut() { d3.select('#treeSvg').transition().duration(300).call(currentZoom.scaleBy, 0.7); }
function zoomReset() { parseAndRender(); }
window.addEventListener('resize', () => { if(lastRenderData) parseAndRender(); });

// Init
renderTabs();
</script>
