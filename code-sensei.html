<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Code Sensei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ────────────────────────────────────────────────────────────
   Design tokens — Theme A · Dojo Paper
   Source of truth: design/spec-sheet.jsx (the spec wins).
   Every hardcoded colour in component CSS is a red flag.
   ──────────────────────────────────────────────────────────── */
:root {
  /* Colour · core */
  --bg:            #f7f1e3;
  --surface:       #fdf8ec;
  --surface-2:     #ede4cd;
  --ink:           #2a221a;
  --muted:         #8a7d68;
  --hairline:      rgba(60, 45, 25, 0.13);
  --accent:        #b8412e;
  --accent-ink:    #fdf8ec;
  --accent-bg:     rgba(184, 65, 46, 0.10);
  --accent-shadow: rgba(120, 30, 18, 0.25);

  /* Colour · semantic */
  --success: #5b8a3a;
  --error:   #b8412e;
  --warn:    #c98a2c;

  /* Type */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Menlo, monospace;

  /* Radius */
  --r-pill:  999px;
  --r-card:  14px;
  --r-input: 8px;

  /* Spacing scale (4px base) */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;

  /* Syntax tokens (code) */
  --syn-bg:  #fffbef;
  --syn-kw:  #8a3722;
  --syn-str: #5b8a3a;
  --syn-fn:  #7a5e1a;
  --syn-num: #9a4f1e;
  --syn-com: #a89678;
  --syn-var: #3a2e22;
  --syn-op:  #6b5945;

  /* Animation budget (spec: 200ms transitions, 600ms celebrations) */
  --t-fast: 120ms;
  --t-base: 200ms;
  --t-cel:  600ms;
}

/* ────────────────────────────────────────────────────────────
   Base reset
   ──────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  /* Outside-the-app neutral on desktop, --bg on mobile (full-bleed). */
  background: #e8dfc9;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }

/* ────────────────────────────────────────────────────────────
   App frame
   Desktop: centered phone-shaped column (no device chrome — this is
            the actual app, not a screenshot of one).
   Mobile (≤700px): full-bleed.
   ──────────────────────────────────────────────────────────── */
#app {
  width: min(420px, 100vw);
  height: min(820px, 100vh);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border-radius: 24px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(0, 0, 0, 0.08);
}

#screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

#tabs {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--hairline);
  background: var(--surface);
}

#tabs .tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: var(--sp-2) var(--sp-2) var(--sp-3);
  color: var(--muted);
  transition: color var(--t-fast) ease-out;
  min-height: 56px;            /* spec: ≥44px hit target */
}
#tabs .tab.on { color: var(--accent); }
#tabs .tab .tab-icon { font-size: 18px; line-height: 1; }
#tabs .tab .tab-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

@media (max-width: 700px) {
  body { background: var(--bg); align-items: stretch; }
  #app {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
}

/* ────────────────────────────────────────────────────────────
   Type utilities (used across screens)
   ──────────────────────────────────────────────────────────── */
.t-display { font: 800 28px/1.15 var(--font-sans); letter-spacing: -0.6px; }
.t-title   { font: 700 22px/1.25 var(--font-sans); letter-spacing: -0.4px; }
.t-h2      { font: 700 18px/1.3  var(--font-sans); letter-spacing: -0.3px; }
.t-body    { font: 400 14px/1.55 var(--font-sans); }
.t-caption { font: 700 11px/1.5  var(--font-sans); letter-spacing: 1.5px; text-transform: uppercase; }
.t-code    { font: 400 13px/1.55 var(--font-mono); }

.muted   { color: var(--muted); }
.accent  { color: var(--accent); }
.success { color: var(--success); }
.error   { color: var(--error); }
.warn    { color: var(--warn); }

/* ────────────────────────────────────────────────────────────
   Page chrome: topbar shared by most screens
   ──────────────────────────────────────────────────────────── */
.topbar {
  padding: var(--sp-4) var(--sp-5) var(--sp-2);
}

.page {
  padding: var(--sp-3) var(--sp-5) var(--sp-5);
}

/* ────────────────────────────────────────────────────────────
   Phase 1 — debug tokens screen
   Renders every token as a swatch. Removed/relocated in Phase 3.
   ──────────────────────────────────────────────────────────── */
.dbg-section { margin-top: var(--sp-6); }
.dbg-section:first-of-type { margin-top: var(--sp-3); }
.dbg-section h2 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: var(--sp-2);
}
.swatch-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-1);
}
.swatch-row {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-1) 0;
  border-top: 1px solid var(--hairline);
  font-size: 12px;
}
.swatch-row:first-child { border-top: none; }
.swatch-chip {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid var(--hairline);
}
.swatch-name { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
.swatch-val  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }

.radius-grid { display: flex; gap: var(--sp-3); align-items: flex-end; flex-wrap: wrap; }
.radius-tile {
  width: 56px; height: 56px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  display: flex; align-items: center; justify-content: center;
  font: 600 11px/1 var(--font-mono);
  color: var(--muted);
}

.space-grid { display: flex; gap: var(--sp-2); align-items: flex-end; }
.space-bar {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  width: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  font: 700 10px/1 var(--font-mono);
  color: var(--accent);
  padding-bottom: 3px;
  min-width: 28px;
}

.type-sample { padding: var(--sp-2) 0; border-top: 1px solid var(--hairline); }
.type-sample:first-child { border-top: none; }
.type-sample .type-meta {
  font: 700 10px/1.4 var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.syntax-demo {
  background: var(--syn-bg);
  border: 1px solid var(--hairline);
  border-radius: var(--r-input);
  padding: var(--sp-3) var(--sp-4);
  font: 400 13px/1.6 var(--font-mono);
}
.syntax-demo .ln {
  display: block;
  white-space: pre;
  color: var(--syn-var);
}
.syntax-demo .kw  { color: var(--syn-kw);  font-weight: 600; }
.syntax-demo .str { color: var(--syn-str); }
.syntax-demo .fn  { color: var(--syn-fn);  font-weight: 600; }
.syntax-demo .num { color: var(--syn-num); }
.syntax-demo .com { color: var(--syn-com); font-style: italic; }
.syntax-demo .op  { color: var(--syn-op); }
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="tabs"></nav>
</div>

<script>
'use strict';

/* ────────────────────────────────────────────────────────────
   State
   ──────────────────────────────────────────────────────────── */
const S = {
  screen: 'tokens',          // Phase 1 default — debug screen.
  user: null,                // populated in Phase 4 (onboarding).
  hearts: 5,
  streak: 0,
  xp: 0,
  progress: {},              // { trackId → { unitIdx, lessonIdx, stepIdx } }
  mistakes: [],              // Mistake[] — see spec-sheet "Components & data".
  session: null,             // active exercise stack
  onboarding: { trackIds: [], skill: null, dailyGoalMin: 10 },
  ui: { reviewTab: 'split', dojoFilter: 'all', dojoShowMastered: false, lessonStep: 0 },
  params: null,              // route params from the most recent go()
};

/* ────────────────────────────────────────────────────────────
   Persistence — localStorage. No external deps.
   ──────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'codesensei.v1';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Shallow merge — later phases may add slices; we don't want stale
      // state to clobber new defaults.
      Object.keys(saved).forEach(k => {
        if (k in S) S[k] = saved[k];
      });
    }
  } catch (e) {
    console.warn('[codesensei] load failed:', e);
  }
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  } catch (e) {
    console.warn('[codesensei] save failed:', e);
  }
}

/* ────────────────────────────────────────────────────────────
   Navigation
   ──────────────────────────────────────────────────────────── */
function go(screen, params) {
  S.screen = screen;
  S.params = params || null;
  render();
  save();
  document.getElementById('screen').scrollTop = 0;
}

/* ────────────────────────────────────────────────────────────
   HTML helpers
   ──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

/* ────────────────────────────────────────────────────────────
   Screens — each returns an HTML string.
   New screens are added in later phases; SCREENS is the registry.
   ──────────────────────────────────────────────────────────── */
const SCREENS = {};

SCREENS.tokens = function () {
  return `
    <header class="topbar">
      <div class="t-caption muted">Code Sensei · Phase 1 debug</div>
      <h1 class="t-title" style="margin-top:4px">Design tokens</h1>
      <p class="t-body muted" style="margin-top:4px">
        Theme A · Dojo Paper. Every screen pulls from these.
      </p>
    </header>

    <div class="page">

      <section class="dbg-section">
        <h2>Colour · core</h2>
        <div class="swatch-grid">
          ${swatch('--bg',            '#f7f1e3',                   'page background')}
          ${swatch('--surface',       '#fdf8ec',                   'cards')}
          ${swatch('--surface-2',     '#ede4cd',                   'inset / muted fills')}
          ${swatch('--ink',           '#2a221a',                   'primary text')}
          ${swatch('--muted',         '#8a7d68',                   'secondary text')}
          ${swatch('--hairline',      'rgba(60,45,25,0.13)',       '1px borders')}
          ${swatch('--accent',        '#b8412e',                   'CTA, sensei, links')}
          ${swatch('--accent-ink',    '#fdf8ec',                   'text on accent')}
          ${swatch('--accent-bg',     'rgba(184,65,46,0.10)',      'soft accent surface')}
          ${swatch('--accent-shadow', 'rgba(120,30,18,0.25)',      'CTA shadow')}
        </div>
      </section>

      <section class="dbg-section">
        <h2>Colour · semantic</h2>
        <div class="swatch-grid">
          ${swatch('--success', '#5b8a3a', 'correct, +diff')}
          ${swatch('--error',   '#b8412e', 'wrong, −diff')}
          ${swatch('--warn',    '#c98a2c', 'almost-right, due-soon')}
        </div>
      </section>

      <section class="dbg-section">
        <h2>Type</h2>
        <div class="type-sample">
          <div class="type-meta">display · 28/-0.6 800</div>
          <div class="t-display">見事 — well done.</div>
        </div>
        <div class="type-sample">
          <div class="type-meta">title · 22/-0.4 700</div>
          <div class="t-title">The for-loop</div>
        </div>
        <div class="type-sample">
          <div class="type-meta">h2 · 18/1.3 700</div>
          <div class="t-h2">You filtered for odd numbers, not even.</div>
        </div>
        <div class="type-sample">
          <div class="type-meta">body · 14/1.55 400</div>
          <div class="t-body">Loops repeat your code, once per item — Python prints one student's name each time through.</div>
        </div>
        <div class="type-sample">
          <div class="type-meta">caption · 11/1.5 700 +1.5tracking</div>
          <div class="t-caption muted">Sensei's lesson</div>
        </div>
        <div class="type-sample">
          <div class="type-meta">code · 13/1.55 mono</div>
          <div class="t-code">for student in dojo:</div>
        </div>
      </section>

      <section class="dbg-section">
        <h2>Radius</h2>
        <div class="radius-grid">
          <div class="radius-tile" style="border-radius:var(--r-pill)">pill</div>
          <div class="radius-tile" style="border-radius:var(--r-card)">card</div>
          <div class="radius-tile" style="border-radius:var(--r-input)">input</div>
        </div>
      </section>

      <section class="dbg-section">
        <h2>Spacing</h2>
        <div class="space-grid">
          <div class="space-bar" style="height:4px">1</div>
          <div class="space-bar" style="height:8px">2</div>
          <div class="space-bar" style="height:12px">3</div>
          <div class="space-bar" style="height:16px">4</div>
          <div class="space-bar" style="height:20px">5</div>
          <div class="space-bar" style="height:24px">6</div>
          <div class="space-bar" style="height:32px">8</div>
        </div>
      </section>

      <section class="dbg-section">
        <h2>Syntax tokens</h2>
        <div class="syntax-demo">
<span class="ln"><span class="com"># count even numbers</span></span>
<span class="ln"><span class="kw">def</span> <span class="fn">count_even</span><span class="op">(</span><span>nums</span><span class="op">):</span></span>
<span class="ln">    total <span class="op">=</span> <span class="num">0</span></span>
<span class="ln">    <span class="kw">for</span> n <span class="kw">in</span> nums<span class="op">:</span></span>
<span class="ln">        <span class="kw">if</span> n <span class="op">%</span> <span class="num">2</span> <span class="op">==</span> <span class="num">0</span><span class="op">:</span></span>
<span class="ln">            total <span class="op">+=</span> <span class="num">1</span></span>
<span class="ln">    <span class="kw">return</span> <span class="str">"got "</span> <span class="op">+</span> <span class="fn">str</span><span class="op">(</span>total<span class="op">)</span></span>
        </div>
        <div class="swatch-grid" style="margin-top:var(--sp-3)">
          ${swatch('--syn-bg',  '#fffbef', 'editor background')}
          ${swatch('--syn-kw',  '#8a3722', 'keywords (def, for, if)')}
          ${swatch('--syn-str', '#5b8a3a', 'strings')}
          ${swatch('--syn-fn',  '#7a5e1a', 'function names')}
          ${swatch('--syn-num', '#9a4f1e', 'numbers')}
          ${swatch('--syn-com', '#a89678', 'comments')}
          ${swatch('--syn-var', '#3a2e22', 'identifiers')}
          ${swatch('--syn-op',  '#6b5945', 'operators / punctuation')}
        </div>
      </section>

      <div style="height:var(--sp-6)"></div>
    </div>
  `;
};

function swatch(name, value, desc) {
  // Render the chip via the CSS variable so this also acts as a sanity check
  // that every token is actually defined in :root.
  return `
    <div class="swatch-row">
      <div class="swatch-chip" style="background:var(${name})"></div>
      <div>
        <div class="swatch-name">${esc(name)}</div>
        <div class="t-body muted" style="font-size:11.5px">${esc(desc)}</div>
      </div>
      <div class="swatch-val">${esc(value)}</div>
    </div>
  `;
}

/* ────────────────────────────────────────────────────────────
   Bottom tabs
   Phase 1: tabs render but are inert beyond going to 'tokens'.
   Real tab routing wires up in Phase 3.
   ──────────────────────────────────────────────────────────── */
const TABS = [
  { id: 'home',     label: 'Learn',    icon: '◆', target: 'tokens' },
  { id: 'practice', label: 'Practice', icon: '⚡', target: 'tokens' },
  { id: 'dojo',     label: 'Dojo',     icon: '⚔', target: 'tokens' },
  { id: 'profile',  label: 'Sensei',   icon: '◐', target: 'tokens' },
];

function tabFor(screen) {
  // Maps screen id → which tab should highlight.
  // Expanded as more screens land in later phases.
  if (screen === 'tokens') return null;
  if (['home', 'lesson', 'lesson-summary'].includes(screen)) return 'home';
  if (['exercise-mcq', 'exercise-tap', 'exercise-type',
       'result-correct', 'result-wrong', 'review',
       'out-of-hearts'].includes(screen)) return 'practice';
  if (['dojo', 'empty-dojo'].includes(screen)) return 'dojo';
  if (screen === 'profile') return 'profile';
  return null;
}

function renderTabs() {
  const active = tabFor(S.screen);
  document.getElementById('tabs').innerHTML = TABS.map(t => `
    <button class="tab ${t.id === active ? 'on' : ''}"
            type="button"
            data-action="go-tab"
            data-tab="${t.id}">
      <span class="tab-icon" aria-hidden="true">${t.icon}</span>
      <span class="tab-label">${t.label}</span>
    </button>
  `).join('');
}

/* ────────────────────────────────────────────────────────────
   Render
   ──────────────────────────────────────────────────────────── */
function render() {
  const fn = SCREENS[S.screen] || SCREENS.tokens;
  document.getElementById('screen').innerHTML = fn(S);
  renderTabs();
}

/* ────────────────────────────────────────────────────────────
   Event delegation — every interactive element uses data-action.
   ──────────────────────────────────────────────────────────── */
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  handle(action, el.dataset, el, e);
});

function handle(action, data) {
  switch (action) {
    case 'go':
      return go(data.to);
    case 'go-tab': {
      const tab = TABS.find(t => t.id === data.tab);
      if (tab) go(tab.target);
      return;
    }
    default:
      console.warn('[codesensei] unhandled action:', action, data);
  }
}

/* ────────────────────────────────────────────────────────────
   Boot
   ──────────────────────────────────────────────────────────── */
load();
render();
</script>
</body>
</html>
