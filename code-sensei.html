<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Code Sensei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ────────────────────────────────────────────────────────────
   Design tokens — Theme A · Dojo Paper
   Source of truth: design/spec-sheet.jsx (the spec wins).
   Every hardcoded colour in component CSS is a red flag.
   ──────────────────────────────────────────────────────────── */
:root {
  /* Colour · core */
  --bg:            #f7f1e3;
  --surface:       #fdf8ec;
  --surface-2:     #ede4cd;
  --ink:           #2a221a;
  --muted:         #8a7d68;
  --hairline:      rgba(60, 45, 25, 0.13);
  --accent:        #b8412e;
  --accent-ink:    #fdf8ec;
  --accent-bg:     rgba(184, 65, 46, 0.10);
  --accent-shadow: rgba(120, 30, 18, 0.25);

  /* Colour · semantic */
  --success: #5b8a3a;
  --error:   #b8412e;
  --warn:    #c98a2c;

  /* Type */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Menlo, monospace;

  /* Radius */
  --r-pill:  999px;
  --r-card:  14px;
  --r-input: 8px;

  /* Spacing scale (4px base) */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;

  /* Syntax tokens (code) */
  --syn-bg:  #fffbef;
  --syn-kw:  #8a3722;
  --syn-str: #5b8a3a;
  --syn-fn:  #7a5e1a;
  --syn-num: #9a4f1e;
  --syn-com: #a89678;
  --syn-var: #3a2e22;
  --syn-op:  #6b5945;

  /* Animation budget (spec: 200ms transitions, 600ms celebrations) */
  --t-fast: 120ms;
  --t-base: 200ms;
  --t-cel:  600ms;
}

/* ────────────────────────────────────────────────────────────
   Base reset
   ──────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  /* Outside-the-app neutral on desktop, --bg on mobile (full-bleed). */
  background: #e8dfc9;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }

/* ────────────────────────────────────────────────────────────
   App frame
   Desktop: centered phone-shaped column (no device chrome — this is
            the actual app, not a screenshot of one).
   Mobile (≤700px): full-bleed.
   ──────────────────────────────────────────────────────────── */
#app {
  width: min(420px, 100vw);
  height: min(820px, 100vh);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border-radius: 24px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(0, 0, 0, 0.08);
}

#screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

#tabs {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--hairline);
  background: var(--surface);
}

#tabs .tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: var(--sp-2) var(--sp-2) var(--sp-3);
  color: var(--muted);
  transition: color var(--t-fast) ease-out;
  min-height: 56px;            /* spec: ≥44px hit target */
}
#tabs .tab.on { color: var(--accent); }
#tabs .tab .tab-icon { font-size: 18px; line-height: 1; }
#tabs .tab .tab-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

@media (max-width: 700px) {
  body { background: var(--bg); align-items: stretch; }
  #app {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
}

/* ────────────────────────────────────────────────────────────
   Type utilities (used across screens)
   ──────────────────────────────────────────────────────────── */
.t-display { font: 800 28px/1.15 var(--font-sans); letter-spacing: -0.6px; }
.t-title   { font: 700 22px/1.25 var(--font-sans); letter-spacing: -0.4px; }
.t-h2      { font: 700 18px/1.3  var(--font-sans); letter-spacing: -0.3px; }
.t-body    { font: 400 14px/1.55 var(--font-sans); }
.t-caption { font: 700 11px/1.5  var(--font-sans); letter-spacing: 1.5px; text-transform: uppercase; }
.t-code    { font: 400 13px/1.55 var(--font-mono); }

.muted   { color: var(--muted); }
.accent  { color: var(--accent); }
.success { color: var(--success); }
.error   { color: var(--error); }
.warn    { color: var(--warn); }

/* ────────────────────────────────────────────────────────────
   Page chrome: topbar shared by most screens
   ──────────────────────────────────────────────────────────── */
.topbar {
  padding: var(--sp-4) var(--sp-5) var(--sp-2);
}

.page {
  padding: var(--sp-3) var(--sp-5) var(--sp-5);
}

/* ────────────────────────────────────────────────────────────
   Components — the public surface used by every screen.
   Each rule pulls colour/spacing from var(--*) only.
   ──────────────────────────────────────────────────────────── */

/* CodeBlock + syntax tokens */
.code-block {
  background: var(--syn-bg);
  border: 1px solid var(--hairline);
  border-radius: var(--r-input);
  font: 400 13px/1.6 var(--font-mono);
  overflow-x: auto;
  padding: var(--sp-3) 0;
}
.code-block.no-frame {
  padding: 0;
  background: transparent;
  border: none;
}
.code-line {
  display: flex;
  white-space: pre;
  padding: 0 var(--sp-3);
}
.code-line .line-num {
  width: 22px;
  flex-shrink: 0;
  color: var(--muted);
  opacity: 0.5;
  text-align: right;
  margin-right: var(--sp-2);
  user-select: none;
}
.code-line .line-marker {
  width: 14px;
  flex-shrink: 0;
  font-weight: 700;
  text-align: center;
  user-select: none;
}
.code-line.add { background: rgba(91, 138, 58, 0.10); }
.code-line.del { background: rgba(184, 65, 46, 0.08); }
.code-line.hl  { background: var(--accent-bg); }
.code-line .line-marker.add { color: var(--success); }
.code-line .line-marker.del { color: var(--error); }
.code-line .line-content { flex: 1; }

.syn-kw  { color: var(--syn-kw);  font-weight: 600; }
.syn-str { color: var(--syn-str); }
.syn-fn  { color: var(--syn-fn);  font-weight: 600; }
.syn-num { color: var(--syn-num); }
.syn-com { color: var(--syn-com); font-style: italic; }
.syn-var { color: var(--syn-var); }
.syn-op  { color: var(--syn-op); }

/* Pill */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.pill-lg { padding: 8px 14px; font-size: 13px; }
.pill-neutral { background: var(--surface-2); color: var(--ink);        border-color: var(--hairline); }
.pill-accent  { background: var(--accent);    color: var(--accent-ink); }
.pill-success { background: rgba(91, 138, 58, 0.12);  color: var(--success); border-color: rgba(91, 138, 58, 0.25); }
.pill-warn    { background: rgba(201, 138, 44, 0.12); color: var(--warn);    border-color: rgba(201, 138, 44, 0.25); }
.pill-error   { background: rgba(184, 65, 46, 0.10);  color: var(--error);   border-color: rgba(184, 65, 46, 0.20); }

/* Btn */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 18px;
  border-radius: var(--r-pill);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 700;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--hairline);
  min-height: 44px;
  transition: transform var(--t-fast), box-shadow var(--t-fast);
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: transparent;
  box-shadow: 0 4px 0 var(--accent-shadow);
}
.btn-primary:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--accent-shadow);
}
.btn-full { width: 100%; }

/* Hearts row */
.hearts-row {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 14px;
  color: var(--error);
}
.heart.spent { color: var(--surface-2); }
.hearts-count {
  margin-left: 4px;
  font: 700 12px/1 var(--font-sans);
  color: var(--error);
  font-variant-numeric: tabular-nums;
}

/* Progress dots — spec calls them "dots" but v2 mock renders bars. */
.progress-dots {
  display: flex;
  gap: 4px;
  flex: 1;
}
.dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--surface-2);
  transition: background var(--t-base) ease-out;
}
.dot.done, .dot.on { background: var(--accent); }

/* Blank slot — tap-to-fill landing zones */
.blank-slot {
  display: inline-block;
  min-width: 56px;
  min-height: 22px;
  padding: 1px 6px;
  border-radius: 4px;
  vertical-align: middle;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  text-align: center;
}
.blank-empty {
  background: var(--surface-2);
  border: 1.5px dashed var(--muted);
}
.blank-filled {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.blank-correct {
  background: rgba(91, 138, 58, 0.15);
  color: var(--success);
  border: 1.5px solid var(--success);
}
.blank-wrong {
  background: rgba(184, 65, 46, 0.10);
  color: var(--error);
  border: 1.5px solid var(--error);
  text-decoration: line-through;
}

/* Token chip — tap-fill tray */
.token-chip {
  display: inline-flex;
  align-items: center;
  padding: 10px 14px;
  border-radius: var(--r-pill);
  background: var(--surface);
  border: 1.5px solid var(--hairline);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  box-shadow: 0 2px 0 var(--hairline);
  min-height: 44px;
  transition: transform var(--t-fast), background var(--t-fast);
}
.token-chip:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--hairline); }
.token-chip.token-placed {
  background: var(--surface-2);
  opacity: 0.5;
  text-decoration: line-through;
  box-shadow: none;
  cursor: default;
}
.token-chip.token-correct {
  background: rgba(91, 138, 58, 0.15);
  color: var(--success);
  border-color: var(--success);
}
.token-chip.token-wrong {
  background: rgba(184, 65, 46, 0.10);
  color: var(--error);
  border-color: var(--error);
}

/* Mascot bubble */
.mascot-bubble {
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
}
.mascot-bubble.right { flex-direction: row-reverse; }
.mascot-bubble .speech {
  background: var(--surface);
  border-radius: var(--r-card);
  border: 1px solid var(--hairline);
  padding: var(--sp-3) var(--sp-4);
  font-size: 13px;
  line-height: 1.55;
  position: relative;
  flex: 1;
}
.mascot-bubble .speech::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 14px;
  width: 0; height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 6px solid var(--surface);
}
.mascot-bubble.right .speech::before {
  left: auto;
  right: -6px;
  border-right: none;
  border-left: 6px solid var(--surface);
}

/* Diff sections (used by Review) */
.diff-yours, .diff-sensei { margin-top: var(--sp-3); }

/* Debug-screen nav strip (Phase 2 only — removed when real Home lands). */
.debug-nav {
  display: flex;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-5);
  border-bottom: 1px dashed var(--hairline);
  background: var(--accent-bg);
}
.debug-nav button {
  font: 700 10px/1 var(--font-mono);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 4px;
  color: var(--muted);
}
.debug-nav button.on { background: var(--accent); color: var(--accent-ink); }

/* ────────────────────────────────────────────────────────────
   Debug screens (tokens + components) — Phase 1/2 scaffolding.
   ──────────────────────────────────────────────────────────── */
.dbg-section { margin-top: var(--sp-6); }
.dbg-section:first-of-type { margin-top: var(--sp-3); }
.dbg-section h2 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: var(--sp-2);
}
.swatch-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-1);
}
.swatch-row {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-1) 0;
  border-top: 1px solid var(--hairline);
  font-size: 12px;
}
.swatch-row:first-child { border-top: none; }
.swatch-chip {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid var(--hairline);
}
.swatch-name { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
.swatch-val  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }

.radius-grid { display: flex; gap: var(--sp-3); align-items: flex-end; flex-wrap: wrap; }
.radius-tile {
  width: 56px; height: 56px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  display: flex; align-items: center; justify-content: center;
  font: 600 11px/1 var(--font-mono);
  color: var(--muted);
}

.space-grid { display: flex; gap: var(--sp-2); align-items: flex-end; }
.space-bar {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  width: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  font: 700 10px/1 var(--font-mono);
  color: var(--accent);
  padding-bottom: 3px;
  min-width: 28px;
}

.type-sample { padding: var(--sp-2) 0; border-top: 1px solid var(--hairline); }
.type-sample:first-child { border-top: none; }
.type-sample .type-meta {
  font: 700 10px/1.4 var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

/* Component-preview screen layout */
.preview-card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-card);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
}
.preview-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
  align-items: center;
  margin-top: var(--sp-2);
}
.preview-label {
  font: 700 10px/1.4 var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: var(--sp-1);
}
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="tabs"></nav>
</div>

<script>
'use strict';

/* ────────────────────────────────────────────────────────────
   State
   ──────────────────────────────────────────────────────────── */
const S = {
  screen: 'tokens',          // Phase 1 default — debug screen.
  user: null,                // populated in Phase 4 (onboarding).
  hearts: 5,
  streak: 0,
  xp: 0,
  progress: {},              // { trackId → { unitIdx, lessonIdx, stepIdx } }
  mistakes: [],              // Mistake[] — see spec-sheet "Components & data".
  session: null,             // active exercise stack
  onboarding: { trackIds: [], skill: null, dailyGoalMin: 10 },
  ui: { reviewTab: 'split', dojoFilter: 'all', dojoShowMastered: false, lessonStep: 0 },
  params: null,              // route params from the most recent go()
};

/* ────────────────────────────────────────────────────────────
   Persistence — localStorage. No external deps.
   ──────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'codesensei.v1';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Shallow merge — later phases may add slices; we don't want stale
      // state to clobber new defaults.
      Object.keys(saved).forEach(k => {
        if (k in S) S[k] = saved[k];
      });
    }
  } catch (e) {
    console.warn('[codesensei] load failed:', e);
  }
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  } catch (e) {
    console.warn('[codesensei] save failed:', e);
  }
}

/* ────────────────────────────────────────────────────────────
   Navigation
   ──────────────────────────────────────────────────────────── */
function go(screen, params) {
  S.screen = screen;
  S.params = params || null;
  render();
  save();
  document.getElementById('screen').scrollTop = 0;
}

/* ────────────────────────────────────────────────────────────
   HTML helpers
   ──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

/* ────────────────────────────────────────────────────────────
   Tokenizer + CodeBlock
   Minimal one-pass tokenizer for Python / JavaScript / SQL.
   Not a full parser — good enough for the lesson corpus.
   ──────────────────────────────────────────────────────────── */
const KEYWORDS = {
  py: new Set([
    'def','class','if','elif','else','for','while','in','return',
    'import','from','as','with','try','except','finally','raise',
    'pass','break','continue','lambda','yield','True','False','None',
    'and','or','not','is','global','nonlocal','async','await',
  ]),
  js: new Set([
    'var','let','const','function','if','else','for','while','do',
    'switch','case','default','break','continue','return','new',
    'class','extends','super','this','typeof','instanceof','in','of',
    'true','false','null','undefined','async','await','try','catch',
    'finally','throw','import','export','from','as',
  ]),
  // SQL is matched case-insensitively — see tokenize().
  sql: new Set([
    'SELECT','FROM','WHERE','AND','OR','NOT','INSERT','INTO','VALUES',
    'UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','JOIN',
    'INNER','LEFT','RIGHT','OUTER','ON','AS','GROUP','BY','ORDER',
    'HAVING','LIMIT','OFFSET','DISTINCT','COUNT','SUM','AVG','MIN',
    'MAX','NULL','IS','IN','BETWEEN','LIKE','EXISTS','UNION','ALL',
  ]),
};

function tokenize(code, lang) {
  const kws  = KEYWORDS[lang] || new Set();
  const out  = [];
  const len  = code.length;
  let i = 0;

  while (i < len) {
    const ch = code[i];

    // whitespace — preserved verbatim
    if (/\s/.test(ch)) {
      let j = i;
      while (j < len && /\s/.test(code[j])) j++;
      out.push({ type: 'ws', value: code.slice(i, j) });
      i = j;
      continue;
    }

    // line comments (#, //, --) and JS block comment
    if (lang === 'py' && ch === '#') {
      const end = code.indexOf('\n', i);
      const stop = end === -1 ? len : end;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }
    if ((lang === 'js' || lang === 'sql') &&
        ch === '-' && code[i + 1] === '-' && lang === 'sql') {
      const end = code.indexOf('\n', i);
      const stop = end === -1 ? len : end;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }
    if (lang === 'js' && ch === '/' && code[i + 1] === '/') {
      const end = code.indexOf('\n', i);
      const stop = end === -1 ? len : end;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }
    if (lang === 'js' && ch === '/' && code[i + 1] === '*') {
      const end = code.indexOf('*/', i + 2);
      const stop = end === -1 ? len : end + 2;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }

    // strings — '...', "...", and JS template literals `...`
    if (ch === '"' || ch === "'" || (lang === 'js' && ch === '`')) {
      const quote = ch;
      let j = i + 1;
      while (j < len && code[j] !== quote) {
        if (code[j] === '\\' && j + 1 < len) j += 2;
        else j++;
      }
      if (j < len) j++;
      out.push({ type: 'str', value: code.slice(i, j) });
      i = j;
      continue;
    }

    // numbers — int, float, 0x.., scientific
    if (/\d/.test(ch)) {
      let j = i;
      while (j < len && /[0-9.eExX_a-fA-F]/.test(code[j])) j++;
      out.push({ type: 'num', value: code.slice(i, j) });
      i = j;
      continue;
    }

    // identifiers / keywords / function calls
    if (/[A-Za-z_$]/.test(ch)) {
      let j = i + 1;
      while (j < len && /[A-Za-z0-9_$]/.test(code[j])) j++;
      const word = code.slice(i, j);
      const probe = (lang === 'sql') ? word.toUpperCase() : word;
      if (kws.has(probe)) {
        out.push({ type: 'kw', value: word });
      } else if (code[j] === '(') {
        out.push({ type: 'fn', value: word });
      } else {
        out.push({ type: 'var', value: word });
      }
      i = j;
      continue;
    }

    // operators / punctuation
    if (/[+\-*/%=<>!&|^~?:,.;()\[\]{}]/.test(ch)) {
      out.push({ type: 'op', value: ch });
      i++;
      continue;
    }

    // fallback — never crash
    out.push({ type: 'var', value: ch });
    i++;
  }

  return out;
}

function renderTokens(tokens) {
  return tokens.map(t => {
    if (t.type === 'ws') return esc(t.value);
    return `<span class="syn-${t.type}">${esc(t.value)}</span>`;
  }).join('');
}

/* CodeBlock — opts: { code, lang, highlight, showLineNumbers, frame } */
function CodeBlock(opts) {
  const code            = opts.code || '';
  const lang            = opts.lang || 'py';
  const highlight       = opts.highlight || {};   // { lineNo: '+'|'-'|'*' }
  const showLineNumbers = opts.showLineNumbers !== false;
  const frame           = opts.frame !== false;

  const lines = code.split('\n');
  const body = lines.map((line, idx) => {
    const lineNo = idx + 1;
    const mark   = highlight[lineNo];
    const cls    = mark === '+' ? 'add'
                 : mark === '-' ? 'del'
                 : mark === '*' ? 'hl'
                 : '';
    const numHtml    = showLineNumbers
      ? `<span class="line-num">${lineNo}</span>`
      : '';
    const markerHtml = (mark === '+' || mark === '-')
      ? `<span class="line-marker ${mark === '+' ? 'add' : 'del'}">${mark}</span>`
      : '';
    const tokens = tokenize(line, lang);
    return `<div class="code-line ${cls}">${numHtml}${markerHtml}<span class="line-content">${renderTokens(tokens)}</span></div>`;
  }).join('');

  return `<div class="code-block ${frame ? '' : 'no-frame'}">${body}</div>`;
}

function dataAttrs(data) {

  return Object.entries(data)

function Btn(label, opts) {

function HeartsRow(count, max) {
  if (max == null) max = 5;
  let html = '<span class="hearts-row" aria-label="' + count + ' of ' + max + ' hearts">';
  for (let i = 0; i < max; i++) {
    html += `<span class="heart ${i < count ? '' : 'spent'}" aria-hidden="true">♥</span>`;
  }
  html += `<span class="hearts-count">${count}</span>`;
  html += '</span>';
  return html;
}

function ProgressDots(total, current) {
  let html = '<div class="progress-dots" role="progressbar" aria-valuenow="' + current + '" aria-valuemax="' + total + '">';
  for (let i = 0; i < total; i++) {
    const cls = i < current ? 'done' : (i === current ? 'on' : '');
    html += `<span class="dot ${cls}"></span>`;
  }
  html += '</div>';
  return html;
}

function BlankSlot(opts) {
  opts = opts || {};
  const state   = opts.state || 'empty';   // empty | filled | correct | wrong
  const content = opts.content || '';
  if (state === 'empty' || !content) {
    return `<span class="blank-slot blank-empty" data-state="empty"${dataAttrs(opts.data)}></span>`;
  }
  return `<span class="blank-slot blank-${state}"${dataAttrs(opts.data)}>${esc(content)}</span>`;
}

function TokenChip(text, opts) {
  opts = opts || {};
  const state    = opts.state || 'idle';   // idle | placed | correct | wrong
  const action   = opts.action;
  const tag      = action ? 'button' : 'span';
  const typeAttr = action ? ' type="button"' : '';
  const actAttr  = action ? ` data-action="${esc(action)}"` : '';
  return `<${tag} class="token-chip token-${state}"${typeAttr}${actAttr}${dataAttrs(opts.data)}>${esc(text)}</${tag}>`;
}

/* DiffView — wraps two CodeBlocks with optional per-line highlight maps.
   The caller can compute diffs via computeLineDiff(a, b) below. */
function DiffView(opts) {
  const userCode  = opts.userCode  || '';
  const solution  = opts.solution  || '';
  const lang      = opts.lang      || 'py';
  const mode      = opts.mode      || 'split';   // split | yours | sensei
  const userHi    = opts.userHighlight   || {};
  const senseiHi  = opts.senseiHighlight || {};

  const yours = `<section class="diff-yours">
    <div class="t-caption error" style="margin-bottom:6px">Yours</div>
    ${CodeBlock({ code: userCode, lang, highlight: userHi, showLineNumbers: false })}
  </section>`;
  const sensei = `<section class="diff-sensei">
    <div class="t-caption success" style="margin-bottom:6px">Sensei</div>
    ${CodeBlock({ code: solution, lang, highlight: senseiHi, showLineNumbers: false })}
  </section>`;

  if (mode === 'yours')  return yours;
  if (mode === 'sensei') return sensei;
  return yours + sensei;
}

function computeLineDiff(a, b) {
  // Naive line diff — flags any line index where a[i] !== b[i].
  // Good enough for the V1 corpus. Replace with a real algorithm later.
  const aLines = (a || '').split('\n');
  const bLines = (b || '').split('\n');
  const aHighlight = {};
  const bHighlight = {};
  const max = Math.max(aLines.length, bLines.length);
  for (let i = 0; i < max; i++) {
    if (aLines[i] !== bLines[i]) {
      if (aLines[i] !== undefined) aHighlight[i + 1] = '-';
      if (bLines[i] !== undefined) bHighlight[i + 1] = '+';
    }
  }
  return { aHighlight, bHighlight };
}

/* ────────────────────────────────────────────────────────────
   Bottom tabs
   Phase 1: tabs render but are inert beyond going to 'tokens'.
   Real tab routing wires up in Phase 3.
   ──────────────────────────────────────────────────────────── */
const TABS = [
  { id: 'home',     label: 'Learn',    icon: '◆', target: 'tokens' },
  { id: 'practice', label: 'Practice', icon: '⚡', target: 'tokens' },
  { id: 'dojo',     label: 'Dojo',     icon: '⚔', target: 'tokens' },
  { id: 'profile',  label: 'Sensei',   icon: '◐', target: 'tokens' },
];

function tabFor(screen) {
  // Maps screen id → which tab should highlight.
  // Expanded as more screens land in later phases.
  if (screen === 'tokens') return null;
  if (['home', 'lesson', 'lesson-summary'].includes(screen)) return 'home';
  if (['exercise-mcq', 'exercise-tap', 'exercise-type',
       'result-correct', 'result-wrong', 'review',
       'out-of-hearts'].includes(screen)) return 'practice';
  if (['dojo', 'empty-dojo'].includes(screen)) return 'dojo';
  if (screen === 'profile') return 'profile';
  return null;
}

function renderTabs() {
  const active = tabFor(S.screen);
  document.getElementById('tabs').innerHTML = TABS.map(t => `
    <button class="tab ${t.id === active ? 'on' : ''}"
            type="button"
            data-action="go-tab"
            data-tab="${t.id}">
      <span class="tab-icon" aria-hidden="true">${t.icon}</span>
      <span class="tab-label">${t.label}</span>
    </button>
  `).join('');
}

/* ────────────────────────────────────────────────────────────
   Render
   ──────────────────────────────────────────────────────────── */
function render() {
  const fn = SCREENS[S.screen] || SCREENS.tokens;
  document.getElementById('screen').innerHTML = fn(S);
  renderTabs();
}

/* ────────────────────────────────────────────────────────────
   Event delegation — every interactive element uses data-action.
   ──────────────────────────────────────────────────────────── */
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  handle(action, el.dataset, el, e);
});

function handle(action, data) {
  switch (action) {
    case 'go':
      return go(data.to);
    case 'go-tab': {
      const tab = TABS.find(t => t.id === data.tab);
      if (tab) go(tab.target);
      return;
    }
    default:
      console.warn('[codesensei] unhandled action:', action, data);
  }
}

/* ────────────────────────────────────────────────────────────
   Boot
   ──────────────────────────────────────────────────────────── */
load();
render();
