<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Code Sensei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ────────────────────────────────────────────────────────────
   Design tokens — Theme A · Dojo Paper
   Source of truth: design/spec-sheet.jsx (the spec wins).
   Every hardcoded colour in component CSS is a red flag.
   ──────────────────────────────────────────────────────────── */
:root {
  /* Colour · core */
  --bg:            #f7f1e3;
  --surface:       #fdf8ec;
  --surface-2:     #ede4cd;
  --ink:           #2a221a;
  --muted:         #8a7d68;
  --hairline:      rgba(60, 45, 25, 0.13);
  --accent:        #b8412e;
  --accent-ink:    #fdf8ec;
  --accent-bg:     rgba(184, 65, 46, 0.10);
  --accent-shadow: rgba(120, 30, 18, 0.25);

  /* Colour · semantic */
  --success: #5b8a3a;
  --error:   #b8412e;
  --warn:    #c98a2c;

  /* Type */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Menlo, monospace;

  /* Radius */
  --r-pill:  999px;
  --r-card:  14px;
  --r-input: 8px;

  /* Spacing scale (4px base) */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;

  /* Syntax tokens (code) */
  --syn-bg:  #fffbef;
  --syn-kw:  #8a3722;
  --syn-str: #5b8a3a;
  --syn-fn:  #7a5e1a;
  --syn-num: #9a4f1e;
  --syn-com: #a89678;
  --syn-var: #3a2e22;
  --syn-op:  #6b5945;

  /* Animation budget (spec: 200ms transitions, 600ms celebrations) */
  --t-fast: 120ms;
  --t-base: 200ms;
  --t-cel:  600ms;
}

/* ────────────────────────────────────────────────────────────
   Base reset
   ──────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  /* Outside-the-app neutral on desktop, --bg on mobile (full-bleed). */
  background: #e8dfc9;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }

/* ────────────────────────────────────────────────────────────
   App frame
   Desktop: centered phone-shaped column (no device chrome — this is
            the actual app, not a screenshot of one).
   Mobile (≤700px): full-bleed.
   ──────────────────────────────────────────────────────────── */
#app {
  width: min(420px, 100vw);
  height: min(820px, 100vh);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border-radius: 24px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(0, 0, 0, 0.08);
}

#screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

#tabs {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--hairline);
  background: var(--surface);
}

#tabs .tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: var(--sp-2) var(--sp-2) var(--sp-3);
  color: var(--muted);
  transition: color var(--t-fast) ease-out;
  min-height: 56px;            /* spec: ≥44px hit target */
}
#tabs .tab.on { color: var(--accent); }
#tabs .tab .tab-icon { font-size: 18px; line-height: 1; }
#tabs .tab .tab-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

@media (max-width: 700px) {
  body { background: var(--bg); align-items: stretch; }
  #app {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
}

/* ────────────────────────────────────────────────────────────
   Type utilities (used across screens)
   ──────────────────────────────────────────────────────────── */
.t-display { font: 800 28px/1.15 var(--font-sans); letter-spacing: -0.6px; }
.t-title   { font: 700 22px/1.25 var(--font-sans); letter-spacing: -0.4px; }
.t-h2      { font: 700 18px/1.3  var(--font-sans); letter-spacing: -0.3px; }
.t-body    { font: 400 14px/1.55 var(--font-sans); }
.t-caption { font: 700 11px/1.5  var(--font-sans); letter-spacing: 1.5px; text-transform: uppercase; }
.t-code    { font: 400 13px/1.55 var(--font-mono); }

.muted   { color: var(--muted); }
.accent  { color: var(--accent); }
.success { color: var(--success); }
.error   { color: var(--error); }
.warn    { color: var(--warn); }

/* ────────────────────────────────────────────────────────────
   Page chrome: topbar shared by most screens
   ──────────────────────────────────────────────────────────── */
.topbar {
  padding: var(--sp-4) var(--sp-5) var(--sp-2);
}

.page {
  padding: var(--sp-3) var(--sp-5) var(--sp-5);
}

/* ────────────────────────────────────────────────────────────
   Components — the public surface used by every screen.
   Each rule pulls colour/spacing from var(--*) only.
   ──────────────────────────────────────────────────────────── */

/* CodeBlock + syntax tokens */
.code-block {
  background: var(--syn-bg);
  border: 1px solid var(--hairline);
  border-radius: var(--r-input);
  font: 400 13px/1.6 var(--font-mono);
  overflow-x: auto;
  padding: var(--sp-3) 0;
}
.code-block.no-frame {
  padding: 0;
  background: transparent;
  border: none;
}
.code-line {
  display: flex;
  white-space: pre;
  padding: 0 var(--sp-3);
}
.code-line .line-num {
  width: 22px;
  flex-shrink: 0;
  color: var(--muted);
  opacity: 0.5;
  text-align: right;
  margin-right: var(--sp-2);
  user-select: none;
}
.code-line .line-marker {
  width: 14px;
  flex-shrink: 0;
  font-weight: 700;
  text-align: center;
  user-select: none;
}
.code-line.add { background: rgba(91, 138, 58, 0.10); }
.code-line.del { background: rgba(184, 65, 46, 0.08); }
.code-line.hl  { background: var(--accent-bg); }
.code-line .line-marker.add { color: var(--success); }
.code-line .line-marker.del { color: var(--error); }
.code-line .line-content { flex: 1; }

.syn-kw  { color: var(--syn-kw);  font-weight: 600; }
.syn-str { color: var(--syn-str); }
.syn-fn  { color: var(--syn-fn);  font-weight: 600; }
.syn-num { color: var(--syn-num); }
.syn-com { color: var(--syn-com); font-style: italic; }
.syn-var { color: var(--syn-var); }
.syn-op  { color: var(--syn-op); }

/* Pill */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.pill-lg { padding: 8px 14px; font-size: 13px; }
.pill-neutral { background: var(--surface-2); color: var(--ink);        border-color: var(--hairline); }
.pill-accent  { background: var(--accent);    color: var(--accent-ink); }
.pill-success { background: rgba(91, 138, 58, 0.12);  color: var(--success); border-color: rgba(91, 138, 58, 0.25); }
.pill-warn    { background: rgba(201, 138, 44, 0.12); color: var(--warn);    border-color: rgba(201, 138, 44, 0.25); }
.pill-error   { background: rgba(184, 65, 46, 0.10);  color: var(--error);   border-color: rgba(184, 65, 46, 0.20); }

/* Btn */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 18px;
  border-radius: var(--r-pill);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 700;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--hairline);
  min-height: 44px;
  transition: transform var(--t-fast), box-shadow var(--t-fast);
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: transparent;
  box-shadow: 0 4px 0 var(--accent-shadow);
}
.btn-primary:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--accent-shadow);
}
.btn-full { width: 100%; }

/* Hearts row */
.hearts-row {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 14px;
  color: var(--error);
}
.heart.spent { color: var(--surface-2); }
.hearts-count {
  margin-left: 4px;
  font: 700 12px/1 var(--font-sans);
  color: var(--error);
  font-variant-numeric: tabular-nums;
}

/* Progress dots — spec calls them "dots" but v2 mock renders bars. */
.progress-dots {
  display: flex;
  gap: 4px;
  flex: 1;
}
.dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--surface-2);
  transition: background var(--t-base) ease-out;
}
.dot.done, .dot.on { background: var(--accent); }

/* Blank slot — tap-to-fill landing zones */
.blank-slot {
  display: inline-block;
  min-width: 56px;
  min-height: 22px;
  padding: 1px 6px;
  border-radius: 4px;
  vertical-align: middle;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  text-align: center;
}
.blank-empty {
  background: var(--surface-2);
  border: 1.5px dashed var(--muted);
}
.blank-filled {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.blank-correct {
  background: rgba(91, 138, 58, 0.15);
  color: var(--success);
  border: 1.5px solid var(--success);
}
.blank-wrong {
  background: rgba(184, 65, 46, 0.10);
  color: var(--error);
  border: 1.5px solid var(--error);
  text-decoration: line-through;
}

/* Token chip — tap-fill tray */
.token-chip {
  display: inline-flex;
  align-items: center;
  padding: 10px 14px;
  border-radius: var(--r-pill);
  background: var(--surface);
  border: 1.5px solid var(--hairline);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  box-shadow: 0 2px 0 var(--hairline);
  min-height: 44px;
  transition: transform var(--t-fast), background var(--t-fast);
}
.token-chip:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--hairline); }
.token-chip.token-placed {
  background: var(--surface-2);
  opacity: 0.5;
  text-decoration: line-through;
  box-shadow: none;
  cursor: default;
}
.token-chip.token-correct {
  background: rgba(91, 138, 58, 0.15);
  color: var(--success);
  border-color: var(--success);
}
.token-chip.token-wrong {
  background: rgba(184, 65, 46, 0.10);
  color: var(--error);
  border-color: var(--error);
}

/* Mascot bubble */
.mascot-bubble {
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
}
.mascot-bubble.right { flex-direction: row-reverse; }
.mascot-bubble .speech {
  background: var(--surface);
  border-radius: var(--r-card);
  border: 1px solid var(--hairline);
  padding: var(--sp-3) var(--sp-4);
  font-size: 13px;
  line-height: 1.55;
  position: relative;
  flex: 1;
}
.mascot-bubble .speech::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 14px;
  width: 0; height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 6px solid var(--surface);
}
.mascot-bubble.right .speech::before {
  left: auto;
  right: -6px;
  border-right: none;
  border-left: 6px solid var(--surface);
}

/* Diff sections (used by Review) */
.diff-yours, .diff-sensei { margin-top: var(--sp-3); }

/* Debug-screen nav strip (Phase 2 only — removed when real Home lands). */
.debug-nav {
  display: flex;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-5);
  border-bottom: 1px dashed var(--hairline);
  background: var(--accent-bg);
}
.debug-nav button {
  font: 700 10px/1 var(--font-mono);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 4px;
  color: var(--muted);
}
.debug-nav button.on { background: var(--accent); color: var(--accent-ink); }

/* ────────────────────────────────────────────────────────────
   Debug screens (tokens + components) — Phase 1/2 scaffolding.
   ──────────────────────────────────────────────────────────── */
.dbg-section { margin-top: var(--sp-6); }
.dbg-section:first-of-type { margin-top: var(--sp-3); }
.dbg-section h2 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: var(--sp-2);
}
.swatch-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-1);
}
.swatch-row {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-1) 0;
  border-top: 1px solid var(--hairline);
  font-size: 12px;
}
.swatch-row:first-child { border-top: none; }
.swatch-chip {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid var(--hairline);
}
.swatch-name { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
.swatch-val  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }

.radius-grid { display: flex; gap: var(--sp-3); align-items: flex-end; flex-wrap: wrap; }
.radius-tile {
  width: 56px; height: 56px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  display: flex; align-items: center; justify-content: center;
  font: 600 11px/1 var(--font-mono);
  color: var(--muted);
}

.space-grid { display: flex; gap: var(--sp-2); align-items: flex-end; }
.space-bar {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  width: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  font: 700 10px/1 var(--font-mono);
  color: var(--accent);
  padding-bottom: 3px;
  min-width: 28px;
}

.type-sample { padding: var(--sp-2) 0; border-top: 1px solid var(--hairline); }
.type-sample:first-child { border-top: none; }
.type-sample .type-meta {
  font: 700 10px/1.4 var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

/* Component-preview screen layout */
.preview-card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-card);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
}
.preview-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
  align-items: center;
  margin-top: var(--sp-2);
}
.preview-label {
  font: 700 10px/1.4 var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: var(--sp-1);
}

/* ────────────────────────────────────────────────────────────
   v2 SCREENS — production layouts (Phase 3+)
   ──────────────────────────────────────────────────────────── */

/* When the bottom tab nav is empty (lesson/exercise/result), it disappears. */
#tabs:empty { display: none; }

/* === Home === */
.home-greet {
  padding: var(--sp-4) var(--sp-5) var(--sp-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-2);
  flex-wrap: wrap;
}
.home-greet .greet { font-size: 13px; color: var(--muted); font-weight: 600; }
.home-pills { display: flex; gap: 10px; }

.hero-card {
  margin: var(--sp-3) var(--sp-4) 0;
  background: var(--accent);
  color: var(--accent-ink);
  border-radius: calc(var(--r-card) * 1.4);
  padding: var(--sp-5) var(--sp-4);
  position: relative;
  overflow: hidden;
  display: block;
  width: calc(100% - 2 * var(--sp-4));
  text-align: left;
  border: none;
  box-shadow: 0 6px 0 var(--accent-shadow);
  cursor: pointer;
  font-family: inherit;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  opacity: 0.8; text-transform: uppercase;
}
.hero-title {
  font-size: 22px; font-weight: 800; margin-top: 6px;
  letter-spacing: -0.4px; line-height: 1.15;
}
.hero-sub { font-size: 13px; opacity: 0.85; margin-top: 2px; }
.hero-progress {
  margin-top: var(--sp-3); height: 6px;
  background: rgba(255, 255, 255, 0.25);
  border-radius: 3px; overflow: hidden;
}
.hero-progress > div { height: 100%; background: var(--accent-ink); }
.hero-cta-row {
  margin-top: var(--sp-3); display: flex; align-items: center; gap: 10px;
}
.hero-cta {
  background: var(--accent-ink); color: var(--accent);
  padding: 10px 18px; border-radius: var(--r-pill);
  font-weight: 800; font-size: 14px; min-height: 44px;
  display: inline-flex; align-items: center; gap: 6px;
}
.hero-mascot { position: absolute; right: -6px; bottom: -8px; opacity: 0.85; }

.belt-strip {
  padding: var(--sp-5) var(--sp-5) var(--sp-2);
  display: flex; align-items: center; justify-content: space-between;
}
.belt-info { display: flex; align-items: center; gap: 10px; }
.belt-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: #e8c75a;
  border: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: var(--ink);
}
.belt-label { font-size: 13px; font-weight: 700; }
.belt-sub   { font-size: 11px; color: var(--muted); }
.belt-link  { font-size: 12px; color: var(--muted); font-weight: 600; }

.section-eyebrow {
  padding: var(--sp-3) var(--sp-4) var(--sp-2);
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--muted); text-transform: uppercase;
}

.mission-list {
  padding: 0 var(--sp-4); display: flex; flex-direction: column; gap: 10px;
}
.mission {
  background: var(--surface); border-radius: var(--r-card);
  border: 1px solid var(--hairline); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
}
.mission-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent-bg); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
}
.mission-name { font-size: 14px; font-weight: 600; }
.mission-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

.tracks-row {
  margin: var(--sp-5) var(--sp-4) var(--sp-4);
  background: var(--surface); border-radius: var(--r-card);
  border: 1px solid var(--hairline); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
}
.track-icons { display: flex; gap: 6px; }
.track-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--surface-2); color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; font-family: var(--font-mono);
}
.track-icon.on { background: var(--accent); color: var(--accent-ink); }

/* === Lesson === */
.lesson-top {
  padding: 12px var(--sp-4) 10px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--hairline);
}
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.lesson-step-counter {
  font-size: 12px; color: var(--muted);
  font-variant-numeric: tabular-nums; font-weight: 700;
  flex-shrink: 0;
}

.lesson-body {
  padding: var(--sp-6) var(--sp-5) var(--sp-4); flex: 1;
}
.lesson-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--muted); text-transform: uppercase;
}
.lesson-title {
  font-size: 28px; font-weight: 800; letter-spacing: -0.6px;
  margin-top: 8px; line-height: 1.15;
}
.lesson-mascot { margin-top: var(--sp-5); }
.lesson-code   { margin-top: var(--sp-5); }
.lesson-callout {
  margin-top: var(--sp-3); padding: 10px 14px;
  background: var(--accent-bg); border-radius: var(--r-card);
  font-size: 13px; line-height: 1.5;
}
.lesson-cta-bar {
  padding: var(--sp-4); border-top: 1px solid var(--hairline);
}

.lesson-screen {
  display: flex; flex-direction: column; min-height: 100%;
}

/* === Exercise (shared header) === */
.ex-screen {
  display: flex; flex-direction: column; min-height: 100%;
}
.ex-top {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid var(--hairline);
}
.ex-progress {
  flex: 1; height: 6px; border-radius: 3px;
  background: var(--surface-2); overflow: hidden;
}
.ex-progress > div {
  height: 100%; background: var(--accent);
  transition: width var(--t-base) ease-out;
}
.ex-hearts {
  font-size: 12px; color: var(--error); font-weight: 700;
  flex-shrink: 0;
}
.ex-prompt-block { padding: var(--sp-5) var(--sp-5) var(--sp-3); }
.ex-prompt {
  font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
  margin-top: var(--sp-3); line-height: 1.25;
}
.ex-prompt.smaller {
  font-size: 20px; letter-spacing: -0.3px; line-height: 1.3;
}
.ex-prompt code {
  font-family: var(--font-mono);
  background: var(--surface-2);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 17px;
  color: var(--syn-fn);
}
.ex-cta-bar {
  padding: var(--sp-4); display: flex; gap: 10px;
  border-top: 1px solid var(--hairline);
  margin-top: auto;
}

/* === MCQ === */
.mcq-list {
  padding: var(--sp-5) var(--sp-4) 0;
  display: flex; flex-direction: column; gap: 10px;
}
.mcq-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1.5px solid var(--hairline);
  border-radius: var(--r-card);
  box-shadow: 0 2px 0 var(--hairline);
  text-align: left; width: 100%; cursor: pointer;
  min-height: 56px;
  font-family: inherit; font-size: inherit; color: inherit;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.mcq-opt.on {
  background: var(--accent-bg);
  border-color: var(--accent);
  box-shadow: none;
}
.mcq-letter {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--surface-2);
  border: 1.5px solid var(--hairline);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 12px; font-weight: 800;
  color: var(--muted); flex-shrink: 0;
}
.mcq-opt.on .mcq-letter { border-color: var(--accent); color: var(--accent); }
.mcq-opt .mcq-text {
  font-family: var(--font-mono); font-size: 14px; font-weight: 600;
}

/* === Tap-fill === */
.tap-code {
  margin: 6px var(--sp-4) 0;
  background: var(--syn-bg);
  border-radius: var(--r-card);
  border: 1px solid var(--hairline);
  font-family: var(--font-mono); font-size: 14px; line-height: 1.85;
  padding: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}
.tap-code .blank-slot[data-state]:not([data-state="empty"]) { cursor: pointer; }
.tap-tray-label {
  padding: var(--sp-5) var(--sp-4) 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--muted); text-transform: uppercase;
}
.tap-tray {
  padding: 6px var(--sp-4) 0;
  display: flex; flex-wrap: wrap; gap: 8px;
}

/* === Type-it === */
.type-editor {
  margin: 0 var(--sp-4);
  background: var(--syn-bg);
  border-radius: var(--r-card);
  border: 1px solid var(--hairline);
  position: relative;
  overflow: hidden;
  flex: 1;
  display: flex;
}
.type-editor textarea {
  width: 100%;
  min-height: 200px;
  padding: 14px 14px 32px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  color: var(--syn-var);
  display: block;
  -webkit-appearance: none;
  flex: 1;
}
.type-badge {
  position: absolute; right: 14px; bottom: 8px;
  font-size: 11px; color: var(--muted);
  background: var(--syn-bg);
  padding: 2px 6px;
  pointer-events: none;
}
.kbd-row {
  padding: 14px 12px 6px;
  display: flex; gap: 6px; overflow-x: auto;
}
.kbd-key {
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  flex-shrink: 0;
  box-shadow: 0 1px 0 var(--hairline);
  min-height: 36px;
  color: var(--ink);
  cursor: pointer;
}
.hint-card {
  margin: 14px var(--sp-4) 0;
  background: var(--surface); border-radius: var(--r-card);
  border: 1px solid var(--hairline); padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
.hint-card .hint-text { font-size: 13px; color: var(--muted); flex: 1; }
.hint-card .hint-action { color: var(--accent); font-weight: 700; }
.hint-card .hint-arrow { color: var(--muted); }

/* === Result · Correct === */
.result-correct-screen {
  background: var(--accent-bg);
  min-height: 100%;
  display: flex; flex-direction: column;
  animation: result-cheer var(--t-cel) ease-out;
}
@keyframes result-cheer {
  from { background: var(--bg); opacity: 0.7; }
  to   { background: var(--accent-bg); opacity: 1; }
}
.result-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
}
.result-cheer {
  font-size: 32px; font-weight: 800; color: var(--accent);
  letter-spacing: -0.8px; margin-top: 18px;
}
.result-roman {
  font-size: 14px; color: var(--muted); margin-top: 4px; font-weight: 600;
}
.result-headline {
  font-size: 22px; font-weight: 700; margin-top: 22px;
  letter-spacing: -0.4px; max-width: 280px;
}
.result-pills {
  margin-top: 22px;
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.result-bottom { padding: 0 var(--sp-4) 20px; }

/* === Result · Wrong === */
.result-wrong-screen {
  background: var(--bg);
  min-height: 100%;
  display: flex; flex-direction: column;
}
.result-wrong-mascot { opacity: 0.85; }
.result-wrong-h1 {
  font-size: 26px; font-weight: 800; letter-spacing: -0.6px;
  margin-top: 18px;
}
.result-why {
  font-size: 15px; color: var(--muted); margin-top: 8px;
  line-height: 1.5; max-width: 280px;
}
.result-why code {
  font-family: var(--font-mono); padding: 0 2px;
  font-weight: 700;
}
.result-why code.was   { color: var(--error); }
.result-why code.right { color: var(--accent); }
.heart-loss-pill {
  margin-top: 22px; padding: 10px 16px;
  background: rgba(184, 65, 46, 0.10);
  border-radius: var(--r-pill);
  color: var(--error); font-weight: 700; font-size: 13px;
}
.dojo-callout {
  margin-top: var(--sp-6); padding: 12px 14px;
  background: var(--surface); border-radius: var(--r-card);
  border: 1px solid var(--hairline);
  font-size: 13px; color: var(--muted); max-width: 300px;
}
.dojo-callout b { color: var(--ink); }

/* === Review === */
.rev-top {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid var(--hairline);
}
.rev-back {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.rev-title { flex: 1; font-size: 15px; font-weight: 700; }

.rev-explain {
  padding: 22px 20px 18px;
  display: flex; gap: 14px; align-items: flex-start;
}
.rev-explain-body { flex: 1; min-width: 0; }
.rev-explain-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--accent); text-transform: uppercase; margin-bottom: 6px;
}
.rev-explain-h1 {
  font-size: 18px; font-weight: 700;
  line-height: 1.35; letter-spacing: -0.3px;
}
.rev-explain-text {
  font-size: 14px; color: var(--muted);
  margin-top: 8px; line-height: 1.55;
}
.rev-explain-text code {
  font-family: var(--font-mono);
  background: var(--surface-2);
  padding: 1px 5px; border-radius: 4px;
  font-size: 12px; font-weight: 600; color: var(--ink);
}

.rev-toggle {
  display: flex; background: var(--surface-2); padding: 3px;
  border-radius: var(--r-pill); font-size: 13px; font-weight: 700;
  margin: 0 var(--sp-4) 8px;
}
.rev-toggle button {
  flex: 1; text-align: center; padding: 7px 0;
  border-radius: calc(var(--r-pill) - 2px);
  color: var(--muted);
  background: transparent;
}
.rev-toggle button.on {
  background: var(--surface); color: var(--ink);
  box-shadow: 0 1px 2px var(--hairline);
}
.rev-diff-wrap { padding: 0 var(--sp-4); }

.tests-card {
  margin: 14px var(--sp-4) 0;
  background: var(--surface); border-radius: var(--r-card);
  border: 1px solid var(--hairline); padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px;
  cursor: pointer;
  width: calc(100% - 2 * var(--sp-4));
  text-align: left;
  font-family: inherit; color: inherit;
}
.tests-card-icon {
  width: 22px; height: 22px; border-radius: 11px;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.tests-card-icon.fail { background: var(--error); }
.tests-card-icon.pass { background: var(--success); }
.tests-card-label { flex: 1; font-weight: 600; }
.tests-card-toggle { font-size: 12px; color: var(--accent); font-weight: 700; }
.tests-detail {
  margin: 0 var(--sp-4) 0;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-top: none;
  border-radius: 0 0 var(--r-card) var(--r-card);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
}
.tests-detail .test-row { display: flex; gap: 8px; align-items: baseline; }
.tests-detail .test-row .pass { color: var(--success); }
.tests-detail .test-row .fail { color: var(--error); }

.rev-cta-bar {
  padding: 20px var(--sp-4) 18px; display: flex; gap: 10px;
}

/* === Dojo === */
.dojo-header { padding: 18px 20px 4px; }
.dojo-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--muted); text-transform: uppercase;
}
.dojo-h1 {
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.5px; margin-top: 4px;
}
.dojo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

.drill-all {
  margin: 14px var(--sp-4) 0;
  background: var(--accent); border-radius: var(--r-card);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  color: var(--accent-ink);
  width: calc(100% - 2 * var(--sp-4));
  border: none; cursor: pointer;
  text-align: left;
  font-family: inherit;
  box-shadow: 0 4px 0 var(--accent-shadow);
  min-height: 64px;
}
.drill-all-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--accent-ink); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  flex-shrink: 0;
}
.drill-all-title { font-size: 14px; font-weight: 800; }
.drill-all-meta  { font-size: 12px; opacity: 0.85; }
.drill-all-arrow { font-size: 18px; font-weight: 800; }

.dojo-filters {
  padding: 18px var(--sp-4) 6px;
  display: flex; gap: 8px; overflow-x: auto;
}
.filter-chip {
  padding: 6px 12px; border-radius: var(--r-pill);
  background: var(--surface); color: var(--muted);
  border: 1px solid var(--hairline);
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  cursor: pointer; font-family: inherit;
  min-height: 32px;
}
.filter-chip.on {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}

.mistake-list {
  padding: 12px var(--sp-4) 0;
  display: flex; flex-direction: column; gap: 10px;
}
.mistake-card {
  background: var(--surface); border-radius: var(--r-card);
  border: 1px solid var(--hairline); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  width: 100%; text-align: left; cursor: pointer;
  font-family: inherit; color: inherit;
  min-height: 64px;
}
.mistake-lang {
  width: 36px; height: 36px; border-radius: 8px;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 11px; font-weight: 800;
  flex-shrink: 0;
}
.mistake-info { flex: 1; min-width: 0; }
.mistake-title {
  font-size: 14px; font-weight: 700;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.mistake-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.mistake-empty {
  padding: 40px 24px; text-align: center;
  color: var(--muted);
}

/* ────────────────────────────────────────────────────────────
   Tier 1 — onboarding + edges (Phase 4)
   ──────────────────────────────────────────────────────────── */

/* === Splash === */
.splash {
  background: var(--accent);
  color: var(--accent-ink);
  min-height: 100%;
  display: flex; flex-direction: column;
}
.splash-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
}
.splash-mark {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.85; margin-top: 18px;
}
.splash-h1 {
  font-size: 36px; font-weight: 800; letter-spacing: -1px;
  margin-top: 12px; line-height: 1.05;
}
.splash-tagline {
  font-size: 16px; opacity: 0.9;
  margin-top: 14px; max-width: 280px; line-height: 1.5;
}
.splash-cta-bar {
  padding: 0 var(--sp-4) 28px;
  display: flex; flex-direction: column; gap: 10px;
}
.splash-btn {
  background: var(--accent-ink); color: var(--accent);
  border: none; border-radius: var(--r-pill);
  padding: 14px 18px;
  font-weight: 800; font-size: 15px;
  font-family: inherit;
  min-height: 48px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer;
}
.splash-btn.ghost {
  background: transparent;
  color: var(--accent-ink);
  border: 1.5px solid rgba(253, 248, 236, 0.5);
}

/* === Onboarding shared === */
.onb-top {
  padding: 18px 20px 8px;
  display: flex; align-items: center; gap: 10px;
}
.onb-progress {
  flex: 1; display: flex; gap: 4px;
}
.onb-progress > div {
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--surface-2);
}
.onb-progress > div.on { background: var(--accent); }
.onb-step {
  font-size: 12px; color: var(--muted);
  font-variant-numeric: tabular-nums; font-weight: 700;
}
.onb-body { padding: var(--sp-5) var(--sp-5) 0; }
.onb-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--muted); text-transform: uppercase;
}
.onb-h1 {
  font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
  margin-top: 6px; line-height: 1.2;
}
.onb-sub {
  font-size: 14px; color: var(--muted);
  margin-top: 6px; line-height: 1.5;
}
.onb-cta-bar {
  padding: var(--sp-4); border-top: 1px solid var(--hairline);
  margin-top: auto;
}
.onb-screen {
  display: flex; flex-direction: column; min-height: 100%;
}

/* === Track picker === */
.track-grid {
  padding: var(--sp-3) var(--sp-5) 0;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.track-tile {
  background: var(--surface);
  border: 1.5px solid var(--hairline);
  border-radius: var(--r-card);
  padding: 14px;
  cursor: pointer;
  text-align: left;
  font-family: inherit; color: inherit;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 120px;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.track-tile.on {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.track-tile-icon {
  width: 36px; height: 36px; border-radius: 8px;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 12px; font-weight: 800;
}
.track-tile-name { font-size: 15px; font-weight: 700; }
.track-tile-meta { font-size: 12px; color: var(--muted); margin-top: auto; }
.track-tile-check {
  position: absolute;
}
.track-tile { position: relative; }
.track-tile.on::after {
  content: '✓';
  position: absolute;
  top: 10px; right: 10px;
  width: 22px; height: 22px;
  border-radius: 11px;
  background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
}

/* === Self-rate placement === */
.skill-list {
  padding: var(--sp-3) var(--sp-5) 0;
  display: flex; flex-direction: column; gap: 10px;
}
.skill-opt {
  background: var(--surface);
  border: 1.5px solid var(--hairline);
  border-radius: var(--r-card);
  padding: 14px;
  cursor: pointer; text-align: left;
  font-family: inherit; color: inherit;
  width: 100%;
  display: flex; align-items: flex-start; gap: 12px;
  min-height: 64px;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.skill-opt.on {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.skill-opt-emoji { font-size: 22px; flex-shrink: 0; line-height: 1.2; }
.skill-opt-title { font-size: 14px; font-weight: 700; }
.skill-opt-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* === Daily goal === */
.goal-list {
  padding: var(--sp-3) var(--sp-5) 0;
  display: flex; flex-direction: column; gap: 10px;
}
.goal-opt {
  background: var(--surface);
  border: 1.5px solid var(--hairline);
  border-radius: var(--r-card);
  padding: 14px 18px;
  cursor: pointer; text-align: left;
  font-family: inherit; color: inherit;
  width: 100%;
  display: flex; align-items: center; gap: 14px;
  min-height: 56px;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.goal-opt.on {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.goal-opt-mins {
  font-family: var(--font-mono);
  font-size: 18px; font-weight: 800;
  color: var(--accent); min-width: 56px;
}
.goal-opt-label { font-size: 14px; font-weight: 700; }
.goal-opt-recommended {
  margin-left: auto;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  padding: 3px 8px; border-radius: var(--r-pill);
}

/* === Profile === */
.profile-header { padding: 24px 20px 8px; text-align: center; }
.profile-mascot { display: flex; justify-content: center; }
.profile-name {
  font-size: 22px; font-weight: 800;
  margin-top: 10px; letter-spacing: -0.4px;
}
.profile-belt {
  margin-top: 6px;
  font-size: 13px; color: var(--muted); font-weight: 600;
}

.belt-path {
  padding: 14px var(--sp-4) 8px;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.belt-pip {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.belt-pip .belt-dot {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--hairline);
  font-size: 11px; font-weight: 800; color: var(--muted);
  background: var(--surface);
}
.belt-pip .belt-name {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.belt-pip.on .belt-dot { border-color: var(--ink); color: var(--ink); }
.belt-pip.current .belt-dot {
  border-color: var(--accent); color: var(--accent-ink);
  background: var(--accent);
}
.belt-pip.current .belt-name { color: var(--accent); }

.stats-grid {
  margin: var(--sp-4) var(--sp-4) 0;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--hairline);

<body>
<div id="app">
  <div id="screen"></div>
  <nav id="tabs"></nav>
</div>

<script>
'use strict';

/* ────────────────────────────────────────────────────────────
   State
   ──────────────────────────────────────────────────────────── */
const S = {
  screen: 'home',            // load() rewrites based on onboarded state.
  user: {
    name: '',
    onboarded: false,        // load() flips returning users via migration.
  },
  hearts: 5,
  streak: 7,                 // demo seed; real streak logic lands in Phase 5.
  xp: 312,                   // demo seed.
  progress: {},              // { trackId → { unitIdx, lessonIdx, stepIdx } }
  mistakes: [],              // Mistake[] — see spec-sheet "Components & data".
  session: null,             // active exercise stack — see startLesson/startDrill.
  pausedSession: null,       // a lesson/practice session paused for a Dojo
                             // drill or out-of-hearts detour. Restored by
                             // drillResolve() and continueOrStart().
  seeded: false,             // one-shot flag — see load().
  onboarding: {
    trackIds: ['py'],        // Python preselected per HANDOFF.
    skill: null,             // 'beginner' | 'some' | 'comfortable' | 'fluent'
    dailyGoalMin: 10,        // 'Regular' default per HANDOFF.
  },
  ui: {
    reviewTab: 'split',      // 'split' | 'yours' | 'sensei'
    dojoFilter: 'all',       // 'all' | 'due' | 'py' | 'js' | 'sql' | 'css'
    dojoShowMastered: false,
    testsOpen: false,
    lessonStep: 0,
  },
  params: null,              // route params from the most recent go()
};

/* ────────────────────────────────────────────────────────────
   Persistence — localStorage. No external deps.
   ──────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'codesensei.v1';

// Frozen deep-copy of the default shape, captured at module load.
// load() rehydrates S from this on every boot, then overlays saved
// values — so fields added in future phases automatically get their
// defaults for users whose stored state predates them. Additive
// schema changes shouldn't crash returning users.
const DEFAULT_S = JSON.parse(JSON.stringify(S));

function deepClone(v) {
  return v === null || typeof v !== 'object'
    ? v
    : JSON.parse(JSON.stringify(v));
}

function load() {
  let saved = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) saved = JSON.parse(raw);
  } catch (e) {
    console.warn('[codesensei] load failed — starting fresh:', e);
  }

  // Reset every slice to a fresh copy of its default. This guarantees
  // that any field NOT present in the saved blob keeps its current
  // default (the bug Phase 4 hit: saved.user was null/old-shape, the
  // assignment clobbered the new user default, and S.user.onboarded
  // crashed on read).
  Object.keys(DEFAULT_S).forEach(k => {
    S[k] = deepClone(DEFAULT_S[k]);
  });

  // Overlay saved fields on top of defaults — defensively.
  if (saved && typeof saved === 'object') {
    const skip = new Set(['screen', 'params']);
    for (const k of Object.keys(saved)) {
      if (skip.has(k) || !(k in DEFAULT_S)) continue;
      const def = DEFAULT_S[k];
      const sv  = saved[k];
      if (def && typeof def === 'object' && !Array.isArray(def) &&
          sv  && typeof sv  === 'object' && !Array.isArray(sv)) {
        // Object slice (user, ui, onboarding) — merge per-field so a
        // saved subset doesn't drop default keys.
        Object.keys(sv).forEach(sk => { S[k][sk] = sv[sk]; });
      } else if (sv !== null) {
        // Scalar / array — replace wholesale. Never let stored null
        // drop a default object (the actual Phase 4 crash root cause).
        S[k] = sv;
      }
    }
  }

  // First-run seed — populate the Dojo so the demo loop has content.
  if (!S.seeded) {
    S.mistakes = SAMPLE_MISTAKES.slice();
    S.seeded = true;
  }

  // Migration: anyone with saved state from a previous phase predates
  // the `onboarded` flag — treat them as already-onboarded so they
  // aren't bounced to splash on schema upgrade.
  if (saved && saved.seeded) {
    if (!S.user.onboarded) S.user.onboarded = true;
    if (!S.user.name) S.user.name = 'Sam';
  }

  // Onboarding gate — non-onboarded users always boot into splash, even
  // if they were mid-something when they last quit.
  S.screen = S.user.onboarded ? 'home' : 'splash';
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  } catch (e) {
    console.warn('[codesensei] save failed:', e);
  }
}

/* ────────────────────────────────────────────────────────────
   Navigation
   ──────────────────────────────────────────────────────────── */
function go(screen, params) {
  S.screen = screen;
  S.params = params || null;
  render();
  save();
  document.getElementById('screen').scrollTop = 0;
}

/* ────────────────────────────────────────────────────────────
   HTML helpers
   ──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

/* ────────────────────────────────────────────────────────────
   Tokenizer + CodeBlock
   Minimal one-pass tokenizer for Python / JavaScript / SQL.
   Not a full parser — good enough for the lesson corpus.
   ──────────────────────────────────────────────────────────── */
const KEYWORDS = {
  py: new Set([
    'def','class','if','elif','else','for','while','in','return',
    'import','from','as','with','try','except','finally','raise',
    'pass','break','continue','lambda','yield','True','False','None',
    'and','or','not','is','global','nonlocal','async','await',
  ]),
  js: new Set([
    'var','let','const','function','if','else','for','while','do',
    'switch','case','default','break','continue','return','new',
    'class','extends','super','this','typeof','instanceof','in','of',
    'true','false','null','undefined','async','await','try','catch',
    'finally','throw','import','export','from','as',
  ]),
  // SQL is matched case-insensitively — see tokenize().
  sql: new Set([
    'SELECT','FROM','WHERE','AND','OR','NOT','INSERT','INTO','VALUES',
    'UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','JOIN',
    'INNER','LEFT','RIGHT','OUTER','ON','AS','GROUP','BY','ORDER',
    'HAVING','LIMIT','OFFSET','DISTINCT','COUNT','SUM','AVG','MIN',
    'MAX','NULL','IS','IN','BETWEEN','LIKE','EXISTS','UNION','ALL',
  ]),
};

function tokenize(code, lang) {
  const kws  = KEYWORDS[lang] || new Set();
  const out  = [];
  const len  = code.length;
  let i = 0;

  while (i < len) {
    const ch = code[i];

    // whitespace — preserved verbatim
    if (/\s/.test(ch)) {
      let j = i;
      while (j < len && /\s/.test(code[j])) j++;
      out.push({ type: 'ws', value: code.slice(i, j) });
      i = j;
      continue;
    }

    // line comments (#, //, --) and JS block comment
    if (lang === 'py' && ch === '#') {
      const end = code.indexOf('\n', i);
      const stop = end === -1 ? len : end;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }
    if ((lang === 'js' || lang === 'sql') &&
        ch === '-' && code[i + 1] === '-' && lang === 'sql') {
      const end = code.indexOf('\n', i);
      const stop = end === -1 ? len : end;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }
    if (lang === 'js' && ch === '/' && code[i + 1] === '/') {
      const end = code.indexOf('\n', i);
      const stop = end === -1 ? len : end;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }
    if (lang === 'js' && ch === '/' && code[i + 1] === '*') {
      const end = code.indexOf('*/', i + 2);
      const stop = end === -1 ? len : end + 2;
      out.push({ type: 'com', value: code.slice(i, stop) });
      i = stop;
      continue;
    }

    // strings — '...', "...", and JS template literals `...`
    if (ch === '"' || ch === "'" || (lang === 'js' && ch === '`')) {
      const quote = ch;
      let j = i + 1;
      while (j < len && code[j] !== quote) {
        if (code[j] === '\\' && j + 1 < len) j += 2;
        else j++;
      }
      if (j < len) j++;
      out.push({ type: 'str', value: code.slice(i, j) });
      i = j;
      continue;
    }

    // numbers — int, float, 0x.., scientific
    if (/\d/.test(ch)) {
      let j = i;
      while (j < len && /[0-9.eExX_a-fA-F]/.test(code[j])) j++;
      out.push({ type: 'num', value: code.slice(i, j) });
      i = j;
      continue;
    }

    // identifiers / keywords / function calls
    if (/[A-Za-z_$]/.test(ch)) {
      let j = i + 1;
      while (j < len && /[A-Za-z0-9_$]/.test(code[j])) j++;
      const word = code.slice(i, j);
      const probe = (lang === 'sql') ? word.toUpperCase() : word;
      if (kws.has(probe)) {
        out.push({ type: 'kw', value: word });
      } else if (code[j] === '(') {
        out.push({ type: 'fn', value: word });
      } else {
        out.push({ type: 'var', value: word });
      }
      i = j;
      continue;
    }

    // operators / punctuation
    if (/[+\-*/%=<>!&|^~?:,.;()\[\]{}]/.test(ch)) {
      out.push({ type: 'op', value: ch });
      i++;
      continue;
    }

    // fallback — never crash
    out.push({ type: 'var', value: ch });
    i++;
  }

  return out;
}

function renderTokens(tokens) {
  return tokens.map(t => {
    if (t.type === 'ws') return esc(t.value);
    return `<span class="syn-${t.type}">${esc(t.value)}</span>`;
  }).join('');
}

/* CodeBlock — opts: { code, lang, highlight, showLineNumbers, frame } */
function CodeBlock(opts) {
  const code            = opts.code || '';
  const lang            = opts.lang || 'py';
  const highlight       = opts.highlight || {};   // { lineNo: '+'|'-'|'*' }
  const showLineNumbers = opts.showLineNumbers !== false;
  const frame           = opts.frame !== false;

  const lines = code.split('\n');
  const body = lines.map((line, idx) => {
    const lineNo = idx + 1;
    const mark   = highlight[lineNo];
    const cls    = mark === '+' ? 'add'
                 : mark === '-' ? 'del'
                 : mark === '*' ? 'hl'
                 : '';
    const numHtml    = showLineNumbers
      ? `<span class="line-num">${lineNo}</span>`
      : '';
    const markerHtml = (mark === '+' || mark === '-')
      ? `<span class="line-marker ${mark === '+' ? 'add' : 'del'}">${mark}</span>`
      : '';
    const tokens = tokenize(line, lang);
    return `<div class="code-line ${cls}">${numHtml}${markerHtml}<span class="line-content">${renderTokens(tokens)}</span></div>`;
  }).join('');

  return `<div class="code-block ${frame ? '' : 'no-frame'}">${body}</div>`;
}

/* ────────────────────────────────────────────────────────────
   Components
   Each helper returns an HTML string. Click handling rides on
   data-action attributes via the global delegate.
   ──────────────────────────────────────────────────────────── */
function Pill(text, opts) {
  opts = opts || {};
  const tone = opts.tone || 'neutral';
  const size = opts.size === 'lg' ? 'pill-lg' : '';
  return `<span class="pill pill-${tone} ${size}">${esc(text)}</span>`;
}

function dataAttrs(data) {
  if (!data) return '';
  return Object.entries(data)
    .map(([k, v]) => ` data-${esc(k)}="${esc(v)}"`)
    .join('');
}

function Btn(label, opts) {
  opts = opts || {};
  const cls = ['btn'];
  if (opts.primary) cls.push('btn-primary');
  if (opts.full)    cls.push('btn-full');
  const action = opts.action ? ` data-action="${esc(opts.action)}"` : '';
  return `<button type="button" class="${cls.join(' ')}"${action}${dataAttrs(opts.data)}>${esc(label)}</button>`;
}

/* MascotSVG — Theme A · Dojo Paper sensei.
   Ported verbatim from design/themes.jsx MascotPaper.
   Colours are intentionally hardcoded: each theme has its own mascot. */
function MascotSVG(size) {
  size = size || 56;
  return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" aria-hidden="true">
    <circle cx="32" cy="34" r="20" fill="#f5ead4" stroke="#3a2e22" stroke-width="1.5"/>
    <path d="M16 26 Q22 14 32 14 Q42 14 48 26 Q44 22 36 22 Q28 22 20 26 Z" fill="#1f1a16"/>
    <ellipse cx="32" cy="13" rx="4" ry="2.5" fill="#1f1a16"/>
    <rect x="14" y="26" width="36" height="4" fill="#b8412e"/>
    <circle cx="32" cy="28" r="1.6" fill="#f5ead4"/>
    <path d="M24 36 Q26 34.5 28 36" stroke="#1f1a16" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M36 36 Q38 34.5 40 36" stroke="#1f1a16" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M27 43 Q32 45 37 43" stroke="#1f1a16" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M28 47 Q32 49 36 47" stroke="#1f1a16" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </svg>`;
}

function MascotBubble(opts) {
  opts = opts || {};
  const size    = opts.size || 48;
  const message = opts.message || '';
  const side    = opts.side === 'right' ? 'right' : 'left';
  return `<div class="mascot-bubble ${side}">
    <div style="flex-shrink:0">${MascotSVG(size)}</div>
    <div class="speech">${esc(message)}</div>
  </div>`;
}

function HeartsRow(count, max) {
  if (max == null) max = 5;
  let html = '<span class="hearts-row" aria-label="' + count + ' of ' + max + ' hearts">';
  for (let i = 0; i < max; i++) {
    html += `<span class="heart ${i < count ? '' : 'spent'}" aria-hidden="true">♥</span>`;
  }
  html += `<span class="hearts-count">${count}</span>`;
  html += '</span>';
  return html;
}

function ProgressDots(total, current) {
  let html = '<div class="progress-dots" role="progressbar" aria-valuenow="' + current + '" aria-valuemax="' + total + '">';
  for (let i = 0; i < total; i++) {
    const cls = i < current ? 'done' : (i === current ? 'on' : '');
    html += `<span class="dot ${cls}"></span>`;
  }
  html += '</div>';
  return html;
}

function BlankSlot(opts) {
  opts = opts || {};
  const state   = opts.state || 'empty';   // empty | filled | correct | wrong
  const content = opts.content || '';
  if (state === 'empty' || !content) {
    return `<span class="blank-slot blank-empty" data-state="empty"${dataAttrs(opts.data)}></span>`;
  }
  return `<span class="blank-slot blank-${state}"${dataAttrs(opts.data)}>${esc(content)}</span>`;
}

function TokenChip(text, opts) {
  opts = opts || {};
  const state    = opts.state || 'idle';   // idle | placed | correct | wrong
  const action   = opts.action;
  const tag      = action ? 'button' : 'span';
  const typeAttr = action ? ' type="button"' : '';
  const actAttr  = action ? ` data-action="${esc(action)}"` : '';
  return `<${tag} class="token-chip token-${state}"${typeAttr}${actAttr}${dataAttrs(opts.data)}>${esc(text)}</${tag}>`;
}

/* DiffView — wraps two CodeBlocks with optional per-line highlight maps.
   The caller can compute diffs via computeLineDiff(a, b) below. */
function DiffView(opts) {
  const userCode  = opts.userCode  || '';
  const solution  = opts.solution  || '';
  const lang      = opts.lang      || 'py';
  const mode      = opts.mode      || 'split';   // split | yours | sensei
  const userHi    = opts.userHighlight   || {};
  const senseiHi  = opts.senseiHighlight || {};

  const yours = `<section class="diff-yours">
    <div class="t-caption error" style="margin-bottom:6px">Yours</div>
    ${CodeBlock({ code: userCode, lang, highlight: userHi, showLineNumbers: false })}
  </section>`;
  const sensei = `<section class="diff-sensei">
    <div class="t-caption success" style="margin-bottom:6px">Sensei</div>
    ${CodeBlock({ code: solution, lang, highlight: senseiHi, showLineNumbers: false })}
  </section>`;

  if (mode === 'yours')  return yours;
  if (mode === 'sensei') return sensei;
  return yours + sensei;
}

function computeLineDiff(a, b) {
  // Naive line diff — flags any line index where a[i] !== b[i].
  // Good enough for the V1 corpus. Replace with a real algorithm later.
  const aLines = (a || '').split('\n');
  const bLines = (b || '').split('\n');
  const aHighlight = {};
  const bHighlight = {};
  const max = Math.max(aLines.length, bLines.length);
  for (let i = 0; i < max; i++) {
    if (aLines[i] !== bLines[i]) {
      if (aLines[i] !== undefined) aHighlight[i + 1] = '-';
      if (bLines[i] !== undefined) bHighlight[i + 1] = '+';
    }
  }
  return { aHighlight, bHighlight };
}

/* ────────────────────────────────────────────────────────────
   runCode — V1 stub.
   Real execution (Pyodide / sql.js / sandboxed iframe) wires up later.
   Always returns the canned shape from HANDOFF.md: { ok, stdout, stderr }.
   ──────────────────────────────────────────────────────────── */
function runCode(/* lang, source */) {

/* ────────────────────────────────────────────────────────────
   Session helpers — drive the lesson → exercise → result loop.
   ──────────────────────────────────────────────────────────── */

const LANG_BG = { py: '#3776ab', js: '#f0c84a', sql: '#7a5cf0', css: '#ff7a3d' };
const LANG_LABEL = { py: 'Py', js: 'JS', sql: 'SQL', css: 'CSS' };

function exerciseQueueFor(lessonId) {
  return EXERCISES.filter(e => e.lessonId === lessonId).map(e => e.id);
}

function newSession(type, lessonId) {
  return {
    type,
    lessonId,
    exerciseQueue: exerciseQueueFor(lessonId),
    exerciseIdx: 0,
    selectedOption: null,
    placedTokens: {},
    typedCode: '',
    lastCorrect: null,
    lastWrongMistakeId: null,
    drillMistakeId: null,
    correctCount: 0,
    xpEarned: 0,
    startedAt: Date.now(),
    endedAt: null,
    newMistakeIds: [],
  };
}

function startLesson(lessonId) {
  S.session = newSession('lesson', lessonId);
  S.ui.lessonStep = 0;
  go('lesson');
}

function startPractice(lessonId) {
  // Skip lesson micro-steps; jump straight to the exercise queue.
  S.session = newSession('practice', lessonId);
  resetExerciseTransients();
  go('exercise');
}

function continueOrStart() {
  // Pick up a paused session first (e.g. interrupted by a Dojo detour).
  if (S.pausedSession && S.hearts > 0) {
    S.session = S.pausedSession;
    S.pausedSession = null;
    go('exercise');
    return;
  }
  if (S.session && (S.session.type === 'lesson' || S.session.type === 'practice')) {
    const lesson = LESSONS[S.session.lessonId];
    if (S.session.type === 'lesson' &&
        S.ui.lessonStep < lesson.steps.length) {
      go('lesson');
    } else {
      go('exercise');
    }
    return;
  }
  startLesson('py-loops-1');
}

function currentExercise() {
  if (!S.session || !S.session.exerciseQueue) return null;
  const id = S.session.exerciseQueue[S.session.exerciseIdx];
  return EXERCISES.find(e => e.id === id) || null;
}

function resetExerciseTransients() {
  if (!S.session) return;
  const ex = currentExercise();
  S.session.selectedOption = null;
  S.session.placedTokens = {};
  S.session.typedCode = (ex && ex.kind === 'type') ? ex.starter : '';
  S.session.lastCorrect = null;
}

function lessonNext() {
  if (!S.session) return;
  const lesson = LESSONS[S.session.lessonId];
  if (S.ui.lessonStep < lesson.steps.length - 1) {
    S.ui.lessonStep++;
    save();
    render();
  } else {
    resetExerciseTransients();
    go('exercise');
  }
}

function exitToHome() {
  // Spec says ✕ "confirms exit"; Phase 3 just bails to home — confirmation
  // modal is a Phase 4 polish item.
  go('home');
}

/* === Answer checking === */

function answerReady() {
  const ex = currentExercise();
  if (!ex) return false;
  if (ex.kind === 'mcq') return S.session.selectedOption !== null;
  if (ex.kind === 'tap') return ex.blanks.every((_, i) => S.session.placedTokens[i] !== undefined);
  if (ex.kind === 'type') return (S.session.typedCode || '').trim().length > 0;
  return false;
}

function isCorrect(ex) {
  if (ex.kind === 'mcq') {
    const opt = ex.options[S.session.selectedOption];
    return !!(opt && opt.correct);
  }
  if (ex.kind === 'tap') {
    return ex.blanks.every((b, i) => {
      const idx = S.session.placedTokens[i];
      if (idx === undefined) return false;
      return ex.tokenTray[idx] === b.answer;
    });
  }
  if (ex.kind === 'type') {
    const norm = s => String(s || '').replace(/\s+/g, ' ').trim();
    return norm(S.session.typedCode) === norm(ex.solution);
  }
  return false;
}

function checkAnswer() {
  const ex = currentExercise();
  if (!ex || !answerReady()) return;

  const correct = isCorrect(ex);
  S.session.lastCorrect = correct;

  if (correct) {
    S.xp += ex.xp;
    S.session.xpEarned += ex.xp;
    S.session.correctCount++;
    go('result-correct');
  } else {
    S.hearts = Math.max(0, S.hearts - 1);
    // Mistake-bank write-through — non-negotiable per HANDOFF.
    const mistake = mistakeFromExercise(ex);
    S.mistakes.push(mistake);
    S.session.lastWrongMistakeId = mistake.id;
    S.session.newMistakeIds.push(mistake.id);
    go('result-wrong');
  }
}

function mistakeFromExercise(ex) {
  return {
    id: 'm-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
    lang: ex.lang,
    title: ex.topic,
    topic: ex.topic,
    userCode: userAttemptString(ex),
    solution: solutionString(ex),
    explanation: ex.explanation,
    exerciseId: ex.id,
    createdAt: new Date().toISOString(),
    dueAt: new Date().toISOString(),
    attempts: 0,
    mastered: false,
  };
}

function userAttemptString(ex) {
  if (ex.kind === 'mcq') {
    const sel = ex.options[S.session.selectedOption];
    const tag = sel ? sel.text : '(no choice)';
    return (ex.code ? ex.code + '\n' : '') + '# You picked: ' + tag;
  }
  if (ex.kind === 'tap') {
    return fillTapTemplate(ex, i => {
      const idx = S.session.placedTokens[i];
      return idx === undefined ? '___' : ex.tokenTray[idx];
    });
  }
  if (ex.kind === 'type') {
    return S.session.typedCode || ex.starter || '';
  }
  return '';
}

function solutionString(ex) {
  if (ex.kind === 'mcq') {
    const correctOpt = ex.options.find(o => o.correct);
    return (ex.code ? ex.code + '\n' : '') +
           '# Correct: ' + (correctOpt ? correctOpt.text : '(missing)');
  }
  if (ex.kind === 'tap') return fillTapTemplate(ex, i => ex.blanks[i].answer);
  if (ex.kind === 'type') return ex.solution || '';
  return '';
}

function fillTapTemplate(ex, getter) {
  let out = ex.template;
  ex.blanks.forEach((_, i) => {
    out = out.split('{' + i + '}').join(getter(i));
  });
  return out;
}

/* === Result transitions === */

function nextExercise() {
  if (!S.session) { go('home'); return; }
  const next = S.session.exerciseIdx + 1;
  if (next >= S.session.exerciseQueue.length) {
    // Lesson complete — show summary; user dismisses to clear session.
    S.session.endedAt = Date.now();
    go('lesson-summary');
    return;
  }
  if (S.hearts === 0) {
    // Save the in-flight session so drilling-to-refill can resume it.
    S.pausedSession = S.session;
    S.session = null;
    go('out-of-hearts');
    return;
  }
  S.session.exerciseIdx = next;
  resetExerciseTransients();
  go('exercise');
}

function resultNext() { return nextExercise(); }

function tryAgain() {
  // From Review (post-wrong) — re-attempt same exercise.
  if (!S.session) { go('home'); return; }
  if (S.hearts === 0) {
    S.pausedSession = S.session;
    S.session = null;
    go('out-of-hearts');
    return;
  }
  resetExerciseTransients();
  go('exercise');
}

function endLessonSession() {
  // Called by LessonSummary's "Continue" CTA.
  S.session = null;
  go('home');
}

/* === MCQ / Tap / Type input handlers === */

function pickMCQ(idx) {
  if (!S.session) return;
  S.session.selectedOption = idx;
  save();
  render();
}

function placeToken(tokenIdx) {
  if (!S.session) return;
  const ex = currentExercise();
  if (!ex || ex.kind !== 'tap') return;
  // Skip if this token chip is already placed in some blank.
  for (const k in S.session.placedTokens) {
    if (S.session.placedTokens[k] === tokenIdx) return;
  }
  // Place in the next empty blank.
  for (let i = 0; i < ex.blanks.length; i++) {
    if (S.session.placedTokens[i] === undefined) {
      S.session.placedTokens[i] = tokenIdx;
      save();
      render();
      return;
    }
  }
}

function clearBlank(blankIdx) {
  if (!S.session) return;
  delete S.session.placedTokens[blankIdx];
  save();
  render();
}

/* === Drill (Dojo focused re-attempt) === */

function startDrill(mistakeId) {
  // If we're mid-lesson, stash the session so we can resume after.
  if (S.session && (S.session.type === 'lesson' || S.session.type === 'practice')) {
    S.pausedSession = S.session;
  }
  S.session = {
    type: 'drill',
    drillMistakeId: mistakeId,
    lastCorrect: null,
  };
  S.ui.testsOpen = false;
  go('review');   // shared screen — branches by S.session.type.
}

function drillResolve(correct) {
  if (!S.session) { go('dojo'); return; }
  const m = S.mistakes.find(mm => mm.id === S.session.drillMistakeId);
  if (!m) { S.session = null; go('dojo'); return; }

  if (correct) {
    m.attempts = (m.attempts || 0) + 1;
    // Phase 3 SRS-lite — full SM-2 lands in Phase 5.
    const days = Math.min(Math.pow(2, m.attempts), 30);
    const next = new Date();
    next.setTime(next.getTime() + days * 24 * 60 * 60 * 1000);
    m.dueAt = next.toISOString();
    if (m.attempts >= 5) m.mastered = true;
    // Heart-refill loop (HANDOFF "easy to miss" #2).
    S.hearts = Math.min(5, S.hearts + 1);

    // Resume the paused lesson if we have one and now have hearts to spend.
    if (S.pausedSession && S.hearts > 0) {
      S.session = S.pausedSession;
      S.pausedSession = null;
      go('exercise');
      return;
    }
  } else {
    m.attempts = 0;
    m.dueAt = new Date().toISOString();
  }
  S.session = null;
  go('dojo');
}

/* === Time / due helpers === */

function isDue(mistake) {
  if (mistake.mastered) return false;
  return new Date(mistake.dueAt).getTime() <= Date.now();
}

function dueMistakes() {
  return S.mistakes.filter(isDue);
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 60) return min <= 1 ? 'Just now' : min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  const d = Math.floor(hr / 24);
  if (d === 1) return 'Yesterday';
  if (d < 7) return d + ' days ago';
  return Math.floor(d / 7) + 'w ago';
}

function dueLabel(mistake) {
  if (mistake.mastered) return 'Mastered';
  const ms = new Date(mistake.dueAt).getTime() - Date.now();
  if (ms <= 0) return 'Now';
  const hr = Math.floor(ms / (60 * 60 * 1000));
  if (hr < 24) return 'Today';
  const d = Math.floor(hr / 24);
  if (d === 1) return 'Tomorrow';
  if (d < 7) return 'In ' + d + 'd';
  return 'In ' + Math.floor(d / 7) + 'w';
}

function dueTone(mistake) {
  if (mistake.mastered) return 'success';
  const ms = new Date(mistake.dueAt).getTime() - Date.now();
  if (ms <= 0) return 'error';
  if (ms < 24 * 60 * 60 * 1000) return 'warn';
  return 'neutral';
}

function tapScreen(ex, header, ctaBar) {
  // Build the code block from template + placedTokens. We render the template
  // with a placeholder for each blank, then post-process to inject BlankSlots.
  const lines = ex.template.split('\n');
  const lineNumWidth = String(lines.length).length;

  function renderBlankSlot(blankIdx) {
    const tokenIdx = S.session.placedTokens[blankIdx];
    if (tokenIdx === undefined) return BlankSlot({ state: 'empty' });
    const text = ex.tokenTray[tokenIdx];
    return BlankSlot({
      state: 'filled',
      content: text,
      data: { action: 'tap-clear', 'blank-idx': blankIdx },
    });
  }

  // For each line, tokenize the parts BETWEEN blank markers and inject slots.
  // This is a lightweight render — it's the tap-fill exercise template,
  // not a parser pipeline.
  const codeHtml = lines.map((line, lineIdx) => {
    const parts = line.split(/\{(\d+)\}/);   // ["pre", "0", "mid", "1", "post"]
    let html = '';
    for (let i = 0; i < parts.length; i++) {
      if (i % 2 === 0) {
        const tokens = tokenize(parts[i], ex.lang);
        html += renderTokens(tokens);
      } else {
        const blankIdx = parseInt(parts[i], 10);
        // Wrap so taps on the slot fire 'tap-clear' via the data already on it.
        html += renderBlankSlot(blankIdx).replace('<span class="blank-slot ',
                                                   '<span data-action="tap-clear" data-blank-idx="' + blankIdx + '" class="blank-slot ');
      }
    }
    return `<div style="display:flex; min-height:24px"><span style="display:inline-block; width:${lineNumWidth + 1}ch; color:var(--muted); opacity:0.5; user-select:none">${lineIdx + 1}</span><span style="flex:1">${html}</span></div>`;
  }).join('');

  return `
    <div class="ex-screen">
      ${header}
      <div class="ex-prompt-block">
        ${Pill(ex.pillLabel, { tone: ex.pillTone })}
        <div class="ex-prompt">${esc(ex.prompt)}</div>
      </div>
      <div class="tap-code">${codeHtml}</div>
      <div class="tap-tray-label">Tokens</div>
      <div class="tap-tray">
        ${ex.tokenTray.map((tok, i) => {
          const placed = Object.values(S.session.placedTokens).includes(i);
          return TokenChip(tok, {
            state: placed ? 'placed' : 'idle',
            action: placed ? null : 'tap-place',
            data: { idx: i },
          });
        }).join('')}
      </div>
      <div style="flex:1"></div>
      ${ctaBar}
    </div>
  `;
}

SCREENS.dojo = function () {
  const filter = S.ui.dojoFilter || 'all';
  const all    = S.mistakes.filter(m => S.ui.dojoShowMastered || !m.mastered);
  const due    = all.filter(isDue);

  let visible = all;
  if (filter === 'due') visible = due;
  else if (['py','js','sql','css'].includes(filter)) {
    visible = all.filter(m => m.lang === filter);
  }

  // Counts for chips
  const counts = {
    all: all.length,
    due: due.length,
    py:  all.filter(m => m.lang === 'py').length,
    js:  all.filter(m => m.lang === 'js').length,
    sql: all.filter(m => m.lang === 'sql').length,
    css: all.filter(m => m.lang === 'css').length,
  };
  const chipDefs = [
    { id: 'all', label: 'All · ' + counts.all },
    { id: 'due', label: 'Due · ' + counts.due },
    { id: 'py',  label: 'Python · ' + counts.py },
    { id: 'sql', label: 'SQL · ' + counts.sql },
    { id: 'js',  label: 'JS · ' + counts.js },
  ].filter(c => c.id === 'all' || c.id === 'due' || counts[c.id] > 0);

  const dueCount = counts.due;
  const drillMins = Math.max(1, dueCount * 2);
  const drillXp   = dueCount * 20;

  return `
    <header class="dojo-header">
      <div class="dojo-eyebrow">Your Dojo</div>
      <h1 class="dojo-h1">${all.length} mistake${all.length === 1 ? '' : 's'} to drill</h1>
      <p class="dojo-sub">Spaced practice — hit every one until it sticks.</p>
    </header>

    ${dueCount > 0 ? `
      <button type="button" class="drill-all" data-action="drill-all">
        <div class="drill-all-icon">⚔</div>
        <div style="flex:1">
          <div class="drill-all-title">Drill all ${dueCount} due now</div>
          <div class="drill-all-meta">~${drillMins} min · +${drillXp} XP</div>
        </div>
        <span class="drill-all-arrow">→</span>
      </button>
    ` : ''}

    <div class="dojo-filters">
      ${chipDefs.map(c => `
        <button type="button"
                class="filter-chip ${filter === c.id ? 'on' : ''}"
                data-action="dojo-filter"
                data-f="${c.id}">${esc(c.label)}</button>
      `).join('')}
    </div>

    ${all.length === 0 ? `
      <div class="empty-dojo">
        <div class="empty-dojo-illust">⚔</div>
        <div class="empty-dojo-h1">Your Dojo is empty</div>
        <div class="empty-dojo-sub">
          When you make a mistake in a lesson, it lands here so you can drill it later.
        </div>
        <div style="margin-top:var(--sp-4)">
          ${Btn('Start a lesson →', { primary: true, action: 'continue' })}
        </div>
      </div>
    ` : visible.length === 0 ? `
      <div class="mistake-empty">
        <div style="font-size:32px; margin-bottom:8px">⚔</div>
        <div class="t-body">No mistakes match this filter.</div>
      </div>
    ` : `
      <div class="mistake-list">
        ${visible.map(m => `
          <button type="button" class="mistake-card" data-action="drill" data-mid="${esc(m.id)}">
            <div class="mistake-lang" style="background:${LANG_BG[m.lang] || '#888'}">${esc(LANG_LABEL[m.lang] || m.lang)}</div>
            <div class="mistake-info">

const ONB_STEPS = ['track-picker', 'placement', 'daily-goal'];

function onboardingNext(fromScreen) {
  if (fromScreen === 'splash')        return go('track-picker');
  if (fromScreen === 'track-picker')  return go('placement');
  if (fromScreen === 'placement')     return go('daily-goal');
  if (fromScreen === 'daily-goal') {
    S.user.onboarded = true;
    if (!S.user.name) S.user.name = 'Sam';   // placeholder until profile edit lands.
    save();
    return go('home');
  }
}

function onboardingBack(fromScreen) {
  if (fromScreen === 'track-picker') return go('splash');
  if (fromScreen === 'placement')    return go('track-picker');
  if (fromScreen === 'daily-goal')   return go('placement');
}

function toggleTrack(id) {
  const idx = S.onboarding.trackIds.indexOf(id);
  if (idx === -1) S.onboarding.trackIds.push(id);
  else S.onboarding.trackIds.splice(idx, 1);
  save();
  render();
}

function setSkill(level) {
  S.onboarding.skill = level;
  save();
  render();
}

function setGoal(mins) {
  S.onboarding.dailyGoalMin = mins;
  save();
  render();
}

function restartOnboarding() {
  S.user.onboarded = false;
  S.onboarding.skill = null;
  save();
  go('splash');
}

const TABS = [
  { id: 'home',     label: 'Learn',    icon: '◆', target: 'home'     },
  { id: 'practice', label: 'Practice', icon: '⚡', target: 'practice' },
  { id: 'dojo',     label: 'Dojo',     icon: '⚔', target: 'dojo'     },
  { id: 'profile',  label: 'Sensei',   icon: '◐', target: 'profile'  },
];

// Screens that take over the viewport — hide the bottom tab bar.
const NO_TABS = new Set([
  'lesson', 'exercise', 'result-correct', 'result-wrong',
  'splash', 'track-picker', 'placement', 'daily-goal',
  'lesson-summary', 'out-of-hearts',
]);

function tabFor(screen) {
  // Maps screen id → which tab should highlight. Onboarding/lesson/result
  // screens hide the tab bar entirely (NO_TABS), so this only matters for
  // tab-visible screens like home, dojo, review, profile.
  if (screen === 'home')    return 'home';
  if (screen === 'dojo')    return 'dojo';
  if (screen === 'profile') return 'profile';
  if (screen === 'review')  return 'practice';
  return null;
}

function renderTabs() {
  if (NO_TABS.has(S.screen)) {
    document.getElementById('tabs').innerHTML = '';
    return;
  }
  const active = tabFor(S.screen);
  document.getElementById('tabs').innerHTML = TABS.map(t => `
    <button class="tab ${t.id === active ? 'on' : ''}"
            type="button"
            data-action="go-tab"
            data-tab="${t.id}">
      <span class="tab-icon" aria-hidden="true">${t.icon}</span>
      <span class="tab-label">${t.label}</span>
    </button>
  `).join('');
}

/* ────────────────────────────────────────────────────────────
   Render
   ──────────────────────────────────────────────────────────── */
let autoAdvanceTimer = null;

function render() {
  const fn = SCREENS[S.screen] || SCREENS.home;
  document.getElementById('screen').innerHTML = fn(S);
  renderTabs();

  // Result · Correct auto-advances after 1.5s (spec).
  clearTimeout(autoAdvanceTimer);
  if (S.screen === 'result-correct') {
    autoAdvanceTimer = setTimeout(() => {
      if (S.screen === 'result-correct') resultNext();
    }, 1500);
  }
}

/* ────────────────────────────────────────────────────────────
   Event delegation — every interactive element uses data-action.
   ──────────────────────────────────────────────────────────── */
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  handle(action, el.dataset, el, e);
});

function handle(action, data) {
  switch (action) {
    case 'go':
      return go(data.to);

    case 'go-tab': {
      const tab = TABS.find(t => t.id === data.tab);
      if (!tab) return;
      if (tab.id === 'practice') return startPractice('py-loops-1');
      return go(tab.target);
    }

    case 'continue':
      return continueOrStart();

    case 'exit':
      return exitToHome();

    case 'lesson-next':
      return lessonNext();

    case 'mcq-pick':
      return pickMCQ(parseInt(data.idx, 10));

    case 'tap-place':
      return placeToken(parseInt(data.idx, 10));

    case 'tap-clear':
      return clearBlank(parseInt(data['blank-idx'], 10));

    case 'kbd-insert': {
      const ta = document.querySelector('textarea[data-input="type-code"]');
      if (!ta || !S.session) return;
      const start = ta.selectionStart;
      const end   = ta.selectionEnd;
      const ins   = data.key === 'Tab' ? '    ' : data.key;
      const next  = ta.value.slice(0, start) + ins + ta.value.slice(end);
      ta.value = next;
      S.session.typedCode = next;
      ta.focus();
      ta.setSelectionRange(start + ins.length, start + ins.length);
      save();
      return;
    }

    case 'run-code':
      // V1 stub. Real Pyodide hook lands later.
      runCode().then(r => alert(r.stdout));
      return;

    case 'check-answer':
      return checkAnswer();

    case 'result-next':
      return resultNext();

    case 'result-skip':
      // 'Skip' on result-wrong = move on without reviewing. Mistake is
      // already saved; just advance the queue.
      return resultNext();

    case 'go-review':
      return go('review');

    case 'try-again':
      return tryAgain();

    case 'review-tab':
      S.ui.reviewTab = data.tab;
      save();
      render();
      return;

    case 'toggle-tests':
      S.ui.testsOpen = !S.ui.testsOpen;
      save();
      render();
      return;

    case 'review-save':
      // Mistake is already in S.mistakes (saved on wrong). No-op until
      // Phase 4 surfaces a "saved" toast.
      return;

    case 'dojo-filter':
      S.ui.dojoFilter = data.f;
      save();
      render();
      return;

    case 'drill':
      return startDrill(data.mid);

    case 'drill-correct':
      return drillResolve(true);

    case 'drill-wrong':
      return drillResolve(false);

    case 'drill-all': {
      // Phase 3 simplification: drill the first due mistake. Real "drill all"
      // sequencing (queue through every due mistake) is a Phase 5 polish.
      const due = dueMistakes();
      if (due.length) startDrill(due[0].id);
      return;
    }

    /* === Onboarding === */
    case 'onb-next':
      return onboardingNext(S.screen);
    case 'onb-back':
      return onboardingBack(S.screen);
    case 'track-toggle':
      return toggleTrack(data.id);
    case 'skill-pick':
      return setSkill(data.level);
    case 'goal-pick':
      return setGoal(parseInt(data.mins, 10));

    /* === Lesson summary === */
    case 'summary-done':
      return endLessonSession();

    /* === Profile === */
    case 'restart-onboarding':
      return restartOnboarding();
    case 'noop-setting':
      // Stub — language/theme settings come post-V1.
      return;

    default:
      console.warn('[codesensei] unhandled action:', action, data);
  }
}

// Input event delegation — for the type-it textarea.
document.addEventListener('input', (e) => {
  const el = e.target.closest('[data-input]');
  if (!el) return;
  if (el.dataset.input === 'type-code' && S.session) {
    S.session.typedCode = el.value;
    save();
  }
});

/* ────────────────────────────────────────────────────────────
   Boot
   ──────────────────────────────────────────────────────────── */
load();
render();
</script>
</body>
</html>
